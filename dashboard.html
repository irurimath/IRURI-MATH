<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRURI EDUCATION — 리포트 관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --main: #0D2B1F; --main2: #1A3D2B; --mint: #3DBFA0; --mint-lt: #E8F7F3;
  --ivory: #F7F4EE; --white: #fff; --ink: #1A1A1A; --muted: #717171;
  --line: #E2DDD6; --coral: #E8604A; --coral-lt: #FDF3F1;
  --green: #1A7A5E; --green-lt: #D4EFDF;
  --yellow: #F5A623; --yellow-lt: #FEF3DC;
  --blue: #2563EB; --blue-lt: #EFF6FF;
  --purple: #7C3AED; --purple-lt: #F5F3FF;
  --warm: #F5F0E8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--ivory); color: var(--ink); min-height: 100vh; }

/* ── 로그인 화면 ── */
#login-screen {
  position: fixed; inset: 0; background: var(--main);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  transition: opacity .4s, visibility .4s;
}
#login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.login-box {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px; padding: 10mm 8mm; width: 88mm; text-align: center;
}
.login-logo { font-size: 9pt; font-weight: 700; letter-spacing: 2.5px; color: #fff; margin-bottom: 1mm; }
.login-sub { font-size: 7.5pt; color: rgba(255,255,255,.35); margin-bottom: 8mm; }
.login-title { font-size: 15pt; font-weight: 700; color: #fff; margin-bottom: 7mm; }
.login-field { margin-bottom: 3.5mm; text-align: left; }
.login-field label { font-size: 7pt; color: rgba(255,255,255,.45); display: block; margin-bottom: 1.5mm; letter-spacing: 1px; text-transform: uppercase; }
.login-field input {
  width: 100%; padding: 3mm 4mm; background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15); border-radius: 10px;
  color: #fff; font-size: 9pt; font-family: inherit; outline: none;
  transition: border-color .2s;
}
.login-field input:focus { border-color: var(--mint); }
.login-field input::placeholder { color: rgba(255,255,255,.25); }
.login-btn {
  width: 100%; margin-top: 5mm; padding: 3.5mm; background: var(--mint);
  border: none; border-radius: 10px; color: #fff; font-size: 10pt;
  font-weight: 700; font-family: inherit; cursor: pointer;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .85; }
.login-error { font-size: 7.5pt; color: var(--coral); margin-top: 3mm; display: none; }

/* ── 앱 레이아웃 ── */
#app { display: none; min-height: 100vh; }
#app.visible { display: block; }

/* 상단 헤더 */
.app-header {
  background: var(--main); padding: 0 6mm;
  height: 14mm; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.header-brand { font-size: 9pt; font-weight: 700; letter-spacing: 2px; color: #fff; }
.header-brand span { font-size: 7pt; color: rgba(255,255,255,.35); margin-left: 3mm; font-weight: 400; letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 4mm; }
.user-badge {
  background: rgba(255,255,255,.1); border-radius: 20px;
  padding: 1.5mm 4mm; font-size: 7.5pt; color: rgba(255,255,255,.7); font-weight: 500;
}
.logout-btn {
  background: none; border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
  padding: 1.5mm 3.5mm; color: rgba(255,255,255,.5); font-size: 7pt;
  font-family: inherit; cursor: pointer; transition: all .2s;
}
.logout-btn:hover { border-color: var(--coral); color: var(--coral); }

/* 탭 바 */
.tab-bar {
  background: var(--white); border-bottom: 1px solid var(--line);
  padding: 0 6mm; display: flex; gap: 0;
  position: sticky; top: 14mm; z-index: 99;
}
.tab-btn {
  padding: 4mm 5mm; font-size: 9pt; font-weight: 500; color: var(--muted);
  border: none; background: none; cursor: pointer; font-family: inherit;
  border-bottom: 3px solid transparent; transition: all .2s;
}
.tab-btn.active { color: var(--main); border-bottom-color: var(--mint); font-weight: 700; }
.tab-btn:hover:not(.active) { color: var(--ink); }

/* 콘텐츠 영역 */
.tab-content { display: none; padding: 5mm 6mm 10mm; }
.tab-content.active { display: block; }

/* 회차 선택 바 */
.round-bar {
  background: var(--white); border-radius: 12px; border: 1px solid var(--line);
  padding: 3.5mm 5mm; margin-bottom: 5mm;
  display: flex; align-items: center; gap: 4mm; flex-wrap: wrap;
}
.round-bar label { font-size: 8pt; color: var(--muted); font-weight: 500; }
.round-select {
  padding: 2mm 4mm; border: 1px solid var(--line); border-radius: 8px;
  font-size: 8.5pt; font-family: inherit; background: var(--ivory); color: var(--ink);
  outline: none; cursor: pointer;
}
.round-stats { margin-left: auto; display: flex; gap: 3mm; }
.stat-pill {
  padding: 1.5mm 3.5mm; border-radius: 20px; font-size: 7.5pt; font-weight: 600;
}
.stat-pill.total { background: var(--main); color: #fff; }
.stat-pill.done { background: var(--green-lt); color: var(--green); }
.stat-pill.pending { background: var(--yellow-lt); color: var(--yellow); }

/* 섹션 헤더 */
.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 3mm;
}
.section-title { font-size: 11pt; font-weight: 700; color: var(--main); }
.section-count { font-size: 8pt; color: var(--muted); }

/* 강사 필터 */
.instructor-filter { display: flex; gap: 2mm; flex-wrap: wrap; margin-bottom: 4mm; }
.filter-btn {
  padding: 2mm 4mm; border-radius: 20px; font-size: 7.5pt; font-weight: 500;
  border: 1.5px solid var(--line); background: var(--white); color: var(--muted);
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.filter-btn.active { background: var(--main); color: #fff; border-color: var(--main); }
.filter-btn:hover:not(.active) { border-color: var(--mint); color: var(--main); }

/* 테이블 */
.data-table-wrap {
  background: var(--white); border-radius: 14px; border: 1px solid var(--line);
  overflow: hidden;
}
.data-table { width: 100%; border-collapse: collapse; font-size: 8pt; }
.data-table thead th {
  background: var(--main); color: rgba(255,255,255,.7); padding: 3mm 4mm;
  text-align: left; font-weight: 500; font-size: 7.5pt; letter-spacing: .5px;
  white-space: nowrap;
}
.data-table thead th:first-child { border-radius: 0; }
.data-table tbody tr { border-bottom: 1px solid var(--line); transition: background .15s; }
.data-table tbody tr:last-child { border-bottom: none; }
.data-table tbody tr:hover { background: var(--ivory); }
.data-table tbody td { padding: 3mm 4mm; vertical-align: middle; }
.data-table tbody td.name-cell { font-weight: 700; color: var(--main); }
.data-table tbody td.muted { color: var(--muted); font-size: 7.5pt; }

/* 수강 요일·구간 태그 */
.schedule-tags { display: flex; gap: 1.5mm; flex-wrap: wrap; }
.sched-tag {
  background: var(--mint-lt); color: #0F6E56; border-radius: 6px;
  padding: 1mm 2.5mm; font-size: 7pt; font-weight: 600; white-space: nowrap;
}

/* 상태 배지 */
.status-badge {
  display: inline-flex; align-items: center; gap: 1.5mm;
  padding: 1.5mm 3mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  white-space: nowrap;
}
.status-badge.done { background: var(--green-lt); color: var(--green); }
.status-badge.pending { background: var(--yellow-lt); color: #A16207; }
.status-badge.inactive { background: #F3F4F6; color: #9CA3AF; }
.status-badge.na { background: #F3F4F6; color: #9CA3AF; font-size: 7pt; }

/* 토글 버튼 */
.toggle-btn {
  padding: 1.5mm 3.5mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid; cursor: pointer; font-family: inherit; transition: all .2s;
  white-space: nowrap;
}
.toggle-btn.on { background: var(--green-lt); color: var(--green); border-color: var(--green); }
.toggle-btn.off { background: var(--line); color: var(--muted); border-color: var(--line); }
.toggle-btn.on:hover { background: var(--green); color: #fff; }
.toggle-btn.off:hover { background: var(--ivory); border-color: var(--muted); }

/* 리포트 생성 버튼 */
.gen-btn {
  padding: 1.5mm 3.5mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid var(--mint); background: var(--mint-lt); color: var(--green);
  cursor: pointer; font-family: inherit; transition: all .2s; white-space: nowrap;
}
.gen-btn:hover { background: var(--mint); color: #fff; }
.gen-btn:disabled { opacity: .4; cursor: not-allowed; }

/* 점수 배지 */
.score-badge {
  display: inline-flex; align-items: center; gap: 1.5mm;
  padding: 1.5mm 3mm; border-radius: 8px; font-size: 8pt; font-weight: 700;
  background: var(--main); color: #fff; white-space: nowrap;
}
.score-badge.sub { font-size: 7pt; font-weight: 400; opacity: .7; }

/* 미시행 상태 선택 */
.skip-btn {
  padding: 1.5mm 3mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid; cursor: pointer; font-family: inherit; transition: all .2s;
}
.skip-btn.on  { background: #FEE2E2; color: #991B1B; border-color: #FCA5A5; }
.skip-btn.off { background: var(--line); color: var(--muted); border-color: var(--line); }
.skip-btn.on:hover  { background: #FCA5A5; }
.skip-btn.off:hover { background: var(--ivory); border-color: var(--muted); }

/* 시행상태 드롭다운 (신규생·특수상태) */
.exam-status-select {
  padding: 1.5mm 2.5mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid var(--line); background: var(--ivory); color: var(--ink);
  font-family: inherit; cursor: pointer; outline: none; transition: border-color .2s;
}
.exam-status-select:focus { border-color: var(--mint); }
.exam-status-select.status-new      { border-color: #F59E0B; background: #FFFBEB; color: #92400E; }
.exam-status-select.status-scheduled{ border-color: var(--blue); background: var(--blue-lt); color: #1D4ED8; }
.exam-status-select.status-skip-acad{ border-color: #8B5CF6; background: #F5F3FF; color: #5B21B6; }
.exam-status-select.status-skip-wd  { border-color: var(--coral); background: var(--coral-lt); color: #991B1B; }
/* 신규생 배지 */
.new-student-badge {
  display: inline-flex; align-items: center; gap: 1mm;
  padding: 1mm 2.5mm; border-radius: 6px; font-size: 6.5pt; font-weight: 700;
  background: #FFFBEB; color: #92400E; border: 1px solid #F59E0B;
  white-space: nowrap;
}

/* 미시행 행 */
.data-table tbody tr.inactive-row td { opacity: .45; }
.data-table tbody tr.inactive-row td.name-cell { opacity: .55; }
.data-table tbody tr.withdrawn-row td { opacity: .6; background: #FEF2F2; }

/* 로딩 스피너 */
.loading-bar {
  background: var(--white); border-radius: 12px; border: 1px solid var(--line);
  padding: 6mm; text-align: center; color: var(--muted); font-size: 8.5pt;
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2.5px solid var(--line); border-top-color: var(--mint);
  border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 2mm;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* 검색·필터 바 */
.filter-bar {
  background: var(--white); border-radius: 12px; border: 1px solid var(--line);
  padding: 3mm 4mm; margin-bottom: 4mm;
  display: flex; flex-wrap: wrap; gap: 2.5mm; align-items: center;
}
.search-wrap {
  display: flex; align-items: center; gap: 2mm;
  background: var(--ivory); border: 1.5px solid var(--line);
  border-radius: 8px; padding: 1.5mm 3mm; flex: 1; min-width: 140px;
  transition: border-color .2s;
}
.search-wrap:focus-within { border-color: var(--mint); }
.search-wrap input {
  border: none; background: none; outline: none;
  font-family: inherit; font-size: 8.5pt; color: var(--ink); width: 100%;
}
.search-wrap input::placeholder { color: var(--muted); }
.filter-select {
  padding: 1.5mm 3mm; border: 1.5px solid var(--line); border-radius: 8px;
  font-size: 8pt; font-family: inherit; background: var(--ivory);
  color: var(--ink); outline: none; cursor: pointer; transition: border-color .2s;
}
.filter-select:focus { border-color: var(--mint); }
.filter-reset-btn {
  padding: 1.5mm 3.5mm; border-radius: 8px; font-size: 8pt; font-weight: 600;
  border: 1.5px solid var(--line); background: none; color: var(--muted);
  cursor: pointer; font-family: inherit; transition: all .2s; white-space: nowrap;
}
.filter-reset-btn:hover { border-color: var(--coral); color: var(--coral); }
.filter-active-count {
  font-size: 7.5pt; color: var(--mint); font-weight: 700;
  background: var(--mint-lt); padding: 1mm 2.5mm; border-radius: 6px;
}

/* 시행담당 드롭다운 */
.exec-select {
  padding: 1.5mm 2.5mm; border-radius: 7px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid var(--mint); background: var(--mint-lt); color: #0F6E56;
  font-family: inherit; cursor: pointer; outline: none;
}
.exec-label-exec  { display:inline-flex;align-items:center;gap:1.5mm;padding:1.5mm 3mm;border-radius:8px;font-size:7.5pt;font-weight:700;background:var(--mint-lt);color:#0F6E56;white-space:nowrap; }
.exec-label-comment { display:inline-flex;align-items:center;gap:1.5mm;padding:1.5mm 3mm;border-radius:8px;font-size:7.5pt;font-weight:700;background:var(--blue-lt);color:var(--blue);white-space:nowrap; }
.exec-label-single  { display:inline-flex;align-items:center;gap:1.5mm;padding:1.5mm 3mm;border-radius:8px;font-size:7.5pt;font-weight:700;background:#F3F4F6;color:var(--muted);white-space:nowrap; }

/* 제출 내역 팝업 */
.popup-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:flex;align-items:center;justify-content:center;
}
.popup-box {
  background:var(--white);border-radius:16px;padding:6mm 7mm;
  min-width:280px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.2);
}
.popup-title { font-size:11pt;font-weight:700;color:var(--main);margin-bottom:4mm; }
.popup-item {
  display:flex;align-items:center;gap:3mm;padding:3mm 4mm;
  border-radius:10px;border:1.5px solid var(--line);margin-bottom:2mm;
  cursor:pointer;transition:border-color .15s;
}
.popup-item:hover { border-color:var(--mint); }
.popup-item.selected { border-color:var(--mint);background:var(--mint-lt); }
.popup-item-info { flex:1; }
.popup-item-ts { font-size:8pt;font-weight:700;color:var(--main); }
.popup-item-detail { font-size:7.5pt;color:var(--muted);margin-top:.5mm; }
.popup-check { color:var(--mint);font-size:14px;display:none; }
.popup-item.selected .popup-check { display:block; }
.popup-btns { display:flex;gap:2mm;margin-top:4mm;justify-content:flex-end; }
.popup-btn-cancel { padding:2mm 5mm;border-radius:8px;border:1.5px solid var(--line);background:none;font-family:inherit;font-size:8.5pt;cursor:pointer; }
.popup-btn-ok { padding:2mm 5mm;border-radius:8px;border:none;background:var(--mint);color:#fff;font-family:inherit;font-size:8.5pt;font-weight:700;cursor:pointer; }

/* 담당실장 필터 (학생별 탭) */
.manager-filter { display: flex; gap: 2mm; flex-wrap: wrap; margin-bottom: 4mm; }

/* 중복 제출 버튼 */
.dup-btn {
  padding: 1mm 2.5mm; border-radius: 6px; font-size: 7pt; font-weight: 600;
  border: 1px solid #F5A623; background: #FEF3DC; color: #92400E;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.dup-btn:hover { background: #F5A623; color: #fff; }

/* 히스토리 모달 */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
}
.modal-box {
  background: var(--white); border-radius: 16px; padding: 6mm;
  width: min(120mm, 95vw); max-height: 80vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.modal-title { font-size: 11pt; font-weight: 700; color: var(--main); margin-bottom: 4mm; }
.modal-sub   { font-size: 8pt; color: var(--muted); margin-bottom: 4mm; }
.history-item {
  border: 1.5px solid var(--line); border-radius: 10px; padding: 3.5mm;
  margin-bottom: 2.5mm; cursor: pointer; transition: all .2s;
}
.history-item:hover { border-color: var(--mint); background: var(--mint-lt); }
.history-item.selected { border-color: var(--mint); background: var(--mint-lt); }
.history-item.selected::before { content: '✅ 유효본'; font-size: 7pt; font-weight: 700; color: var(--green); display: block; margin-bottom: 1mm; }
.hi-row { display: flex; gap: 3mm; align-items: center; flex-wrap: wrap; }
.hi-time { font-size: 7.5pt; color: var(--muted); }
.hi-badge { padding: 1mm 2.5mm; border-radius: 5px; font-size: 7pt; font-weight: 700; }
.hi-score { background: var(--main); color: #fff; }
.hi-ver   { background: var(--mint-lt); color: var(--green); }
.hi-mode  { background: var(--warm); color: var(--muted); }
.hi-inst  { background: #EFF6FF; color: #1D4ED8; }
.modal-btns { display: flex; gap: 2.5mm; margin-top: 4mm; justify-content: flex-end; }
.modal-cancel { padding: 2.5mm 5mm; border-radius: 8px; border: 1px solid var(--line); background: var(--white); font-family: inherit; font-size: 9pt; cursor: pointer; }
.modal-confirm { padding: 2.5mm 5mm; border-radius: 8px; border: none; background: var(--mint); color: #fff; font-family: inherit; font-size: 9pt; font-weight: 700; cursor: pointer; }
.detail-row { display:flex; align-items:center; gap:3mm; }
.detail-lbl { font-size:7.5pt; font-weight:700; color:var(--muted); min-width:22mm; }

/* 빈 상태 */
.empty-state { padding: 8mm; text-align: center; color: var(--muted); font-size: 8.5pt; }

/* 요일 카드 (강사 뷰) */
.day-section { margin-bottom: 5mm; }
.day-header {
  display: flex; align-items: center; gap: 3mm; margin-bottom: 3mm;
}
.day-badge {
  background: var(--main); color: #fff; border-radius: 10px;
  padding: 2mm 4mm; font-size: 9pt; font-weight: 700; min-width: 14mm; text-align: center;
}
.day-count { font-size: 8pt; color: var(--muted); }
.day-progress {
  margin-left: auto; display: flex; align-items: center; gap: 2mm;
  font-size: 8pt; color: var(--muted);
}
.progress-bar-wrap {
  width: 30mm; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill { height: 100%; background: var(--mint); border-radius: 3px; transition: width .3s; }

.checklist { display: flex; flex-direction: column; gap: 2mm; }
.check-item {
  background: var(--white); border-radius: 12px; border: 1.5px solid var(--line);
  padding: 3mm 4mm; display: flex; align-items: center; gap: 3mm;
  transition: border-color .2s;
}
.check-item.submitted { border-color: var(--mint); background: var(--mint-lt); }
.check-item.skipped   { opacity: .45; background: #F3F4F6; }

.check-icon {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.check-icon.done    { background: var(--mint);  color: #fff; }
.check-icon.pending { background: var(--line);  color: var(--muted); }
.check-icon.skip    { background: #FEE2E2; color: #991B1B; }

.check-info { flex: 1; }
.check-name { font-size: 9pt; font-weight: 700; color: var(--main); }
.check-meta { font-size: 7.5pt; color: var(--muted); margin-top: .5mm; }
.check-period {
  background: var(--mint-lt); color: #0F6E56; border-radius: 6px;
  padding: 1mm 2.5mm; font-size: 7pt; font-weight: 600; white-space: nowrap;
}
.check-score {
  background: var(--main); color: #fff; border-radius: 8px;
  padding: 1.5mm 3mm; font-size: 8pt; font-weight: 700; white-space: nowrap;
}
.form-link-btn {
  padding: 2mm 4mm; border-radius: 8px; font-size: 8pt; font-weight: 600;
  background: var(--mint); color: #fff; border: none; cursor: pointer;
  font-family: inherit; text-decoration: none; display: inline-flex; align-items: center;

}
.form-link-btn:hover { opacity: .85; }
.form-link-btn.done { background: var(--green-lt); color: var(--green); }

/* 반응형 */
@media (max-width: 900px) {

  .data-table tbody td:nth-child(4) { display: none; }
}

/* ── 기한후 제출 배너 ── */
.late-banner{background:#FFF7ED;border:1.5px solid #F59E0B;border-radius:10px;margin:3mm 0 2mm;padding:3mm 5mm;}
.late-banner-title{font-size:9pt;font-weight:700;color:#92400E;margin-bottom:2mm;display:flex;align-items:center;justify-content:space-between;}
.late-item{display:flex;align-items:center;gap:3mm;padding:2mm 0;border-bottom:1px solid #FDE68A;font-size:8pt;}
.late-item:last-child{border-bottom:none;}
.late-item-info{flex:1;color:#78350F;}
.late-item-check{display:flex;align-items:center;gap:1.5mm;font-size:7.5pt;color:#92400E;}
.late-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#D97706;}
.late-checked{opacity:.5;text-decoration:line-through;}

/* ── 📅 일정 탭 캘린더 ── */
.sch-cal-wrap{padding:2mm 0;max-width:860px;margin:0 auto;}
.sch-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:4mm;}
.sch-month-title{font-size:12pt;font-weight:700;color:var(--ink);}
.sch-nav-btn{background:none;border:1px solid var(--line);border-radius:6px;padding:1.5mm 3mm;cursor:pointer;font-size:9pt;color:var(--ink);}
.sch-legend{display:flex;gap:4mm;margin-bottom:4mm;flex-wrap:wrap;}
.sch-leg{display:flex;align-items:center;gap:1.5mm;font-size:7.5pt;color:var(--muted);}
.sch-dot{width:8px;height:8px;border-radius:50%;}
.sch-dot-g3{background:#1D9E75;}
.sch-dot-g12{background:#378ADD;}
.sch-dot-wk-g3{background:rgba(29,158,117,.18);}
.sch-dot-wk-g12{background:rgba(55,138,221,.18);}
.sch-grid-wrap{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--white);}
.sch-day-row{display:grid;grid-template-columns:repeat(7,1fr);}
.sch-day-lbl{padding:2mm;text-align:center;font-size:7pt;font-weight:600;color:var(--muted);background:#F7F4EE;border-bottom:1px solid var(--line);}
.sch-day-lbl.sun{color:#C0392B;} .sch-day-lbl.sat{color:#2980B9;}
.sch-cell{min-height:70px;padding:2mm;border-right:1px solid var(--line);border-bottom:1px solid var(--line);position:relative;cursor:pointer;transition:background .15s;}
.sch-cell:hover{background:#f0f9f6;}
.sch-cell:nth-child(7n){border-right:none;}
.sch-cell.out{opacity:.5;}
.sch-cell.out:not(.wk-g3):not(.wk-g12){background:#FAFAF8;}
.sch-cell.today .sch-date{background:#D85A30;color:#fff;border-radius:50%;}
.sch-cell.wk-g3{background:rgba(29,158,117,.08);}
.sch-cell.wk-g12{background:rgba(55,138,221,.08);}
.sch-date{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;font-size:8pt;font-weight:500;color:var(--ink);}
.sch-cell.sun .sch-date{color:#C0392B;} .sch-cell.sat .sch-date{color:#2980B9;}
.sch-cell.out .sch-date{color:var(--muted);}
.sch-ev{margin-top:1.5mm;padding:1px 4px;border-radius:3px;font-size:6.5pt;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sch-ev-g3{background:#E1F5EE;color:#0F6E56;border-left:2px solid #1D9E75;}
.sch-ev-g12{background:#E6F1FB;color:#185FA5;border-left:2px solid #378ADD;}
.sch-ev-mock{background:#FEE2E2;color:#991B1B;border-left:2px solid #DC2626;font-weight:700;}
.sch-list{margin-top:5mm;display:flex;flex-direction:column;gap:2.5mm;}
.sch-row{display:flex;align-items:center;gap:3mm;padding:3mm 4mm;background:var(--white);border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:background .15s;}
.sch-row:hover{background:var(--mint-lt);}
.sch-r-date{min-width:40px;font-size:8pt;font-weight:700;color:var(--muted);}
.sch-r-badge{padding:1.5mm 3mm;border-radius:4px;font-size:7.5pt;font-weight:600;}
.sch-r-g3{background:#E1F5EE;color:#0F6E56;}
.sch-r-g12{background:#E6F1FB;color:#185FA5;}
.sch-r-info{flex:1;}

.sch-r-sub{font-size:7.5pt;color:var(--muted);margin-top:0.5mm;}
.sch-r-arrow{font-size:10pt;color:var(--muted);}

// ── 학년 필터 매칭 헬퍼 ──
// filterVal: '고3'|'고2'|'고1'|'중3'|'중2'|'중1'|'초6'|...
// s.grade: '고등'|'중등'|'초등', s.grade_num: 숫자, s.school: 학교명
function matchGradeFilter(s, filterVal) {
  if (!filterVal) return true;
  const gradeCategory = filterVal.slice(0, 1);   // '고'|'중'|'초'
  const gradeNum      = parseInt(filterVal.slice(1));  // 3|2|1|6|5|4

  const categoryMap = { '고': '고등', '중': '중등', '초': '초등' };
  const expectedCat = categoryMap[gradeCategory] || '';

  if (s.grade !== expectedCat) return false;

  // 고3: 재수6, 검정6도 포함
  if (gradeNum === 3 && expectedCat === '고등') {
    const school = s.school || '';
    return s.grade_num === 3 || school === '재수6' || school === '검정6';
  }
  return s.grade_num === gradeNum;
}

function getScheduleRounds() {
  try {
    const saved = localStorage.getItem('iruri_schedule_rounds');
    return saved ? JSON.parse(saved) : DEFAULT_SCHEDULE_ROUNDS;
  } catch(e) { return DEFAULT_SCHEDULE_ROUNDS; }
}
async function saveScheduleRounds(rounds) {
  localStorage.setItem('iruri_schedule_rounds', JSON.stringify(rounds));
  // 서버 동기화: 변경된 항목을 각각 setSchedule API로 저장
  for (const r of rounds) {
    try {
      const url = `${SCRIPT_URL}?action=setSchedule`
        + `&id=${encodeURIComponent(r.id)}`
        + `&examDate=${encodeURIComponent(r.examDate)}`
        + `&weekStart=${encodeURIComponent(r.weekStart)}`
        + `&weekEnd=${encodeURIComponent(r.weekEnd)}`
        + `&period=${encodeURIComponent(r.period || '')}`;
      await fetch(url);
    } catch(e) {
      console.warn('[saveSchedule] 서버 저장 실패:', r.id, e);
    }
  }
}

let calYear = 2026, calMonth = 3;

// containerId: 'schedule-cal' (관리자) 또는 'teacher-schedule-cal' (강사)
function renderScheduleTab(containerId) {
  const wrap = document.getElementById(containerId || 'schedule-cal');
  if (!wrap) return;
  const SCHEDULE_ROUNDS = getScheduleRounds();
  const today = new Date();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const isAdmin = currentUser?.role === 'admin';

  // 월요일 시작: 0=일,1=월,...6=토 → 월요일 기준으로 변환
  function getMondayStart(year, month) {
    const d = new Date(year, month, 1).getDay(); // 0=일
    return (d === 0) ? 6 : d - 1; // 월=0, 화=1, ..., 일=6
  }
  const firstDayOffset = getMondayStart(calYear, calMonth);
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
  const prevLastDate = new Date(calYear, calMonth, 0).getDate();

  function isInWeek(dateStr, r) {
    const d = new Date(dateStr).getTime();
    return d >= new Date(r.weekStart).getTime() && d <= new Date(r.weekEnd).getTime();
  }
  function isExamDay(dateStr, r) { return dateStr === r.examDate; }
  function toDateStr(y, m, d) {
    return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
  }

  let calHtml = `
  <div class="sch-cal-wrap">
    <div class="sch-month-nav">

      <div class="sch-month-title">${calYear}년 ${monthNames[calMonth]}</div>
      <button class="sch-nav-btn" onclick="calNavMonth(1)">다음 →</button>
    </div>
    <div class="sch-legend">
      <div class="sch-leg"><div class="sch-dot sch-dot-g3"></div>고3 시행일</div>
      <div class="sch-leg"><div class="sch-dot sch-dot-g12"></div>고1·2 시행일</div>
      <div class="sch-leg"><div class="sch-dot sch-dot-wk-g3" style="width:20px;height:8px;border-radius:2px;"></div>고3 시행주</div>
      <div class="sch-leg"><div class="sch-dot sch-dot-wk-g12" style="width:20px;height:8px;border-radius:2px;"></div>고1·2 시행주</div>
      <div class="sch-leg"><div class="sch-dot" style="background:#DC2626;"></div>모의고사</div>
      ${isAdmin ? '<button class="sch-nav-btn" onclick="showScheduleEditor()" style="margin-left:auto;">⚙️ 일정 편집</button>' : ''}

    <div class="sch-grid-wrap">
      <div class="sch-day-row">
        <div class="sch-day-lbl">월</div><div class="sch-day-lbl">화</div>
        <div class="sch-day-lbl">수</div><div class="sch-day-lbl">목</div>
        <div class="sch-day-lbl">금</div><div class="sch-day-lbl sat">토</div>
        <div class="sch-day-lbl sun">일</div>
      </div>
      <div class="sch-day-row" style="display:grid;grid-template-columns:repeat(7,1fr);">`;

  // 이전달 날짜 (연하게, 시행주/모의고사 표시는 살림)
  const prevMonth = calMonth === 0 ? 11 : calMonth - 1;
  const prevYear  = calMonth === 0 ? calYear - 1 : calYear;
  for (let i = 0; i < firstDayOffset; i++) {
    const d = prevLastDate - firstDayOffset + i + 1;
    const dateStr = toDateStr(prevYear, prevMonth, d);
    let cls = 'sch-cell out';
    let wkType = '';
    for (const r of SCHEDULE_ROUNDS) {
      if (isInWeek(dateStr, r)) { wkType = r.type; break; }
    }
    if (wkType === 'g3')  cls += ' wk-g3';
    if (wkType === 'g12') cls += ' wk-g12';

    let evHtml = '';
    for (const r of SCHEDULE_ROUNDS) {
      if (isExamDay(dateStr, r)) {
        evHtml += `<div class="sch-ev sch-ev-${r.type}">${r.label}</div>`;
      }
    }
    for (const mx of mockExams) {
      if (mx.date === dateStr) {
        const gradesArr = String(mx.grades || '').split(',').map(s => s.trim()).filter(Boolean);
        const isAll = gradesArr.length === 3 &&
                      gradesArr.includes('1') && gradesArr.includes('2') && gradesArr.includes('3');
        const gradeLabel = isAll ? '' : ('고' + gradesArr.join(','));
        const text = gradeLabel ? (gradeLabel + ' ' + (mx.label || '모의')) : (mx.label || '모의고사');
        evHtml += `<div class="sch-ev sch-ev-mock" title="${mx.label || '모의고사'}${gradeLabel ? ' — ' + gradeLabel : ' — 전 학년'}">🔴 ${text}</div>`;
      }
    }
    calHtml += `<div class="${cls}"><span class="sch-date">${d}</span>${evHtml}</div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = toDateStr(calYear, calMonth, d);
    const rawDow  = new Date(calYear, calMonth, d).getDay(); // 0=일
    const dow     = rawDow === 0 ? 6 : rawDow - 1;          // 월=0 기준
    const isToday = (today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d);

    let cls = 'sch-cell';
    if (dow === 5) cls += ' sat';
    if (dow === 6) cls += ' sun';
    if (isToday)   cls += ' today';

    let wkType = '';
    for (const r of SCHEDULE_ROUNDS) {
      if (isInWeek(dateStr, r)) { wkType = r.type; break; }
    }
    if (wkType === 'g3')  cls += ' wk-g3';
    if (wkType === 'g12') cls += ' wk-g12';

    let evHtml = '';
    for (const r of SCHEDULE_ROUNDS) {
      if (isExamDay(dateStr, r)) {
        evHtml += `<div class="sch-ev sch-ev-${r.type}">${r.label}</div>`;
      }
    }

    // 모의고사 표시 (빨간 배지, 학년 구분)
    for (const mx of mockExams) {
      if (mx.date === dateStr) {
        const gradesArr = String(mx.grades || '').split(',').map(s => s.trim()).filter(Boolean);
        // 전 학년(1,2,3 모두) vs 특정 학년
        const isAll = gradesArr.length === 3 &&
                      gradesArr.includes('1') && gradesArr.includes('2') && gradesArr.includes('3');
        const gradeLabel = isAll ? '' : ('고' + gradesArr.join(','));
        const text = gradeLabel ? (gradeLabel + ' ' + (mx.label || '모의')) : (mx.label || '모의고사');
        evHtml += `<div class="sch-ev sch-ev-mock" title="${mx.label || '모의고사'}${gradeLabel ? ' — ' + gradeLabel : ' — 전 학년'}">🔴 ${text}</div>`;
      }
    }

    const clickRound = SCHEDULE_ROUNDS.find(r => isExamDay(dateStr, r) || isInWeek(dateStr, r));
    const clickAttr  = clickRound ? `onclick="jumpToRound('${clickRound.id}')" style="cursor:pointer;"` : '';

    calHtml += `<div class="${cls}" ${clickAttr}><span class="sch-date">${d}</span>${evHtml}</div>`;
  }

  const totalCells = firstDayOffset + lastDate;
  const remainCells = (7 - (totalCells % 7)) % 7;
  const nextMonth = calMonth === 11 ? 0 : calMonth + 1;
  const nextYear  = calMonth === 11 ? calYear + 1 : calYear;
  for (let i = 1; i <= remainCells; i++) {
    const dateStr = toDateStr(nextYear, nextMonth, i);
    let cls = 'sch-cell out';
    let wkType = '';
    for (const r of SCHEDULE_ROUNDS) {
      if (isInWeek(dateStr, r)) { wkType = r.type; break; }
    }
    if (wkType === 'g3')  cls += ' wk-g3';
    if (wkType === 'g12') cls += ' wk-g12';

    let evHtml = '';
    for (const r of SCHEDULE_ROUNDS) {
      if (isExamDay(dateStr, r)) {
        evHtml += `<div class="sch-ev sch-ev-${r.type}">${r.label}</div>`;
      }
    }
    for (const mx of mockExams) {
      if (mx.date === dateStr) {
        const gradesArr = String(mx.grades || '').split(',').map(s => s.trim()).filter(Boolean);
        const isAll = gradesArr.length === 3 &&
                      gradesArr.includes('1') && gradesArr.includes('2') && gradesArr.includes('3');
        const gradeLabel = isAll ? '' : ('고' + gradesArr.join(','));
        const text = gradeLabel ? (gradeLabel + ' ' + (mx.label || '모의')) : (mx.label || '모의고사');
        evHtml += `<div class="sch-ev sch-ev-mock" title="${mx.label || '모의고사'}${gradeLabel ? ' — ' + gradeLabel : ' — 전 학년'}">🔴 ${text}</div>`;
      }
    }
    calHtml += `<div class="${cls}"><span class="sch-date">${i}</span>${evHtml}</div>`;
  }

  calHtml += `</div></div>`;

  // 목록
  calHtml += `<div class="sch-list">`;
  SCHEDULE_ROUNDS.forEach(r => {
    const ed = new Date(r.examDate);
    const dateLabel = (ed.getMonth()+1) + '/' + ed.getDate();
    calHtml += `
    <div class="sch-row" onclick="jumpToRound('${r.id}')">
      <div class="sch-r-date">${dateLabel}</div>
      <div class="sch-r-badge sch-r-${r.type}">${r.label}</div>
      <div class="sch-r-info">
        <div class="sch-r-title">${r.label} 월간 진단평가</div>
        <div class="sch-r-sub">시행주 ${r.weekStart.slice(5).replace('-','/')}–${r.weekEnd.slice(5).replace('-','/')} · 기준기간 ${r.period}</div>
      </div>
      <div class="sch-r-arrow">→</div>
    </div>`;
  });
  calHtml += `</div></div>`;

  wrap.innerHTML = calHtml;
}

async function saveScheduleEditor() {
  const SCHEDULE_ROUNDS = getScheduleRounds();
  try {
    let changedCount = 0;
    for (let i = 0; i < SCHEDULE_ROUNDS.length; i++) {
      const r  = SCHEDULE_ROUNDS[i];
      const wsEl = document.getElementById('sch-ws-' + i);
      const weEl = document.getElementById('sch-we-' + i);
      const pdEl = document.getElementById('sch-pd-' + i);
      if (!wsEl && !weEl && !pdEl) continue;

      const newWs = wsEl?.value || r.weekStart || '';
      const newWe = weEl?.value || r.weekEnd   || '';
      const newPd = pdEl?.value ?? r.period    ?? '';

      // 변경 사항 없으면 스킵
      if (newWs === (r.weekStart || '') &&
          newWe === (r.weekEnd   || '') &&
          newPd === (r.period    || '')) continue;

      const url = `${SCRIPT_URL}?action=setSchedule`
        + `&id=${encodeURIComponent(r.id)}`
        + `&examDate=${encodeURIComponent(newWs)}`
        + `&weekStart=${encodeURIComponent(newWs)}`
        + `&weekEnd=${encodeURIComponent(newWe)}`
        + `&period=${encodeURIComponent(newPd)}`;
      await fetch(url);
      changedCount++;

      // 로컬도 갱신
      const saved = JSON.parse(localStorage.getItem('iruri_schedule_rounds') || '[]');
      const idx   = saved.findIndex(x => x.id === r.id);
      if (idx >= 0) {
        saved[idx] = { ...saved[idx], examDate: newWs, weekStart: newWs, weekEnd: newWe, period: newPd };
        localStorage.setItem('iruri_schedule_rounds', JSON.stringify(saved));
      }
    }
    document.getElementById('schedule-editor-modal').remove();
    renderScheduleTab();
    if (changedCount > 0) {
      alert(`✅ ${changedCount}개 회차가 저장되었습니다.`);
    } else {
      alert('변경된 내용이 없습니다.');
    }
  } catch (err) {
    console.error('[saveScheduleEditor]', err);
    alert('❌ 저장 중 오류: ' + err.message);
  }
}

async function addScheduleRoundRequest(id, label, type, weekStart, weekEnd, period) {

      + `&id=${encodeURIComponent(id)}`
      + `&label=${encodeURIComponent(label)}`
      + `&type=${encodeURIComponent(type)}`
      + `&weekStart=${encodeURIComponent(weekStart)}`
      + `&weekEnd=${encodeURIComponent(weekEnd)}`

// ══ 기한후 제출 배너 ══════════════════════════════════════════
function renderLateSubmitBanner() {
  const banner = document.getElementById('late-submit-banner');
  if (!banner) return;

  // 관리자만 표시
  if (currentUser?.role !== 'admin') { banner.style.display = 'none'; return; }

  const rounds = getScheduleRounds();
  const now    = new Date();

  // 각 회차의 제출 기한: weekEnd 일요일 18:00
  const deadlines = {};
  rounds.forEach(r => {
    if (!r.weekEnd) return;
    const d = new Date(r.weekEnd + 'T18:00:00');
    deadlines[r.id] = d;
  });

  // lateChecked 상태: localStorage
  const lateChecked = JSON.parse(localStorage.getItem('iruri_late_checked') || '{}');

  // 기한후 제출 수집
  const lateItems = [];
  Object.entries(allSubmits).forEach(([sKey, subs]) => {
    (subs || []).forEach((sub, subIdx) => {
      const roundId_  = sub.round_label || '';
      // 어떤 회차인지 매칭
      const matchedRound = rounds.find(r => {
        const rl = normalizeRound(r.id);
        const rs = normalizeRound(roundId_);
        return rl && rs && (rl.includes(rs) || rs.includes(rl) || rl === rs);
      });
      if (!matchedRound) return;
      const deadline = deadlines[matchedRound.id];
      if (!deadline) return;

      const tsRaw = sub.timestamp || '';
      if (!tsRaw) return;
      // timestamp 파싱 (한국 로캘: '2026. 4. 9. PM 3:22:00' 등)
      const tsDate = new Date(tsRaw);
      if (isNaN(tsDate)) return;
      if (tsDate <= deadline) return;  // 기한 내 제출

      const itemKey = `${matchedRound.id}_${sKey}_${tsRaw}`;
      lateItems.push({
        itemKey,
        sKey,
        name:       sKey.replace(/\d{4}$/, ''),
        round:      matchedRound.label,
        roundId:    matchedRound.id,
        instructor: sub.instructor || '',
        ts:         tsRaw,
        mode:       sub.submit_mode === 'comment_only' ? '코멘트만' : '전체제출',
        checked:    !!(lateChecked[itemKey]) || !!(lateChecked['__status__' + matchedRound.id + '_' + sKey]),
      });
    });
  });

  if (lateItems.length === 0) {
    banner.style.display = 'none';
    return;
  }

  // 미확인 건 먼저, 확인된 건 뒤에
  lateItems.sort((a, b) => {
    if (a.checked !== b.checked) return a.checked ? 1 : -1;
    return new Date(b.ts) - new Date(a.ts);
  });

  const uncheckedCount = lateItems.filter(i => !i.checked).length;

  let html = `<div class="late-banner">
    <div class="late-banner-title">
      <span>⚠️ 기한 후 제출 알림 — 미확인 ${uncheckedCount}건 / 전체 ${lateItems.length}건</span>
      <span style="font-size:7pt;color:#92400E;font-weight:400;">시행주 일요일 18:00 이후 제출</span>
    </div>`;

  lateItems.forEach(item => {
    const ck = item.checked ? 'checked' : '';
    const textCls = item.checked ? 'late-checked' : '';
    html += `
    <div class="late-item" id="late-item-${item.itemKey.replace(/[^a-zA-Z0-9]/g,'_')}">
      <div class="late-item-info ${textCls}">
        <b>${item.name}</b> · ${item.round} · ${item.instructor} · ${item.mode}
        <span style="margin-left:2mm;font-size:7pt;color:#B45309;">${item.ts}</span>
      </div>
      <label class="late-item-check">
        <input type="checkbox" ${ck}
          onchange="toggleLateCheck('${item.itemKey}', '${item.roundId}', '${item.sKey}', this.checked)">
        확인
      </label>
    </div>`;
  });

  html += `</div>`;
  banner.innerHTML = html;
  banner.style.display = 'block';
}

function toggleLateCheck(itemKey, roundId, sKey, checked) {
  const lateChecked = JSON.parse(localStorage.getItem('iruri_late_checked') || '{}');
  lateChecked[itemKey] = checked;
  // 서버 동기화용 status-level 키도 함께 저장
  const statusKey = `${roundId}_${sKey}`;
  lateChecked['__status__' + statusKey] = checked;
  localStorage.setItem('iruri_late_checked', JSON.stringify(lateChecked));

  // 서버에 저장
  serverSaveStatus(statusKey, 'lateChecked', checked ? 'true' : 'false');

  renderLateSubmitBanner();
}

function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  document.getElementById('login-error').style.display = 'none';

  // localStorage에 로그인 정보 저장 (30일 유지)
  const expiry = Date.now() + 30 * 24 * 60 * 60 * 1000;
  localStorage.setItem('iruri_session', JSON.stringify({ id, expiry }));

  applyLogin(id, acc);
  loadData();
}

function applyLogin(id, acc) {
  currentUser = { id, ...acc };
  document.getElementById('user-badge').textContent = acc.name;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');

  if (acc.role === 'teacher') {
    document.getElementById('admin-tabs').style.display = 'none';
    document.getElementById('teacher-view').style.display = 'block';
    document.getElementById('admin-view').style.display = 'none';
  } else {
    document.getElementById('admin-tabs').style.display = 'flex';
    document.getElementById('teacher-view').style.display = 'none';
    document.getElementById('admin-view').style.display = 'block';
  }

  // 역할 결정 후 공지 적용 (편집 버튼은 admin만 노출)
  applyNotices();
}

// 페이지 로드 시 자동 로그인 체크
function checkAutoLogin() {
  try {
    const session = JSON.parse(localStorage.getItem('iruri_session') || 'null');
    if (!session) { console.log('[AutoLogin] 세션 없음'); return false; }
    if (Date.now() > session.expiry) {
      console.log('[AutoLogin] 세션 만료');
      localStorage.removeItem('iruri_session');
      return false;
    }
    const acc = ACCOUNTS[session.id];
    if (!acc) { console.log('[AutoLogin] 계정 없음:', session.id); return false; }
    console.log('[AutoLogin] 자동 로그인 성공:', session.id);
    applyLogin(session.id, acc);
    return true;
  } catch(e) { console.log('[AutoLogin] 오류:', e); return false; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen') && !document.getElementById('login-screen').classList.contains('hidden')) {
    doLogin();
  }
});

function doLogout() {
  currentUser = null;
  localStorage.removeItem('iruri_session');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
}

// 간단한 마크다운 → HTML 변환
// 지원: **굵게**, *기울임*, 줄바꿈, 라인 시작 • 또는 - (불릿)
function renderNoticeMarkdown(text) {
  if (!text) return '<span style="color:var(--muted);">(공지 없음)</span>';
  // HTML 이스케이프 먼저
  let html = String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  // **굵게**
  html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  // *기울임* (굵게 처리 후이므로 안전)
  html = html.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, '<i>$1</i>');
  // 줄바꿈을 <br>로
  html = html.replace(/\n/g, '<br>');
  return html;
}

          <button class="modal-ok" onclick="saveNoticeEditor()" style="background:#1D4ED8;color:#fff;">💾 저장</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  window._noticeEditingTab = initialTab;
  switchNoticeTab(initialTab);
}

function closeNoticeEditor() {
  const m = document.getElementById('notice-editor-modal');
  if (m) m.remove();
}

function switchNoticeTab(target) {
  // 현재 textarea 값을 임시 보관 (탭 전환 시 잃지 않게)
  const ta = document.getElementById('notice-editor-textarea');
  if (ta && window._noticeEditingTab) {
    if (!window._noticeDraft) window._noticeDraft = {};
    window._noticeDraft[window._noticeEditingTab] = ta.value;
  }

  window._noticeEditingTab = target;

  // 탭 스타일
  ['admin', 'teacher'].forEach(t => {
    const btn = document.getElementById('notice-tab-' + t);
    if (!btn) return;
    if (t === target) {
      btn.style.borderBottomColor = '#1D4ED8';
      btn.style.color = '#1D4ED8';
    } else {
      btn.style.borderBottomColor = 'transparent';
      btn.style.color = 'var(--muted)';
    }
  });

  // textarea 값 채우기 (draft 우선, 없으면 서버값)
  if (ta) {
    const draft = window._noticeDraft && window._noticeDraft[target];
    ta.value = draft != null ? draft : (noticesData[target] || '');
    updateNoticePreview();
  }
}

function updateNoticePreview() {
  const ta = document.getElementById('notice-editor-textarea');
  const pv = document.getElementById('notice-editor-preview');
  if (ta && pv) pv.innerHTML = renderNoticeMarkdown(ta.value);
}

async function saveNoticeEditor() {
  const ta = document.getElementById('notice-editor-textarea');
  const target = window._noticeEditingTab || 'admin';
  if (!ta) return;
  const content = ta.value;

  try {
    const url = `${SCRIPT_URL}?action=setNotice`
      + `&target=${encodeURIComponent(target)}`
      + `&content=${encodeURIComponent(content)}`
      + `&updatedBy=${encodeURIComponent(currentUser?.username || 'admin')}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.result === 'success') {
      noticesData[target] = content;
      // draft도 갱신
      if (!window._noticeDraft) window._noticeDraft = {};
      window._noticeDraft[target] = content;
      applyNotices();
      alert('✅ ' + (target === 'admin' ? '관리자/실장용' : '강사용') + ' 공지가 저장되었습니다.');
    } else {
      alert('❌ 저장 실패: ' + (json.message || '알 수 없는 오류'));
    }
  } catch (err) {
    console.error('[saveNotice] 오류:', err);
    alert('❌ 저장 중 오류 발생: ' + err.message);
  }
}

// ══ 데이터 로드 ══
async function loadData() {
  // 공지사항 병렬 로드 (대시보드 데이터 로드와 동시 진행)
  loadNotices();

  try {
    // 학생 목록 (timetable 기반)
    const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
    const json = await res.json();
    if (json.result === 'success') {
      studentData   = json.students     || [];
      submittedData = json.submitted    || {};
      allSubmits    = json.allSubmitted || {};
      mockExams     = json.mockExams    || [];
      // 서버 schedule_rounds → localStorage 갱신 (서버값 우선)
      if (json.scheduleRounds && json.scheduleRounds.length > 0) {
        localStorage.setItem('iruri_schedule_rounds', JSON.stringify(json.scheduleRounds));
      }
      // 서버 round_status → statusData에 병합 (서버값 우선)
      const serverStatus = json.roundStatus || {};
      Object.entries(serverStatus).forEach(([key, val]) => {
        statusData[key] = {
          ...(statusData[key] || {}),
          ...val,
        };
        delete statusData[key]._row;
        // pdfGenerated → pdfStatus 동기화
        if (val.pdfGenerated) pdfStatus[key] = true;
        // execInstructor → execData 동기화
        if (val.execInstructor) execData[key] = val.execInstructor;
        // lateChecked → iruri_late_checked 동기화
        if (val.lateChecked !== undefined) {
          try {
            const _lc   = JSON.parse(localStorage.getItem('iruri_late_checked') || '{}');
            // statusKey 기반으로 저장된 lateChecked를 복원
            // key 패턴: roundId_sKey → lateChecked 값
            _lc['__status__' + key] = !!val.lateChecked;
            localStorage.setItem('iruri_late_checked', JSON.stringify(_lc));
          } catch(e) {}
        }
        // chosenIdx → iruri_chosen 동기화
        if (val.chosenIdx !== undefined && val.chosenIdx !== '') {
          const _parts = key.split('_');
          const _sKey  = _parts.slice(1).join('_');
          try {
            const _chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
            _chosen[_sKey] = parseInt(val.chosenIdx);
            localStorage.setItem('iruri_chosen', JSON.stringify(_chosen));
          } catch(e) {}
        }
      });
      // 로컬에 저장된 유효본 선택 반영
      const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
      Object.entries(chosen).forEach(([sKey, idx]) => {
        const list = allSubmits[sKey];
        if (list && list[idx]) submittedData[sKey] = list[idx];
      });
    }
  } catch(e) {
    console.warn('데이터 로드 실패');
    // 서버 실패 시 localStorage로 fallback
    try {
      statusData = JSON.parse(localStorage.getItem('iruri_status') || '{}');
      pdfStatus  = JSON.parse(localStorage.getItem('iruri_pdf') || '{}');
      execData   = JSON.parse(localStorage.getItem('iruri_exec') || '{}');
      if (Object.keys(allSubmits).length === 0) {
        allSubmits = JSON.parse(localStorage.getItem('iruri_all_submits') || '{}');
      }
    } catch(e2) {}
  }

  // execData: 서버 성공 시엔 roundStatus에서 이미 동기화됨
  // 서버 실패(catch) 시엔 위에서 localStorage fallback 처리됨
  // 여기서는 서버에 없는 로컬 전용 키만 보완 (덮어쓰지 않음)
  try {
    const localExec = JSON.parse(localStorage.getItem('iruri_exec') || '{}');
    Object.entries(localExec).forEach(([k, v]) => {
      if (!execData[k]) execData[k] = v;  // 서버에 없는 것만 로컬로 보완
    });
    if (Object.keys(allSubmits).length === 0) {
      allSubmits = JSON.parse(localStorage.getItem('iruri_all_submits') || '{}');
    }
  } catch(e) {}
  // ※ statusData, pdfStatus는 서버(round_status)에서 이미 로드됨 → localStorage로 덮어쓰지 않음

  renderStudentTab();
  renderInstructorTab();
  renderLateSubmitBanner();
  if (currentUser?.role === 'teacher') renderTeacherView();
}

// 회차 변경 시 학년 필터 자동 설정
function onRoundChange(tab) {
  const selId = tab === 'student' ? 'round-select-student' : 'round-select-instructor';
  const gradeId = tab === 'student' ? 'filter-grade' : 'filter-grade-instructor';
  const round = document.getElementById(selId)?.value || '';
  const gradeEl = document.getElementById(gradeId);
  if (gradeEl) {
    if (round.startsWith('고3')) gradeEl.value = '고3';
    else if (round.startsWith('고12')) {
      // 고1·2 회차: 고1과 고2 둘 다 해당 → 기본값 '고1' 선택 (드롭다운에 없으면 초기화)
      gradeEl.value = '고2'; // 고2가 없으면 ''로 fallback
      if (!gradeEl.value) gradeEl.value = '';
    }
  }
  if (tab === 'student') renderStudentTab();
  else renderInstructorTab();
}

function renderStudentTab() {
  const round = document.getElementById('round-select-student').value;

  let students = studentData;
  if (currentUser && currentUser.role === 'manager') {
    students = students.filter(s => s.manager === currentUser.manager);
  }

  // 담당실장 필터 버튼
  const managers = ['all', ...new Set(students.map(s => s.manager).filter(Boolean))];
  const mf = document.getElementById('manager-filter');
  mf.innerHTML = managers.map(m => `
    <button class="filter-btn ${activeManagerFilter === m ? 'active' : ''}"
      onclick="activeManagerFilter='${m}';renderStudentTab()">
      ${m === 'all' ? '전체' : m + ' 실장'}
    </button>`).join('');

  if (activeManagerFilter !== 'all') {
    students = students.filter(s => s.manager === activeManagerFilter);
  }

  // 강사 드롭다운 채우기
  const instrSel = document.getElementById('filter-instructor');
  if (instrSel) {
    const instrCurrent = instrSel.value;
    const instructors = [...new Set(students.flatMap(s => s.instructors || [s.instructor]).filter(Boolean))].sort();
    instrSel.innerHTML = '<option value="">강사 전체</option>' +
      instructors.map(i => `<option value="${i}" ${instrCurrent===i?'selected':''}>${i}</option>`).join('');
  }

  // 검색·필터 값
  const searchVal   = (document.getElementById('search-name')?.value || '').trim().toLowerCase();
  const filterGrade = document.getElementById('filter-grade')?.value || '';
  const filterInst  = document.getElementById('filter-instructor')?.value || '';
  const filterVer   = document.getElementById('filter-version')?.value || '';
  const filterSub   = document.getElementById('filter-submitted')?.value || '';
  const filterMathRev    = document.getElementById('filter-math-reviewed')?.value || '';
  const filterManagerRev = document.getElementById('filter-manager-reviewed')?.value || '';
  const filterSent  = document.getElementById('filter-sent')?.value || '';

  const activeCount = [searchVal, filterGrade, filterInst, filterVer, filterSub, filterMathRev, filterManagerRev, filterSent].filter(Boolean).length;
  const countEl = document.getElementById('filter-count');
  if (countEl) {
    countEl.style.display = activeCount > 0 ? 'inline-block' : 'none';
    countEl.textContent = `${activeCount}개 필터 적용 중`;
  }

  // 통계: 현재 회차 기준 (고등부 + 해당 학년만)
  const roundIs3Stat  = round.startsWith('고3');
  const hsStudents = students.filter(s =>
    s.grade === '고등' &&
    (roundIs3Stat ? s.grade_num === 3 : (s.grade_num === 1 || s.grade_num === 2))
  );
  const submittedCount = hsStudents.filter(s => !!getSubmissionForRound(s.key || s.name, round)).length;
  document.getElementById('round-stats-student').innerHTML = `
    <span class="stat-pill total">전체 ${hsStudents.length}명</span>
    <span class="stat-pill done">제출완료 ${submittedCount}명</span>
    <span class="stat-pill pending">미제출 ${hsStudents.length - submittedCount}명</span>`;

  const tbody = document.getElementById('student-tbody');
  tbody.innerHTML = '';

  const sorted = [...students].sort((a, b) => {
    const o = { '고등': 0, '중등': 1, '초등': 2 };
    return (o[a.grade] ?? 3) - (o[b.grade] ?? 3) || a.name.localeCompare(b.name, 'ko');
  });

  let visibleCount = 0;
  sorted.forEach(s => {
    if (isPracticeStudent(s)) return;
    // 미수강 학생: 현재 선택 회차에 제출 기록이 있을 때만 표시
    if (s.isWithdrawn) {
      const rounds = s.submittedRounds || [];
      const hasThisRound = rounds.some(rl => {
        const a = normalizeRound(rl), b = normalizeRound(round);
        return a && b && (a.includes(b) || b.includes(a) || roundId(a) === roundId(b));
      });
      if (!hasThisRound) return;
    }
    const isHS = s.grade === '고등';
    const sKey = s.key || s.name;
    const statusKey = `${round}_${sKey}`;
    const roundSub    = getSubmissionForRound(sKey, round);  // 현재 회차 제출
    const sub         = roundSub || submittedData[sKey] || submittedData[`key:${sKey}`];
    const isSubmitted = !!roundSub;
    if (roundSub) submittedData[sKey] = roundSub;
    const isPdf        = !!pdfStatus[statusKey];
    const isSent       = !!(statusData[statusKey]?.sent);
    // isSkipped: 제출기록이 있으면 skip 상태여도 정상 행으로 표시
    // (드롭다운의 skip-acad/withdraw/new 선택값은 유지됨 — examStatus는 건드리지 않음)
    const rawSkipped   = !!(statusData[statusKey]?.skipped);
    const isSkipped    = rawSkipped && !isSubmitted;
    const examStatus   = statusData[statusKey]?.examStatus || '';
    const isMathRev    = !!(statusData[statusKey]?.mathReviewed);
    const isManagerRev = !!(statusData[statusKey]?.managerReviewed);
    const isReviewed   = isMathRev; // legacy compat

    // 필터 적용
    if (searchVal && !s.name.toLowerCase().includes(searchVal)) return;
    if (filterGrade) {
      if (!matchGradeFilter(s, filterGrade)) return;
    }
    if (filterInst) {
      const myInsts = Array.isArray(s.instructors) ? s.instructors : [s.instructor];
      if (!myInsts.includes(filterInst)) return;
    }
    if (filterVer && sub?.version !== filterVer) return;
    if (filterSub === 'done'    && (!isHS || !isSubmitted || isSkipped)) return;
    if (filterSub === 'pending' && (!isHS || isSubmitted || isSkipped)) return;
    if (filterMathRev === 'done'    && !isMathRev)    return;
    if (filterMathRev === 'pending' &&  isMathRev)    return;
    if (filterManagerRev === 'done'    && !isManagerRev) return;
    if (filterManagerRev === 'pending' &&  isManagerRev) return;
    if (filterSent === 'done'   && !isSent) return;
    if (filterSent === 'pending' && isSent) return;

    visibleCount++;

    const allSubs = allSubmits[sKey] || (sub ? [sub] : []);
    const hasDup  = allSubs.length > 1;

    // 점수 / 버전 분리
    const scoreHtml = isHS && !isSkipped && isSubmitted && sub?.correct_q != null
      ? `<span class="score-badge">${sub.correct_q}<span class="sub">/${sub.total_q||'?'}</span></span>`
      : `<span style="color:var(--muted);font-size:7.5pt">-</span>`;
    const versionHtml = isHS && !isSkipped && isSubmitted && sub?.version
      ? `<span style="background:${sub.version==='A'?'#1D9E75':sub.version==='B'?'var(--main)':'#7C3AED'};color:#fff;border-radius:5px;padding:1.5mm 3.5mm;font-size:8pt;font-weight:700;">${sub.version}</span>`
      : `<span style="color:var(--muted);font-size:7.5pt">-</span>`;

    const instructorText = Array.isArray(s.instructors) && s.instructors.length
      ? s.instructors.join(', ') : (s.instructor || '-');

    const schedTags = (s.schedules || []).map(sc =>
      `<span class="sched-tag">${sc.day}요일 ${sc.period}구간</span>`).join('');

    // 시행담당 열
    const execHtml = isHS && !isSkipped ? execDropdownHtml(round, sKey, s) : '-';

    // 코멘트 전용 여부
    const modeTag = sub?.submit_mode === 'comment_only'
      ? `<span style="background:#F5F0E8;color:var(--muted);border-radius:5px;padding:1px 4px;font-size:7pt;margin-left:1.5mm;">코멘트만</span>` : '';

    // 시행완료 배지
    const completeBadge = isHS && !isSkipped
      ? `<div style="display:flex;align-items:center;gap:1mm;flex-wrap:wrap;">
           ${isSubmitted
             ? `<button class="status-badge done" style="cursor:pointer;border:none;" onclick="showSubmitDetail('${sKey}','${s.name}','${round}')">✅ 완료</button>`
             : `<span class="status-badge pending">⏳ 미제출</span>`}
           ${isSubmitted ? modeTag : ''}
           ${hasDup ? `<button class="dup-btn" onclick="showSubmitPopup('${sKey}','${s.name}','${round}')">📋 ${allSubs.length}건</button>` : ''}
         </div>`
      : `<span class="status-badge na">미시행</span>`;

    const row = document.createElement('tr');
    if (!isHS || isSkipped) row.classList.add('inactive-row');
    row.innerHTML = `
      <td class="name-cell">${s.name}</td>
      <td class="muted">${(s.school ? s.school+' ' : '')+(s.grade_num ? s.grade_num+'학년' : '')}</td>
      <td class="muted">${instructorText}</td>
      <td>${execHtml}</td>
      <td><div class="schedule-tags">${schedTags||'<span style="color:var(--muted);font-size:7pt">-</span>'}</div></td>
      <td class="muted">${s.manager||'-'}</td>
      <td>${scoreHtml}</td>
      <td>${versionHtml}</td>
      <td>${completeBadge}</td>
      <td>${isHS && !isSkipped
        ? `<button class="gen-btn" onclick="generatePDF('${statusKey}','${s.name}')" ${!isSubmitted?'disabled title="강사 제출 후 생성 가능"':''}>
            ${isPdf?'✅ 재생성':'📄 생성'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${isHS && !isSkipped
        ? `<button class="toggle-btn ${isMathRev?'on':'off'}" onclick="toggleStatus('${statusKey}','mathReviewed')" title="수학관 검수">
            ${isMathRev?'✅':'수학관'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${isHS && !isSkipped
        ? `<button class="toggle-btn ${isManagerRev?'on':'off'}" onclick="toggleStatus('${statusKey}','managerReviewed')" title="실장 검수">
            ${isManagerRev?'✅':'실장'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${isHS && !isSkipped
        ? `<button class="toggle-btn ${isSent?'on':'off'}" onclick="toggleStatus('${statusKey}','sent')">
            ${isSent?'✅ 발송':'미발송'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${buildExamStatusCell(statusKey, s, isHS, isSkipped, examStatus)}</td>`;
    tbody.appendChild(row);
  });

  document.getElementById('student-count').textContent =
    visibleCount < sorted.filter(s=>!isPracticeStudent(s)).length
      ? `${visibleCount}명 (필터 적용)`
      : `총 ${visibleCount}명`;
}
function renderInstructorTab() {

  let students = [...studentData];  // 중등/초등 포함
  if (currentUser && currentUser.role === 'manager') {
    students = students.filter(s => s.manager === currentUser.manager);
  }

  // 강사 목록
  const instructors = ['all', ...new Set(students.map(s => s.instructor).filter(Boolean)).values()].sort();
  const ifilter = document.getElementById('instructor-filter');

      onclick="activeInstructorFilter='${i}';renderInstructorTab()">
