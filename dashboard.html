    <span class="stat-pill pending">미제출 ${students.length - submittedCountInst}명</span>`;

  const searchValI   = (document.getElementById('search-name-instructor')?.value || '').trim().toLowerCase();
  const filterGradeI = document.getElementById('filter-grade-instructor')?.value || '';
  const filterVerI      = document.getElementById('filter-version-instructor')?.value || '';
  const filterSubI      = document.getElementById('filter-submitted-instructor')?.value || '';
  const filterMathRevI  = document.getElementById('filter-math-reviewed')?.value || '';
  const filterMgrRevI   = document.getElementById('filter-manager-reviewed')?.value || '';

  const title = activeInstructorFilter === 'all' ? '전체 강사 현황' : `${activeInstructorFilter} 강사 담당 학생`;
  document.getElementById('instructor-section-title').textContent = title;
  document.getElementById('instructor-count').textContent = `총 ${students.length}명`;

  const tbody = document.getElementById('instructor-tbody');
  tbody.innerHTML = '';

  students.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  for (const s of students) {
    if (isPracticeStudent(s)) continue;
    // 미수강 학생: 현재 선택 회차에 제출 기록이 있을 때만 표시
    if (s.isWithdrawn) {
      const rounds = s.submittedRounds || [];
      const hasThisRound = rounds.some(rl => {
        const a = normalizeRound(rl), b = normalizeRound(round);
        return a && b && (a.includes(b) || b.includes(a) || roundId(a) === roundId(b));
      });
      if (!hasThisRound) continue;
    }
    const sKey = s.key || s.name;
    const statusKey = `${round}_${sKey}`;
    const roundSub    = getSubmissionForRound(sKey, round);
    const isSubmitted = !!roundSub;
    if (roundSub) submittedData[sKey] = roundSub;
    const isPdf        = !!pdfStatus[statusKey];
    const isSent       = !!(statusData[statusKey]?.sent);
    // 제출기록이 있으면 skip 상태여도 정상 행으로 표시
    const rawSkipped   = !!(statusData[statusKey]?.skipped);
    const isSkipped    = rawSkipped && !isSubmitted;
    const examStatus   = statusData[statusKey]?.examStatus || '';
    const isMathRev    = !!(statusData[statusKey]?.mathReviewed);
    const isManagerRev = !!(statusData[statusKey]?.managerReviewed);
    const isReviewed   = isMathRev; // legacy compat
    const sub = submittedData[sKey] || submittedData[`key:${sKey}`];
    const allSubs = allSubmits[sKey] || (sub ? [sub] : []);
    const hasDup = allSubs.length > 1;
    const isHS = s.grade === '고등';

    // 검색/필터 적용
    if (searchValI && !s.name.toLowerCase().includes(searchValI)) continue;
    if (filterGradeI) {
      if (!matchGradeFilter(s, filterGradeI)) continue;
    }
    if (filterVerI && sub?.version !== filterVerI) continue;
    if (filterSubI === 'done'    && !isSubmitted) continue;
    if (filterSubI === 'pending' && isSubmitted)  continue;
    const isMathRevI    = !!(statusData[statusKey]?.mathReviewed);
    const isManagerRevI = !!(statusData[statusKey]?.managerReviewed);
    if (filterMathRevI  === 'done'    && !isMathRevI)    continue;
    if (filterMathRevI  === 'pending' &&  isMathRevI)    continue;
    if (filterMgrRevI   === 'done'    && !isManagerRevI) continue;
    if (filterMgrRevI   === 'pending' &&  isManagerRevI) continue;
    const scoreHtml = isHS && !isSkipped && isSubmitted && sub?.correct_q != null
      ? `<span class="score-badge">${sub.correct_q}<span class="sub">/${sub.total_q||'?'}</span></span>`
      : `<span style="color:var(--muted);font-size:7.5pt">-</span>`;
    const versionHtml = isHS && !isSkipped && isSubmitted && sub?.version
      ? `<span style="background:${sub.version==='A'?'#1D9E75':sub.version==='B'?'var(--main)':'#7C3AED'};color:#fff;border-radius:5px;padding:1.5mm 3.5mm;font-size:8pt;font-weight:700;">${sub.version}</span>`
      : `<span style="color:var(--muted);font-size:7.5pt">-</span>`;

    const instructorText = Array.isArray(s.instructors) && s.instructors.length
      ? s.instructors.join(', ') : (s.instructor || '-');
    const schedTags = (s.schedules || []).map(sc =>
      `<span class="sched-tag">${sc.day}요일 ${sc.period}구간</span>`).join('');
    const execHtml = !isSkipped ? execDropdownHtml(round, sKey, s) : '-';
    const modeTag = sub?.submit_mode === 'comment_only'
      ? `<span style="background:#F5F0E8;color:var(--muted);border-radius:5px;padding:1px 4px;font-size:7pt;margin-left:1.5mm;">코멘트만</span>` : '';

    const row = document.createElement('tr');
    if (isSkipped) row.classList.add('inactive-row');
    // 퇴원생이라도 해당 회차 제출기록이 있으면 일반 표시 (필터 통과한 퇴원생 = 제출기록 있음)
    row.innerHTML = `
      <td class="name-cell">${s.name}</td>
      <td class="muted">${(s.school ? s.school+' ' : '')+(s.grade_num ? s.grade_num+'학년' : '')}</td>
      <td class="muted">${instructorText}</td>
      <td>${execHtml}</td>
      <td><div class="schedule-tags">${schedTags||'-'}</div></td>
      <td class="muted">${s.manager||'-'}</td>
      <td>${scoreHtml}</td>
      <td>${versionHtml}</td>
      <td>${!isSkipped
        ? `<div style="display:flex;align-items:center;gap:1mm;flex-wrap:wrap;">
             ${isSubmitted
               ? `<button class="status-badge done" style="cursor:pointer;border:none;" onclick="showSubmitDetail('${sKey}','${s.name}','${round}')">✅ 완료</button>`
               : `<span class="status-badge pending">⏳ 미제출</span>`}
             ${isSubmitted?modeTag:''}
             ${hasDup?`<button class="dup-btn" onclick="showSubmitPopup('${sKey}','${s.name}','${round}')">📋 ${allSubs.length}건</button>`:''}
           </div>`
        : `<span class="status-badge na">미시행</span>`}</td>
      <td>${!isSkipped
        ? `<button class="gen-btn" onclick="generatePDF('${statusKey}','${s.name}')" ${!isSubmitted?'disabled':''}>${isPdf?'✅ 재생성':'📄 생성'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${!isSkipped
        ? `<button class="toggle-btn ${isMathRev?'on':'off'}" onclick="toggleStatus('${statusKey}','mathReviewed')">${isMathRev?'✅':'수학관'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${!isSkipped
        ? `<button class="toggle-btn ${isManagerRev?'on':'off'}" onclick="toggleStatus('${statusKey}','managerReviewed')">${isManagerRev?'✅':'실장'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${!isSkipped
        ? `<button class="toggle-btn ${isSent?'on':'off'}" onclick="toggleStatus('${statusKey}','sent')">${isSent?'✅ 발송':'미발송'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${buildExamStatusCell(statusKey, s, isHS, isSkipped, examStatus)}</td>`;
    tbody.appendChild(row);
  }
}

// ══ 강사 전용 뷰 렌더 ══
const DAY_ORDER = ['월','화','수','목','금','토','일'];
const FORM_URL  = 'https://irurimath.github.io/IRURI-MATH'; // 강사입력폼 URL

function renderTeacherView() {
  if (!currentUser || currentUser.role !== 'teacher') return;
  const myName = currentUser.instructor;
  const round  = document.getElementById('round-select-teacher').value;

  // 선택된 회차가 고3용인지 고1·2용인지
  const roundIs3  = round.startsWith('고3');
  const roundIs12 = round.startsWith('고12');

  // 내 담당 학생만 (연습 데이터 제외)
  const myStudents = studentData.filter(s => {
    if (s.grade !== '고등') return false;
    if (isPracticeStudent(s)) return false;
    if (!(s.instructor === myName || (s.instructors || []).includes(myName))) return false;
    // 미수강 학생: 현재 선택 회차에 제출 기록이 있을 때만 표시
    if (s.isWithdrawn) {
      const rounds = s.submittedRounds || [];
      return rounds.some(rl => {
        const a = normalizeRound(rl), b = normalizeRound(round);
        return a && b && (a.includes(b) || b.includes(a) || roundId(a) === roundId(b));
      });
    }
    return true;
  });

  // 통계 (선택 회차 대상 학생 기준)
  const roundStudents = myStudents.filter(s =>
    roundIs3 ? s.grade_num === 3 : (s.grade_num === 1 || s.grade_num === 2)
  );
  const submittedCountT = roundStudents.filter(s => !!getSubmissionForRound(s.key || s.name, round)).length;
  document.getElementById('teacher-stats').innerHTML = `
    <span class="stat-pill total">담당 ${roundStudents.length}명</span>
    <span class="stat-pill done">제출완료 ${submittedCountT}명</span>
    <span class="stat-pill pending">미제출 ${roundStudents.length - submittedCountT}명</span>`;

  // 요일별 그룹핑 — 이 강사의 수업 요일만 표시
  const byDay = {};
  DAY_ORDER.forEach(d => byDay[d] = []);

  myStudents.forEach(s => {
    const sKey = s.key || s.name;
    const statusKey = `${round}_${sKey}`;
    const rawSkipped  = !!(statusData[statusKey]?.skipped);
    const examStatus  = statusData[statusKey]?.examStatus || '';
    const isNewSt     = false;
    // 시행담당 제출 (점수/오답 표시용)
    const roundSub = getSubmissionForRound(sKey, round);
    if (roundSub) submittedData[sKey] = roundSub;
    const sub = roundSub || submittedData[sKey];

    const myRole = getInstructorRole(round, sKey, s, myName);
    const isExec = myRole === 'exec';

    // ★ 역할별 제출 완료 판단
    // 시행담당: roundSub 기준 (점수 포함 제출)
    // 코멘트 역할: 본인 이름으로 해당 회차에 제출한 기록 기준
    const myOwnSub = isExec
      ? roundSub
      : (allSubmits[sKey] || []).slice().reverse().find(r => {
          const rl = normalizeRound(r.round_label || '');
          const rr = normalizeRound(round);
          return r.instructor === myName &&
                 (rl.includes(rr) || rr.includes(rl) || roundId(rl) === roundId(rr));
        }) || null;
    const isSubmitted = !!myOwnSub;

    // 제출기록이 있으면 skip 상태여도 정상 행으로 표시 (드롭다운 값은 유지)
    const isSkipped = rawSkipped && !isSubmitted;

    const isTargetGrade = roundIs3
      ? s.grade_num === 3
      : (s.grade_num === 1 || s.grade_num === 2);

    // ★ 핵심 수정: 이 강사가 가르치는 요일만 필터링
    // schedules에서 담당 강사 정보가 없으므로 timetable 원본 기준으로
    // instructors 배열이 1명이면 전체 요일, 2명 이상이면 강사별 요일 분리 필요
    // → studentData에 instructorSchedules가 있으면 사용, 없으면 전체 사용
    const mySchedules = (s.instructorSchedules && s.instructorSchedules[myName])
      ? s.instructorSchedules[myName]
      : s.schedules || [];

    const days = [...new Set(mySchedules.map(sc => sc.day))];
    if (days.length === 0) days.push('미정');

    days.forEach(day => {
      const periods = mySchedules
        .filter(sc => sc.day === day)
        .map(sc => sc.period + '구간');
      if (!byDay[day]) byDay[day] = [];
      byDay[day].push({
        ...s, sKey, statusKey, isSkipped, examStatus, isNewSt,
        isSubmitted, myOwnSub, sub, periodsOfDay: periods, myRole, isExec, isTargetGrade
      });
    });
  });

  const body = document.getElementById('teacher-body');
  body.innerHTML = '';

  DAY_ORDER.forEach(day => {
    const list = byDay[day];
    if (!list || list.length === 0) return;

    // 정렬: 1순위 구간(숫자), 2순위 가나다
    list.sort((a, b) => {
      const pa = parseInt((a.periodsOfDay[0] || '').replace(/\D/g,'')) || 9;
      const pb = parseInt((b.periodsOfDay[0] || '').replace(/\D/g,'')) || 9;
      if (pa !== pb) return pa - pb;
      return a.name.localeCompare(b.name, 'ko');
    });

    // 진척도: 중복 제거한 실제 학생 수 기준
    const uniqueTarget = [...new Map(
      list.filter(s => s.isTargetGrade && !s.isSkipped).map(s => [s.sKey, s])
    ).values()];
    const targetCount = uniqueTarget.length;
    // isSubmitted가 이미 역할별로 정확히 계산됨
    const doneCount = uniqueTarget.filter(s => s.isSubmitted).length;
    const pct = targetCount > 0 ? Math.round(doneCount / targetCount * 100) : 0;

    const sec = document.createElement('div');
    sec.className = 'day-section';
    sec.innerHTML = `
      <div class="day-header">
        <div class="day-badge">${day}요일</div>
        <div class="day-count">${list.length}명</div>
        <div class="day-progress">
          <span>${doneCount}/${targetCount} 제출</span>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span>${pct}%</span>
        </div>
      </div>
      <div class="checklist" id="checklist-${day}"></div>`;
    body.appendChild(sec);

    const cl = document.getElementById(`checklist-${day}`);
    list.forEach(s => {
      const item = document.createElement('div');
      // isSubmitted가 이미 역할별로 정확히 계산됨
      item.className = `check-item${s.isSubmitted ? ' submitted' : ''}${s.isSkipped ? ' skipped' : ''}`;

      // 선택 회차 대상 학년이 아닌 학생은 흐릿하게 (고3 선택 시 고1·2, 고1·2 선택 시 고3)
      if (!s.isTargetGrade) {
        item.style.opacity = '0.35';
        item.style.pointerEvents = 'none';
      }

      const iconClass = s.isSkipped ? 'skip' : (s.isSubmitted ? 'done' : 'pending');
      const iconChar  = s.isSkipped ? '⛔' : (s.isSubmitted ? '✓' : '○');

      // 점수+버전 한 번만 표시 (5/8 B 형태)
      const scoreHtml = s.sub?.correct_q != null
        ? `<span class="check-score">${s.sub.correct_q}/${s.sub.total_q||'?'} ${s.sub.version||''}</span>`
        : '';

      const periodTags = s.periodsOfDay.map(p => `<span class="check-period">${p}</span>`).join('');

      // 역할 배지
      const roleBadge = isMultiInstructor(s)
        ? (s.isExec
            ? `<span style="background:var(--mint-lt);color:#0F6E56;border-radius:6px;padding:1mm 2.5mm;font-size:7pt;font-weight:700;">🟢 시행담당</span>`
            : `<span style="background:var(--blue-lt);color:var(--blue);border-radius:6px;padding:1mm 2.5mm;font-size:7pt;font-weight:700;">💬 코멘트만</span>`)
        : '';

      // 버튼 — 역할에 따라 다르게
      let btnHtml;
      // 발송 완료 시 리포트 열람 버튼 (강사용)
      const isSentForStudent = !!(statusData[s.statusKey]?.sent);
      const isPdfForStudent  = !!(pdfStatus[s.statusKey]);

      // ── 드롭다운: btnHtml과 분리, 항상 오른쪽 위에 표시 ──
      const curVal2  = s.examStatus || '';
      const opt2     = EXAM_STATUS_OPTIONS.find(o => o.v === curVal2);
      const stClass2 = opt2?.cls || '';
      const opts2    = EXAM_STATUS_OPTIONS.map(o =>
        `<option value="${o.v}" ${o.v === curVal2 ? 'selected' : ''}>${o.l}</option>`
      ).join('');
      const statusDropdown = s.isTargetGrade
        ? `<select class="exam-status-select ${stClass2}" style="font-size:7pt;padding:1mm 2mm;"
            onchange="setExamStatus('${s.statusKey}', this.value)">${opts2}</select>`
        : '';

      // ── 현재 회차 제출 건수 계산 (강사뷰 n건 버튼용) ──
      const _allRoundSubs = (allSubmits[s.sKey] || []).filter(r => {
        const rl = normalizeRound(r.round_label || '');
        const rr = normalizeRound(round);
        return rl && rr && (rl.includes(rr) || rr.includes(rl) || roundId(rl) === roundId(rr));
      });
      const _hasDupTeacher = _allRoundSubs.length > 1;
      const _dupBtn = _hasDupTeacher
        ? `<button class="dup-btn" onclick="showSubmitPopup('${s.sKey}','${s.name}','${round}')" style="font-size:7pt;padding:1mm 2.5mm;">📋 ${_allRoundSubs.length}건</button>`
        : '';

      // ── 버튼: 기존 로직 그대로 ──
      if (isSentForStudent && isPdfForStudent) {
        const sub2 = s.sub;
        const verBadge = sub2?.version
          ? `<span style="background:var(--main);color:#fff;border-radius:5px;padding:1mm 3mm;font-size:8pt;font-weight:700;">${sub2.version}</span>` : '';
        const ts2  = sub2?.timestamp || '';
        const tsText2 = ts2 ? `<span style="font-size:6.5pt;color:var(--muted);">${ts2}</span>` : '';
        const tStatusKey = s.statusKey || `${round}_${s.sKey || s.key || s.name}`;
        btnHtml = `
          <div style="display:flex;flex-direction:column;gap:1.5mm;align-items:flex-end;">
            <button class="form-link-btn done" onclick="generatePDF('${tStatusKey}','${s.name}')">📄 리포트 보기</button>
            <div style="display:flex;gap:1.5mm;align-items:center;">
              <button class="form-link-btn" onclick="showSubmitDetail('${s.sKey}','${s.name}','${round}')" style="background:#F7F4EE;color:var(--main);font-size:7pt;padding:1mm 2.5mm;">📋 제출내용</button>
              ${_dupBtn}
            </div>
            <div style="display:flex;align-items:center;gap:1.5mm;">${verBadge}${tsText2}</div>
          </div>`;
      } else if (s.isSubmitted) {
        // 제출완료 — 클릭 시 제출 내용 모달 표시 (관리자 뷰와 동일)
        const ts  = s.sub?.timestamp || s.myOwnSub?.timestamp || '';
        const tsText = ts
          ? `<span style="font-size:6.5pt;color:var(--muted);white-space:nowrap;">${ts}</span>` : '';
        btnHtml = `
          <div style="display:flex;flex-direction:column;gap:1mm;align-items:flex-end;">
            <div style="display:flex;gap:1.5mm;align-items:center;">
              <button class="form-link-btn done" onclick="showSubmitDetail('${s.sKey}','${s.name}','${round}')" style="border:none;cursor:pointer;">✅ 제출완료</button>
              ${_dupBtn}
            </div>
            ${tsText}
          </div>`;
      } else if (s.isExec) {
        btnHtml = `<a class="form-link-btn" href="${FORM_URL}" target="_blank">✏️ 폼 제출하기</a>`;
      } else {
        // 코멘트 역할: 시행담당 제출 여부와 무관하게 항상 코멘트 입력 가능
        // 본인 제출 여부는 isSubmitted(=myOwnSub 기반)로 이미 계산됨
        if (s.isSubmitted && s.myOwnSub) {
          const ts2 = s.myOwnSub.timestamp || '';
          btnHtml = `<div style="display:flex;flex-direction:column;gap:1mm;align-items:flex-end;">
            <div style="display:flex;gap:1.5mm;align-items:center;">
              <button class="form-link-btn done" onclick="showSubmitDetail('${s.sKey}','${s.name}','${round}')" style="border:none;cursor:pointer;">✅ 코멘트 완료</button>
              ${_dupBtn}
            </div>
            ${ts2 ? `<span style="font-size:6.5pt;color:var(--muted);">${ts2}</span>` : ''}
          </div>`;
        } else {
          btnHtml = `<a class="form-link-btn" href="${FORM_URL}" target="_blank" style="background:#5B82FA;">💬 코멘트 입력</a>`;
        }
      }

      item.innerHTML = `
        <div class="check-icon ${iconClass}">${iconChar}</div>
        <div class="check-info">
          <div class="check-name">${s.name}
            <span style="font-size:7.5pt;font-weight:400;color:var(--muted);margin-left:1.5mm;">${s.school||''} ${s.grade_num||''}학년</span>
            ${roleBadge ? `<span style="margin-left:1.5mm;">${roleBadge}</span>` : ''}
          </div>
          <div class="check-meta" style="display:flex;gap:1.5mm;margin-top:1mm;flex-wrap:wrap;">
            ${periodTags}
            ${s.isSubmitted && s.sub?.round_label ? `<span style="color:var(--muted)">${s.sub.round_label}</span>` : ''}
          </div>
        </div>
        ${scoreHtml}
        <div style="display:flex;align-items:center;gap:2.5mm;flex-shrink:0;">
          ${statusDropdown}
          ${btnHtml}
        </div>`;
      cl.appendChild(item);
    });
  });

  // 담당 학생이 없으면 안내
  if (myStudents.length === 0) {
    body.innerHTML = '<div class="empty-state">담당 학생 데이터를 불러오는 중입니다...</div>';
  }
}
// ══ 제출 내역 팝업 (중복 제출 유효본 선택) ══

// ── 회차별 제출 여부 판별 ──
// allSubmits[sKey]에서 현재 선택 회차에 해당하는 제출이 있는지 확인
// round_label 표기가 다양하므로 정규화 후 비교
function normalizeRound(r) {
  return String(r || '')
    .replace(/\s/g,'')
    .replace('회차','회')
    .replace('고1·2','고12')
    .replace('고1,2','고12')
    .toLowerCase();
}

// 회차 문자열에서 숫자 식별자 추출 (예: '고3-1', '고3 1회', '고31회' → '31')
function roundId(r) {
  const s = normalizeRound(r).replace(/[^0-9]/g,'');
  return s;
}

function getSubmissionForRound(sKey, round) {
  const list = allSubmits[sKey] || [];
  if (!list.length) return null;

  const rr = normalizeRound(round);
  const ri = roundId(round);

  // 유효본 선택이 있으면 우선 확인
  // 1. 회차별 키(신규, chosen[`${round}_${sKey}`])
  // 2. 학생별 키(구버전, chosen[sKey]) — 회차 일치 시에만 적용
  const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
  const perRoundKey = `${round}_${sKey}`;
  const pickedIdxPerRound = chosen[perRoundKey];
  if (pickedIdxPerRound != null && list[pickedIdxPerRound]) {
    const picked = list[pickedIdxPerRound];
    const rl = normalizeRound(picked.round_label);
    if (rl && (rl.includes(rr) || rr.includes(rl) || roundId(rl) === ri)) {
      return picked;
    }
  }
  // 구버전 폴백
  if (chosen[sKey] != null && list[chosen[sKey]]) {
    const picked = list[chosen[sKey]];
    const rl = normalizeRound(picked.round_label);
    if (rl && (rl.includes(rr) || rr.includes(rl) || roundId(rl) === ri)) {
      return picked;
    }
  }

  // 전체 목록에서 해당 회차 탐색 (최신 순)
  const match = [...list].reverse().find(sub => {
    const rl = normalizeRound(sub.round_label);
    if (!rl) return false;
    return rl.includes(rr) || rr.includes(rl) || roundId(rl) === ri;
  });
  return match || null;
}

function toggleStatus(key, field) {
  if (!statusData[key]) statusData[key] = {};
  statusData[key][field] = !statusData[key][field];
  saveStatus();
  serverSaveStatus(key, field, statusData[key][field]);  // 서버 동기화
  renderStudentTab();
  renderInstructorTab();
}

// 신규생/특수상태 드롭다운 값 저장
function setExamStatus(statusKey, val) {
  if (!statusData[statusKey]) statusData[statusKey] = {};
  statusData[statusKey].examStatus = val;
  // examStatus가 skip 계열이면 skipped=true 동기화 (기존 로직과 호환)
  // EXAM_STATUS_OPTIONS의 skipped 필드 기준으로 동기화
  const _opt = EXAM_STATUS_OPTIONS.find(o => o.v === val);
  statusData[statusKey].skipped = !!(_opt?.skipped);
  saveStatus();
  // 서버 동기화 (examStatus + skipped 둘 다)
  serverSaveStatus(statusKey, 'examStatus', val);
  serverSaveStatus(statusKey, 'skipped',    statusData[statusKey].skipped);
  renderStudentTab();
  renderInstructorTab();
  if (currentUser?.role === 'teacher') renderTeacherView();
  // 미시행(진도 부족) 선택 시 코멘트 필수 안내
  if (val === 'skip-acad') {
    alert('📚 미시행(진도 부족) 선택 시\n입력폼에서 반드시 [코멘트만 작성]을 선택하여 코멘트를 제출해 주세요.');
  }
}

// 시행상태 셀 HTML 빌드 (관리자·강사별 탭 공용)
// 시행상태 옵션 정의 (5개)
// skipped=true: new, skip-acad, withdraw / skipped=false: '', scheduled
const EXAM_STATUS_OPTIONS = [
  { v: '',          l: '— 선택 안 함 —',       cls: '',                skipped: false },
  { v: 'new',       l: '🆕 미시행(신규생)',     cls: 'status-new',      skipped: true  },
  { v: 'scheduled', l: '📅 시행 예정',          cls: 'status-scheduled',skipped: false },
  { v: 'skip-acad', l: '📚 미시행(진도 부족)',  cls: 'status-skip-acad',skipped: true  },
  { v: 'withdraw',  l: '🚪 미수강',               cls: 'status-skip-wd',  skipped: true  },
];

// 시행상태 셀 HTML 빌드 (관리자·강사별 탭 + 강사 뷰 공용)
// 관리자(admin)·강사(teacher): 편집 가능 / 상담실장(manager): 읽기 전용
function buildExamStatusCell(statusKey, s, isHS, isSkipped, examStatus) {
  if (!isHS) return '<span class="status-badge na">미시행</span>';

  const canEdit    = currentUser?.role === 'admin' || currentUser?.role === 'teacher';
  // examStatus가 없으면 빈값(기본) — 드롭다운 표시, 회색 처리 없음
  // 미수강 학생이라도 이미 제출한 회차는 정상 표시 (드롭다운 기본값 빈값)
  const currentVal = examStatus || '';

  const opt     = EXAM_STATUS_OPTIONS.find(o => o.v === currentVal);
  const stClass = opt?.cls || '';
  const stLabel = opt?.l   || currentVal;

  if (canEdit) {
    const opts = EXAM_STATUS_OPTIONS.map(o =>
      `<option value="${o.v}" ${o.v === currentVal ? 'selected' : ''}>${o.l}</option>`
    ).join('');
    return `<select class="exam-status-select ${stClass}"
      onchange="setExamStatus('${statusKey}', this.value)">${opts}</select>`;
  }

  // 실장 읽기 전용: 배지만 표시
  return `<span class="exam-status-select ${stClass}"
    style="pointer-events:none;display:inline-block;cursor:default;">${stLabel}</span>`;
}

// ══ PDF 생성 — Apps Script에서 리포트 데이터 받아 뷰어 열기 ══
async function generatePDF(statusKey, studentName) {
  const parts = statusKey.split('_');
  const round = parts[0];
  const sKey  = parts.slice(1).join('_');

  const s = studentData.find(st => (st.key || st.name) === sKey);
  if (!s) { alert('학생 데이터를 찾을 수 없습니다.'); return; }

  const examStatus     = statusData[statusKey]?.examStatus || '';
  const isDual         = Array.isArray(s.instructors) && s.instructors.length >= 2;

  // isProgressOnly 판단:
  // 1) 관리자가 드롭다운으로 'skip-acad' 선택한 경우
  // 2) 단일 강사 학생인데 해당 회차 제출이 모두 comment_only인 경우 (자동 감지)
  //    단, dual 학생은 제외 (코멘트 역할 강사가 항상 comment_only이므로)
  // matchRound 인라인 (함수 정의 전에 사용해야 하므로)
  const _matchRound = (rl) => {
    const a = normalizeRound(rl || ''), b = normalizeRound(round);
    return a && b && (a.includes(b) || b.includes(a) || roundId(a) === roundId(b));
  };
  const _allRoundSubs = (allSubmits[sKey] || []).filter(r => _matchRound(r.round_label || ''));
  const _hasFullSub   = _allRoundSubs.some(r => r.submit_mode !== 'comment_only' && r.correct_q != null);
  const _allCommentOnly = _allRoundSubs.length > 0 && !_hasFullSub;
  const isProgressOnly = examStatus === 'skip-acad' || (!isDual && _allCommentOnly);

  // ── 강사별 제출 기록 분리 ──
  const allSubs = allSubmits[sKey] || [];

  // 시행담당 강사: timetable/execData 기반으로 확정
  const instructor1 = isDual ? getExecInstructor(round, sKey, s) : (s.instructor || s.instructors?.[0] || '');
  const instructor2 = isDual ? (s.instructors.find(i => i !== instructor1) || '') : '';

  // 회차 매칭 헬퍼
  const matchRound = (rl) => {
    const a = normalizeRound(rl || ''), b = normalizeRound(round);
    return a && b && (a.includes(b) || b.includes(a) || roundId(a) === roundId(b));
  };

  // 시행담당 제출: instructor1이 제출한 full 제출 (점수 포함)
  const execSub = allSubs.slice().reverse().find(r =>
    matchRound(r.round_label) && r.instructor === instructor1 && r.submit_mode !== 'comment_only'
  ) || allSubs.slice().reverse().find(r =>
    matchRound(r.round_label) && r.submit_mode !== 'comment_only' && r.correct_q != null
  );

  // 코멘트 강사 제출: instructor2가 제출한 기록
  const commentSub = isDual
    ? allSubs.slice().reverse().find(r => matchRound(r.round_label) && r.instructor === instructor2)
    : null;

  // progress_only: 제출 없어도 가능
  const sub = execSub || allSubs.slice().reverse().find(r => {
    const rl = normalizeRound(r.round_label || '');
    const rr = normalizeRound(round);
    return rl.includes(rr) || rr.includes(rl) || roundId(rl) === roundId(rr);
  });

  if (!isProgressOnly && !sub) {
    alert('제출 데이터가 없습니다.\n강사 폼 제출 후 페이지를 새로고침 해주세요.');
    return;
  }

  // ★ API 호출 전 period 먼저 계산 (차트 필터용)
  const ROUND_META_EARLY = {
    '고3-1':  { period: '3/1–3/29'  }, '고12-1': { period: '3/1–4/12'  },
    '고3-2':  { period: '4/6–4/26'  }, '고12-2': { period: '4/20–5/10' },
    '고3-3':  { period: '5/4–5/24'  }, '고12-3': { period: '5/18–6/7'  },
  };
  // 1순위: 서버 schedule_rounds (getScheduleRounds는 localStorage/기본값 반환), 2순위: 하드코딩 fallback
  const _rounds = getScheduleRounds();
  const serverRound = (_rounds || []).find(r => r.id === round);
  const periodForApi = serverRound?.period || ROUND_META_EARLY[round]?.period || sub?.period || '';

  // ── Apps Script: 시행담당 데이터 ──
  let okCards = [], ngCards = [], progress = [], chart = [], overview = '', progressSummary = '';
  try {
    const api1 = `${SCRIPT_URL}?action=getReportData`
      + `&sKey=${encodeURIComponent(sKey)}`
      + `&round=${encodeURIComponent(sub?.round_label || round)}`
      + `&period=${encodeURIComponent(periodForApi)}`
      + `&version=${encodeURIComponent(sub?.version || '')}`
      + `&wrong=${encodeURIComponent(sub?.wrong_q || '')}`
      + `&correct=${encodeURIComponent(sub?.correct_q ?? '')}`
      + `&total=${encodeURIComponent(sub?.total_q ?? '')}`
      + `&instructor=${encodeURIComponent(instructor1)}`
      + `&execInstructor=${encodeURIComponent(instructor1)}`;
    const res1  = await fetch(api1);
    const json1 = await res1.json();
    if (json1.result === 'success') {
      okCards  = json1.okCards  || [];
      ngCards  = json1.ngCards  || [];
      progress = json1.progress || [];
      chart    = json1.chart    || [];
      overview = json1.overview || '';
      progressSummary = json1.progressSummary || '';
    }
  } catch(e) { console.warn('시행담당 데이터 로드 실패'); }

  // ── Apps Script: 코멘트 강사 데이터 (dual만) ──
  let progress2 = [], chart2 = [], progressSummary2 = '';
  const comment2   = commentSub?.comment   || '';
  const direction2 = commentSub?.direction || '';

  if (isDual && instructor2) {
    try {
      const api2 = `${SCRIPT_URL}?action=getReportData`
        + `&sKey=${encodeURIComponent(sKey)}`
        + `&round=${encodeURIComponent(sub?.round_label || round)}`
        + `&period=${encodeURIComponent(periodForApi)}`
        + `&version=&wrong=&correct=&total=`
        + `&instructor=${encodeURIComponent(instructor2)}`
        + `&execInstructor=${encodeURIComponent(instructor1)}`;
      const res2  = await fetch(api2);
      const json2 = await res2.json();
      if (json2.result === 'success') {
        progress2 = json2.progress || [];
        chart2    = json2.chart    || [];  // 진단평가 없으므로 수업테스트만
        progressSummary2 = json2.progressSummary || '';
      }
    } catch(e) { console.warn('코멘트 강사 데이터 로드 실패'); }
  }

  // ── 날짜 계산 ──
  const now   = new Date();
  const ymStr = now.getFullYear() + '. ' + String(now.getMonth()+1).padStart(2,'0');

  const ROUND_META = {
    '고3-1':  { exam_date: '4월 1일',  period: '3/1–3/29',  round_dates: '3/30–4/5' },
    '고12-1': { exam_date: '4월 15일', period: '3/1–4/12',  round_dates: '4/13–4/19' },
    '고3-2':  { exam_date: '4월 29일', period: '4/6–4/26',  round_dates: '4/27–5/3' },
    '고12-2': { exam_date: '5월 13일', period: '4/20–5/10', round_dates: '5/11–5/17' },
    '고3-3':  { exam_date: '5월 27일', period: '5/4–5/24',  round_dates: '5/25–5/31' },
    '고12-3': { exam_date: '6월 10일', period: '5/18–6/7',  round_dates: '6/8–6/14' },
  };
  const meta       = ROUND_META[round] || {};
  const examDate   = meta.exam_date   || sub?.exam_date   || '';
  const periodStr  = meta.period      || sub?.period      || '';
  const roundDates = meta.round_dates || sub?.round_dates || '';

  const reportType = isProgressOnly ? 'progress_only' : (isDual ? 'dual' : 'normal');

  const reportPayload = {
    name:         s.name,
    school:       s.school || '',
    grade:        s.grade_num || '',
    round:        sub?.round_label || round,
    round_dates:  roundDates,
    version:      execSub?.version || '',
    correct:      execSub?.correct_q ?? '',
    total:        execSub?.total_q ?? '',
    wrong:        execSub?.wrong_q || '',
    // 시행담당 (코멘트만 제출인 경우 sub에서 fallback)
    instructor:   instructor1,
    comment:      execSub?.comment   || sub?.comment   || '',
    direction:    execSub?.direction || sub?.direction || '',
    // 코멘트 강사
    instructor2:  instructor2,
    comment2:     comment2,
    direction2:   direction2,
    // 공통
    year_month:   ymStr,
    period:       periodStr,
    exam_date:    examDate,
    overview:     overview,
    ok_cards:     isProgressOnly ? [] : okCards,
    ng_cards:     isProgressOnly ? [] : ngCards,
    progress:     progress,
    chart:        chart,   // ★ progress_only에도 수업 중 테스트 차트 표시 (진단평가 막대는 자동 없음)
    progress2:    progress2,
    chart2:       chart2,   // 코멘트 강사 차트 (수업테스트만)
    progress_summary:  progressSummary,
    progress_summary2: progressSummary2,
    report_type:  reportType,
  };

  const reportKey = 'iruri_report_' + Date.now();
  try {
    localStorage.setItem(reportKey, JSON.stringify(reportPayload));
  } catch(e) {
    Object.keys(localStorage)
      .filter(k => k.startsWith('iruri_report_'))
      .sort().slice(0, -5)
      .forEach(k => localStorage.removeItem(k));
    localStorage.setItem(reportKey, JSON.stringify(reportPayload));
  }

  const viewerUrl = `https://irurimath.github.io/IRURI-MATH/report-viewer.html?rk=${reportKey}`;
  window.open(viewerUrl, '_blank');

  pdfStatus[statusKey] = true;
  saveStatus();
  serverSaveStatus(statusKey, 'pdfGenerated', true);
  renderStudentTab();
  renderInstructorTab();
}

// ══ 시행담당 헬퍼 ══

// 다강사 학생인지 여부
function isMultiInstructor(s) {
  return Array.isArray(s.instructors) && s.instructors.length > 1;
}

// 해당 회차에서 시행담당 강사 반환
function getExecInstructor(round, sKey, s) {
  if (!isMultiInstructor(s)) return s.instructor || s.instructors?.[0] || '';
  const statusKey = `${round}_${sKey}`;
  // 서버 roundStatus → statusData에서 먼저 확인, fallback: execData(로컬)
  const fromServer = statusData[statusKey]?.execInstructor;
  const fromLocal  = execData[statusKey];
  return fromServer || fromLocal || s.instructors[0];
}

// 시행담당 변경 (admin만)
function setExecInstructor(round, sKey, instructor) {
  const statusKey = `${round}_${sKey}`;
  execData[statusKey] = instructor;
  saveStatus();
  serverSaveStatus(statusKey, 'execInstructor', instructor);  // 서버 동기화
  renderStudentTab();
  renderInstructorTab();
}

// 시행담당 드롭다운 HTML (admin 전용)
function execDropdownHtml(round, sKey, s) {
  if (!isMultiInstructor(s)) return `<span class="exec-label-single">단독</span>`;
  const exec = getExecInstructor(round, sKey, s);
  const isAdmin = currentUser?.role === 'admin';
  if (isAdmin) {
    const opts = s.instructors.map(i =>
      `<option value="${i}" ${i === exec ? 'selected' : ''}>${i}</option>`
    ).join('');
    return `<select class="exec-select" onchange="setExecInstructor('${round}','${sKey}',this.value)">${opts}</select>`;
  }
  return `<span class="exec-label-exec">🟢 ${exec}</span>`;
}

// 특정 강사가 해당 회차에서 이 학생의 역할
function getInstructorRole(round, sKey, s, instructorName) {
  if (!isMultiInstructor(s)) return 'exec'; // 단독 = 시행
  const exec = getExecInstructor(round, sKey, s);
  return exec === instructorName ? 'exec' : 'comment';
}

// ══ 제출 내역 팝업 ══
let popupCallback = null;

function showSubmitPopup(sKey, studentName, forceRound) {
  try {
    // 현재 round 저장 (confirmPopup에서 서버 동기화 시 사용)
    window._popupSKey  = sKey;
    window._popupRound = forceRound
      || document.getElementById('round-select-student')?.value
      || document.getElementById('round-select-instructor')?.value
      || document.getElementById('round-select-teacher')?.value || '';

    const list = allSubmits[sKey] || (submittedData[sKey] ? [submittedData[sKey]] : []);
    if (!list.length) { alert('제출 내역이 없습니다.'); return; }

    // 현재 회차 제출만 필터링
    const curRound = window._popupRound || '';
    let filteredList = curRound
      ? list.filter(r => {
          const rl = normalizeRound(r.round_label || '');
          const rr = normalizeRound(curRound);
          return rl && rr && (rl.includes(rr) || rr.includes(rl) || roundId(rl) === roundId(rr));
        })
      : list;

    // 방어: 필터 결과 비어있으면 전체 리스트로 폴백 (이름 라벨 차이로 매칭 실패 대비)
    let usingFullList = false;
    if (!filteredList.length) {
      filteredList = list;
      usingFullList = true;
    }

    // 선택 인덱스 결정
    // 1. 회차별 키(chosen[`${round}_${sKey}`])가 있으면 우선
    // 2. 구버전 학생별 키(chosen[sKey]) 폴백
    // 3. 없으면 최근 제출(맨 뒤)
    const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
    const perRoundKey  = curRound ? `${curRound}_${sKey}` : '';
    const chosenByRound = perRoundKey ? chosen[perRoundKey] : null;
    const chosenLegacy  = chosen[sKey];

    let safeIdx = filteredList.length - 1;  // 기본: 최근
    const resolveIdx = (globalIdx) => {
      if (globalIdx == null || !list[globalIdx]) return -1;
      const targetTs = list[globalIdx].timestamp;
      return filteredList.findIndex(r => r.timestamp === targetTs);
    };
    const fIdx1 = resolveIdx(chosenByRound);
    const fIdx2 = resolveIdx(chosenLegacy);
    if (fIdx1 >= 0) safeIdx = fIdx1;
    else if (fIdx2 >= 0) safeIdx = fIdx2;

    const titleSuffix = usingFullList ? ' (전체)' : (curRound ? ` (${curRound})` : '');

    let html = `
      <div class="popup-overlay" id="submit-popup" onclick="if(event.target===this)closePopup()">
        <div class="popup-box">
          <div class="popup-title">📋 ${studentName} — 제출 내역 선택${titleSuffix}</div>`;

    filteredList.forEach((sub, i) => {
      const sel = i === safeIdx ? 'selected' : '';
      const ts = sub.timestamp || '-';
      const score = sub.correct_q != null ? `${sub.correct_q}/${sub.total_q} · ${sub.version || ''}` : '-';
      const instLabel = sub.instructor ? ` · ${sub.instructor}` : '';
      html += `
        <div class="popup-item ${sel}" onclick="selectPopupItem(${i})" data-idx="${i}">
          <div class="popup-item-info">
            <div class="popup-item-ts">${ts}${instLabel}</div>
            <div class="popup-item-detail">점수 ${score} · ${sub.round_label || ''}</div>
          </div>
          <span class="popup-check">✓</span>
        </div>`;
    });

    html += `
          <div class="popup-btns">
            <button class="popup-btn-cancel" onclick="closePopup()">취소</button>
            <button class="popup-btn-ok" onclick="confirmPopup('${sKey}')">이 버전으로 설정</button>
          </div>
        </div>
      </div>`;

    document.body.insertAdjacentHTML('beforeend', html);
  } catch (err) {
    console.error('[showSubmitPopup] 오류:', err, { sKey, studentName, forceRound });
    alert('제출 내역 불러오기 중 오류가 발생했습니다. 콘솔을 확인해주세요.\n' + (err?.message || ''));
  }
}

function selectPopupItem(idx) {
  document.querySelectorAll('.popup-item').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

function confirmPopup(sKey) {
  try {
    const selected = document.querySelector('.popup-item.selected');
    if (!selected) { alert('항목을 선택해주세요.'); return; }
    const filteredIdx = parseInt(selected.dataset.idx);
    const _cRound = window._popupRound || '';
    const _allList = allSubmits[sKey] || [];

    // 필터된 리스트 재구성
    let _filteredList = _cRound
      ? _allList.filter(r => {
          const rl = normalizeRound(r.round_label || '');
          const rr = normalizeRound(_cRound);
          return rl && rr && (rl.includes(rr) || rr.includes(rl) || roundId(rl) === roundId(rr));
        })
      : _allList;
    if (!_filteredList.length) _filteredList = _allList;  // 폴백

    const selectedSub = _filteredList[filteredIdx];
    const realIdx = selectedSub ? _allList.findIndex(r => r.timestamp === selectedSub.timestamp) : filteredIdx;

    // 회차별 저장 (신규) + 학생별 저장 (구버전 호환)
    const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
    if (_cRound) chosen[`${_cRound}_${sKey}`] = realIdx;
    chosen[sKey] = realIdx;  // 구버전 호환
    localStorage.setItem('iruri_chosen', JSON.stringify(chosen));

    // 서버 동기화
    if (_cRound && sKey) {
      const _cStatusKey = `${_cRound}_${sKey}`;
      serverSaveStatus(_cStatusKey, 'chosenIdx', String(realIdx));
    }

    if (_allList[realIdx]) submittedData[sKey] = _allList[realIdx];

    closePopup();
    renderStudentTab();
    renderInstructorTab();
    if (currentUser?.role === 'teacher') renderTeacherView();
  } catch (err) {
    console.error('[confirmPopup] 오류:', err, { sKey });
    alert('저장 중 오류가 발생했습니다.\n' + (err?.message || ''));
  }
}

function closePopup() {
  const p = document.getElementById('submit-popup');
  if (p) p.remove();
}

// 제출 내용 상세 보기 모달
function showSubmitDetail(sKey, studentName, forceRound) {
  try {
    const list = allSubmits[sKey] || (submittedData[sKey] ? [submittedData[sKey]] : []);
    if (!list.length) { alert('제출 내역이 없습니다.'); return; }

    // 해당 학생 정보
    const s = studentData.find(st => (st.key || st.name) === sKey);
    const isDualStudent = s && Array.isArray(s.instructors) && s.instructors.length >= 2;

    // 회차 결정: 버튼에서 명시적으로 전달한 forceRound 최우선
    const curRound = forceRound
      || document.getElementById('round-select-student')?.value
      || document.getElementById('round-select-instructor')?.value
      || document.getElementById('round-select-teacher')?.value || '';

    // 해당 회차 제출들만 필터
    let roundSubs = curRound
      ? list.filter(r => {
          const rl = normalizeRound(r.round_label || '');
          const rr = normalizeRound(curRound);
          return rl && rr && (rl.includes(rr) || rr.includes(rl) || roundId(rl) === roundId(rr));
        })
      : list;

    // 방어: 필터 결과 없으면 전체로 폴백
    let usingFullList = false;
    if (!roundSubs.length && list.length) {
      roundSubs = list;
      usingFullList = true;
    }

    // 강사별로 그룹핑
    const byInstructor = {};
    roundSubs.forEach(r => {
      const inst = r.instructor || '(강사 미상)';
      if (!byInstructor[inst]) byInstructor[inst] = [];
      byInstructor[inst].push(r);
    });

    const titleSuffix = usingFullList ? ' (전체)' : (curRound ? ` (${curRound})` : '');

    let html = `
      <div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)document.getElementById('detail-modal').remove()">
        <div class="modal-box" style="max-width:140mm;">
          <div class="modal-title">📋 ${studentName} — 제출 내용${titleSuffix}</div>`;

    Object.entries(byInstructor).forEach(([inst, subs]) => {
      const latest = subs[subs.length - 1];
      const modeLabel = latest.submit_mode === 'comment_only' ? '💬 코멘트만' : '📝 시험+코멘트';
      const scoreRow = latest.submit_mode !== 'comment_only' && latest.correct_q != null
        ? `<div class="detail-row"><span class="detail-lbl">점수</span><span>${latest.correct_q}/${latest.total_q||'?'} · 버전 ${latest.version||'-'}</span></div>
           <div class="detail-row"><span class="detail-lbl">오답</span><span>${latest.wrong_q||'-'}</span></div>` : '';

      html += `
        <div style="background:var(--ivory);border-radius:10px;padding:3mm 4mm;margin-bottom:3mm;">
          <div style="font-size:8pt;font-weight:700;color:var(--main);margin-bottom:2mm;">
            👨‍🏫 ${inst} 강사 <span style="font-size:7pt;font-weight:400;color:var(--muted);">${modeLabel} · ${latest.timestamp||''}</span>
            ${subs.length > 1 ? `<span style="font-size:7pt;background:#FFF4E5;color:#B45309;border-radius:4px;padding:1px 4px;margin-left:2mm;">${subs.length}회 제출</span>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:1.5mm;font-size:8.5pt;">
            ${scoreRow}
            <div class="detail-row"><span class="detail-lbl">강사 코멘트</span></div>
            <div style="background:var(--white);border-radius:8px;padding:2.5mm 3.5mm;font-size:8pt;line-height:1.7;white-space:pre-wrap;">${latest.comment||'(없음)'}</div>
            <div class="detail-row" style="margin-top:1.5mm;"><span class="detail-lbl">다음달 방향</span></div>
            <div style="background:var(--white);border-radius:8px;padding:2.5mm 3.5mm;font-size:8pt;line-height:1.7;white-space:pre-wrap;">${latest.direction||'(없음)'}</div>
            ${latest.special ? `<div class="detail-row"><span class="detail-lbl">특이사항</span><span>${latest.special}</span></div>` : ''}
          </div>
        </div>`;
    });

    if (Object.keys(byInstructor).length === 0) {
      html += `<div style="color:var(--muted);font-size:8.5pt;padding:3mm;">이 회차의 제출 내역이 없습니다.</div>`;
    }

    html += `
          <div class="modal-btns">
            <button class="modal-cancel" onclick="document.getElementById('detail-modal').remove()">닫기</button>
          </div>
        </div>
      </div>`;

    document.body.insertAdjacentHTML('beforeend', html);
  } catch (err) {
    console.error('[showSubmitDetail] 오류:', err, { sKey, studentName, forceRound });
    alert('제출 내용 불러오기 중 오류가 발생했습니다.\n' + (err?.message || ''));
  }
}

// ══ 연습 데이터 필터 ══
function isPracticeStudent(s) {
  const school = s.school || '';
  const name = s.name || '';
  return school.includes('이루리') ||
         /연습$/i.test(name) ||
         /[0-9]$/.test(name);  // 강가나1, 윤동원7 등
}
