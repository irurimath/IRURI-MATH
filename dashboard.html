<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRURI EDUCATION — 리포트 관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --main: #0D2B1F; --main2: #1A3D2B; --mint: #3DBFA0; --mint-lt: #E8F7F3;
  --ivory: #F7F4EE; --white: #fff; --ink: #1A1A1A; --muted: #717171;
  --line: #E2DDD6; --coral: #E8604A; --coral-lt: #FDF3F1;
  --green: #1A7A5E; --green-lt: #D4EFDF;
  --yellow: #F5A623; --yellow-lt: #FEF3DC;
  --blue: #2563EB; --blue-lt: #EFF6FF;
  --purple: #7C3AED; --purple-lt: #F5F3FF;
  --warm: #F5F0E8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--ivory); color: var(--ink); min-height: 100vh; }

/* ── 로그인 화면 ── */
#login-screen {
  position: fixed; inset: 0; background: var(--main);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  transition: opacity .4s, visibility .4s;
}
#login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.login-box {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px; padding: 10mm 8mm; width: 88mm; text-align: center;
}
.login-logo { font-size: 9pt; font-weight: 700; letter-spacing: 2.5px; color: #fff; margin-bottom: 1mm; }
.login-sub { font-size: 7.5pt; color: rgba(255,255,255,.35); margin-bottom: 8mm; }
.login-title { font-size: 15pt; font-weight: 700; color: #fff; margin-bottom: 7mm; }
.login-field { margin-bottom: 3.5mm; text-align: left; }
.login-field label { font-size: 7pt; color: rgba(255,255,255,.45); display: block; margin-bottom: 1.5mm; letter-spacing: 1px; text-transform: uppercase; }
.login-field input {
  width: 100%; padding: 3mm 4mm; background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15); border-radius: 10px;
  color: #fff; font-size: 9pt; font-family: inherit; outline: none;
  transition: border-color .2s;
}
.login-field input:focus { border-color: var(--mint); }
.login-field input::placeholder { color: rgba(255,255,255,.25); }
.login-btn {
  width: 100%; margin-top: 5mm; padding: 3.5mm; background: var(--mint);
  border: none; border-radius: 10px; color: #fff; font-size: 10pt;
  font-weight: 700; font-family: inherit; cursor: pointer;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .85; }
.login-error { font-size: 7.5pt; color: var(--coral); margin-top: 3mm; display: none; }

/* ── 앱 레이아웃 ── */
#app { display: none; min-height: 100vh; }
#app.visible { display: block; }

/* 상단 헤더 */
.app-header {
  background: var(--main); padding: 0 6mm;
  height: 14mm; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.header-brand { font-size: 9pt; font-weight: 700; letter-spacing: 2px; color: #fff; }
.header-brand span { font-size: 7pt; color: rgba(255,255,255,.35); margin-left: 3mm; font-weight: 400; letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 4mm; }
.user-badge {
  background: rgba(255,255,255,.1); border-radius: 20px;
  padding: 1.5mm 4mm; font-size: 7.5pt; color: rgba(255,255,255,.7); font-weight: 500;
}
.logout-btn {
  background: none; border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
  padding: 1.5mm 3.5mm; color: rgba(255,255,255,.5); font-size: 7pt;
  font-family: inherit; cursor: pointer; transition: all .2s;
}
.logout-btn:hover { border-color: var(--coral); color: var(--coral); }

/* 탭 바 */
.tab-bar {
  background: var(--white); border-bottom: 1px solid var(--line);
  padding: 0 6mm; display: flex; gap: 0;
  position: sticky; top: 14mm; z-index: 99;
}
.tab-btn {
  padding: 4mm 5mm; font-size: 9pt; font-weight: 500; color: var(--muted);
  border: none; background: none; cursor: pointer; font-family: inherit;
  border-bottom: 3px solid transparent; transition: all .2s;
}
.tab-btn.active { color: var(--main); border-bottom-color: var(--mint); font-weight: 700; }
.tab-btn:hover:not(.active) { color: var(--ink); }

/* 콘텐츠 영역 */
.tab-content { display: none; padding: 5mm 6mm 10mm; }
.tab-content.active { display: block; }

/* 회차 선택 바 */
.round-bar {
  background: var(--white); border-radius: 12px; border: 1px solid var(--line);
  padding: 3.5mm 5mm; margin-bottom: 5mm;
  display: flex; align-items: center; gap: 4mm; flex-wrap: wrap;
}
.round-bar label { font-size: 8pt; color: var(--muted); font-weight: 500; }
.round-select {
  padding: 2mm 4mm; border: 1px solid var(--line); border-radius: 8px;
  font-size: 8.5pt; font-family: inherit; background: var(--ivory); color: var(--ink);
  outline: none; cursor: pointer;
}
.round-stats { margin-left: auto; display: flex; gap: 3mm; }
.stat-pill {
  padding: 1.5mm 3.5mm; border-radius: 20px; font-size: 7.5pt; font-weight: 600;
}
.stat-pill.total { background: var(--main); color: #fff; }
.stat-pill.done { background: var(--green-lt); color: var(--green); }
.stat-pill.pending { background: var(--yellow-lt); color: var(--yellow); }

/* 섹션 헤더 */
.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 3mm;
}
.section-title { font-size: 11pt; font-weight: 700; color: var(--main); }
.section-count { font-size: 8pt; color: var(--muted); }

/* 강사 필터 */
.instructor-filter { display: flex; gap: 2mm; flex-wrap: wrap; margin-bottom: 4mm; }
.filter-btn {
  padding: 2mm 4mm; border-radius: 20px; font-size: 7.5pt; font-weight: 500;
  border: 1.5px solid var(--line); background: var(--white); color: var(--muted);
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.filter-btn.active { background: var(--main); color: #fff; border-color: var(--main); }
.filter-btn:hover:not(.active) { border-color: var(--mint); color: var(--main); }

/* 테이블 */
.data-table-wrap {
  background: var(--white); border-radius: 14px; border: 1px solid var(--line);
  overflow: hidden;
}
.data-table { width: 100%; border-collapse: collapse; font-size: 8pt; }
.data-table thead th {
  background: var(--main); color: rgba(255,255,255,.7); padding: 3mm 4mm;
  text-align: left; font-weight: 500; font-size: 7.5pt; letter-spacing: .5px;
  white-space: nowrap;
}
.data-table thead th:first-child { border-radius: 0; }
.data-table tbody tr { border-bottom: 1px solid var(--line); transition: background .15s; }
.data-table tbody tr:last-child { border-bottom: none; }
.data-table tbody tr:hover { background: var(--ivory); }
.data-table tbody td { padding: 3mm 4mm; vertical-align: middle; }
.data-table tbody td.name-cell { font-weight: 700; color: var(--main); }
.data-table tbody td.muted { color: var(--muted); font-size: 7.5pt; }

/* 수강 요일·구간 태그 */
.schedule-tags { display: flex; gap: 1.5mm; flex-wrap: wrap; }
.sched-tag {
  background: var(--mint-lt); color: #0F6E56; border-radius: 6px;
  padding: 1mm 2.5mm; font-size: 7pt; font-weight: 600; white-space: nowrap;
}

/* 상태 배지 */
.status-badge {
  display: inline-flex; align-items: center; gap: 1.5mm;
  padding: 1.5mm 3mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  white-space: nowrap;
}
.status-badge.done { background: var(--green-lt); color: var(--green); }
.status-badge.pending { background: var(--yellow-lt); color: #A16207; }
.status-badge.inactive { background: #F3F4F6; color: #9CA3AF; }
.status-badge.na { background: #F3F4F6; color: #9CA3AF; font-size: 7pt; }

/* 토글 버튼 */
.toggle-btn {
  padding: 1.5mm 3.5mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid; cursor: pointer; font-family: inherit; transition: all .2s;
  white-space: nowrap;
}
.toggle-btn.on { background: var(--green-lt); color: var(--green); border-color: var(--green); }
.toggle-btn.off { background: var(--line); color: var(--muted); border-color: var(--line); }
.toggle-btn.on:hover { background: var(--green); color: #fff; }
.toggle-btn.off:hover { background: var(--ivory); border-color: var(--muted); }

/* 리포트 생성 버튼 */
.gen-btn {
  padding: 1.5mm 3.5mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid var(--mint); background: var(--mint-lt); color: var(--green);
  cursor: pointer; font-family: inherit; transition: all .2s; white-space: nowrap;
}
.gen-btn:hover { background: var(--mint); color: #fff; }
.gen-btn:disabled { opacity: .4; cursor: not-allowed; }

/* 점수 배지 */
.score-badge {
  display: inline-flex; align-items: center; gap: 1.5mm;
  padding: 1.5mm 3mm; border-radius: 8px; font-size: 8pt; font-weight: 700;
  background: var(--main); color: #fff; white-space: nowrap;
}
.score-badge.sub { font-size: 7pt; font-weight: 400; opacity: .7; }

/* 미시행 강제 토글 */
.skip-btn {
  padding: 1.5mm 3mm; border-radius: 8px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid; cursor: pointer; font-family: inherit; transition: all .2s;
}
.skip-btn.on  { background: #FEE2E2; color: #991B1B; border-color: #FCA5A5; }
.skip-btn.off { background: var(--line); color: var(--muted); border-color: var(--line); }
.skip-btn.on:hover  { background: #FCA5A5; }
.skip-btn.off:hover { background: var(--ivory); border-color: var(--muted); }

/* 미시행 행 */
.data-table tbody tr.inactive-row td { opacity: .45; }
.data-table tbody tr.inactive-row td.name-cell { opacity: .55; }

/* 로딩 스피너 */
.loading-bar {
  background: var(--white); border-radius: 12px; border: 1px solid var(--line);
  padding: 6mm; text-align: center; color: var(--muted); font-size: 8.5pt;
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2.5px solid var(--line); border-top-color: var(--mint);
  border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 2mm;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* 시행담당 드롭다운 */
.exec-select {
  padding: 1.5mm 2.5mm; border-radius: 7px; font-size: 7.5pt; font-weight: 600;
  border: 1.5px solid var(--mint); background: var(--mint-lt); color: #0F6E56;
  font-family: inherit; cursor: pointer; outline: none;
}
.exec-label-exec  { display:inline-flex;align-items:center;gap:1.5mm;padding:1.5mm 3mm;border-radius:8px;font-size:7.5pt;font-weight:700;background:var(--mint-lt);color:#0F6E56;white-space:nowrap; }
.exec-label-comment { display:inline-flex;align-items:center;gap:1.5mm;padding:1.5mm 3mm;border-radius:8px;font-size:7.5pt;font-weight:700;background:var(--blue-lt);color:var(--blue);white-space:nowrap; }
.exec-label-single  { display:inline-flex;align-items:center;gap:1.5mm;padding:1.5mm 3mm;border-radius:8px;font-size:7.5pt;font-weight:700;background:#F3F4F6;color:var(--muted);white-space:nowrap; }

/* 제출 내역 팝업 */
.popup-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:flex;align-items:center;justify-content:center;
}
.popup-box {
  background:var(--white);border-radius:16px;padding:6mm 7mm;
  min-width:280px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.2);
}
.popup-title { font-size:11pt;font-weight:700;color:var(--main);margin-bottom:4mm; }
.popup-item {
  display:flex;align-items:center;gap:3mm;padding:3mm 4mm;
  border-radius:10px;border:1.5px solid var(--line);margin-bottom:2mm;
  cursor:pointer;transition:border-color .15s;
}
.popup-item:hover { border-color:var(--mint); }
.popup-item.selected { border-color:var(--mint);background:var(--mint-lt); }
.popup-item-info { flex:1; }
.popup-item-ts { font-size:8pt;font-weight:700;color:var(--main); }
.popup-item-detail { font-size:7.5pt;color:var(--muted);margin-top:.5mm; }
.popup-check { color:var(--mint);font-size:14px;display:none; }
.popup-item.selected .popup-check { display:block; }
.popup-btns { display:flex;gap:2mm;margin-top:4mm;justify-content:flex-end; }
.popup-btn-cancel { padding:2mm 5mm;border-radius:8px;border:1.5px solid var(--line);background:none;font-family:inherit;font-size:8.5pt;cursor:pointer; }
.popup-btn-ok { padding:2mm 5mm;border-radius:8px;border:none;background:var(--mint);color:#fff;font-family:inherit;font-size:8.5pt;font-weight:700;cursor:pointer; }


/* 담당실장 필터 (학생별 탭) */
.manager-filter { display: flex; gap: 2mm; flex-wrap: wrap; margin-bottom: 4mm; }

/* 중복 제출 버튼 */
.dup-btn {
  padding: 1mm 2.5mm; border-radius: 6px; font-size: 7pt; font-weight: 600;
  border: 1px solid #F5A623; background: #FEF3DC; color: #92400E;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.dup-btn:hover { background: #F5A623; color: #fff; }

/* 히스토리 모달 */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
}
.modal-box {
  background: var(--white); border-radius: 16px; padding: 6mm;
  width: min(120mm, 95vw); max-height: 80vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.modal-title { font-size: 11pt; font-weight: 700; color: var(--main); margin-bottom: 4mm; }
.modal-sub   { font-size: 8pt; color: var(--muted); margin-bottom: 4mm; }
.history-item {
  border: 1.5px solid var(--line); border-radius: 10px; padding: 3.5mm;
  margin-bottom: 2.5mm; cursor: pointer; transition: all .2s;
}
.history-item:hover { border-color: var(--mint); background: var(--mint-lt); }
.history-item.selected { border-color: var(--mint); background: var(--mint-lt); }
.history-item.selected::before { content: '✅ 유효본'; font-size: 7pt; font-weight: 700; color: var(--green); display: block; margin-bottom: 1mm; }
.hi-row { display: flex; gap: 3mm; align-items: center; flex-wrap: wrap; }
.hi-time { font-size: 7.5pt; color: var(--muted); }
.hi-badge { padding: 1mm 2.5mm; border-radius: 5px; font-size: 7pt; font-weight: 700; }
.hi-score { background: var(--main); color: #fff; }
.hi-ver   { background: var(--mint-lt); color: var(--green); }
.hi-mode  { background: var(--warm); color: var(--muted); }
.hi-inst  { background: #EFF6FF; color: #1D4ED8; }
.modal-btns { display: flex; gap: 2.5mm; margin-top: 4mm; justify-content: flex-end; }
.modal-cancel { padding: 2.5mm 5mm; border-radius: 8px; border: 1px solid var(--line); background: var(--white); font-family: inherit; font-size: 9pt; cursor: pointer; }
.modal-confirm { padding: 2.5mm 5mm; border-radius: 8px; border: none; background: var(--mint); color: #fff; font-family: inherit; font-size: 9pt; font-weight: 700; cursor: pointer; }

/* 빈 상태 */
.empty-state { padding: 8mm; text-align: center; color: var(--muted); font-size: 8.5pt; }

/* 요일 카드 (강사 뷰) */
.day-section { margin-bottom: 5mm; }
.day-header {
  display: flex; align-items: center; gap: 3mm; margin-bottom: 3mm;
}
.day-badge {
  background: var(--main); color: #fff; border-radius: 10px;
  padding: 2mm 4mm; font-size: 9pt; font-weight: 700; min-width: 14mm; text-align: center;
}
.day-count { font-size: 8pt; color: var(--muted); }
.day-progress {
  margin-left: auto; display: flex; align-items: center; gap: 2mm;
  font-size: 8pt; color: var(--muted);
}
.progress-bar-wrap {
  width: 30mm; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill { height: 100%; background: var(--mint); border-radius: 3px; transition: width .3s; }

.checklist { display: flex; flex-direction: column; gap: 2mm; }
.check-item {
  background: var(--white); border-radius: 12px; border: 1.5px solid var(--line);
  padding: 3mm 4mm; display: flex; align-items: center; gap: 3mm;
  transition: border-color .2s;
}
.check-item.submitted { border-color: var(--mint); background: var(--mint-lt); }
.check-item.skipped   { opacity: .45; background: #F3F4F6; }

.check-icon {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.check-icon.done    { background: var(--mint);  color: #fff; }
.check-icon.pending { background: var(--line);  color: var(--muted); }
.check-icon.skip    { background: #FEE2E2; color: #991B1B; }

.check-info { flex: 1; }
.check-name { font-size: 9pt; font-weight: 700; color: var(--main); }
.check-meta { font-size: 7.5pt; color: var(--muted); margin-top: .5mm; }
.check-period {
  background: var(--mint-lt); color: #0F6E56; border-radius: 6px;
  padding: 1mm 2.5mm; font-size: 7pt; font-weight: 600; white-space: nowrap;
}
.check-score {
  background: var(--main); color: #fff; border-radius: 8px;
  padding: 1.5mm 3mm; font-size: 8pt; font-weight: 700; white-space: nowrap;
}
.form-link-btn {
  padding: 2mm 4mm; border-radius: 8px; font-size: 8pt; font-weight: 600;
  background: var(--mint); color: #fff; border: none; cursor: pointer;
  font-family: inherit; text-decoration: none; display: inline-flex; align-items: center;
  gap: 1.5mm; transition: opacity .2s; white-space: nowrap;
}
.form-link-btn:hover { opacity: .85; }
.form-link-btn.done { background: var(--green-lt); color: var(--green); }

/* 반응형 */
@media (max-width: 900px) {
  .data-table thead th:nth-child(4),
  .data-table tbody td:nth-child(4) { display: none; }
}
</style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">IRURI EDUCATION</div>
    <div class="login-sub">이루리학원 수학관</div>
    <div class="login-title">월간 진단평가</div>
    <div class="login-field">
      <label>아이디</label>
      <input type="text" id="login-id" placeholder="아이디 입력" autocomplete="username">
    </div>
    <div class="login-field">
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ── 앱 ── -->
<div id="app">
  <div class="app-header">
    <div>
      <span class="header-brand">IRURI EDUCATION <span>리포트 관리 대시보드</span></span>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge">관리자</div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="tab-bar" id="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('student')">👥 학생별 현황</button>
    <button class="tab-btn" onclick="switchTab('instructor')">👨‍🏫 강사별 현황</button>
  </div>

  <!-- 관리자/실장 뷰 -->
  <div id="admin-view">

  <!-- 학생별 탭 -->
  <div class="tab-content active" id="tab-student">
    <div class="round-bar">
      <label>📋 시행 회차</label>
      <select class="round-select" id="round-select-student" onchange="renderStudentTab()">
        <option value="고3-1">고3 1회차 (3/30–4/5)</option>
        <option value="고12-1">고1·2 1회차 (4/13–4/19)</option>
        <option value="고3-2">고3 2회차 (4/27–5/3)</option>
        <option value="고12-2">고1·2 2회차 (5/11–5/17)</option>
        <option value="고3-3">고3 3회차 (5/25–5/31)</option>
        <option value="고12-3">고1·2 3회차 (6/8–6/14)</option>
      </select>
      <div class="round-stats" id="round-stats-student"></div>
    </div>

    <!-- 담당실장 필터 -->

<script>
// ══ 계정 설정 ══
const ACCOUNTS = {
  'admin':  { pw: '8523', role: 'admin',   name: '관리자' },
  // 상담실장
  '임지정': { pw: '8523', role: 'manager', name: '임지정 실장', manager: '임지정' },
  '서미애': { pw: '8523', role: 'manager', name: '서미애 실장', manager: '서미애' },
  '이상화': { pw: '8523', role: 'manager', name: '이상화 실장', manager: '이상화' },
  '박미정': { pw: '8523', role: 'manager', name: '박미정 실장', manager: '박미정' },
  '박영아': { pw: '8523', role: 'manager', name: '박영아 실장', manager: '박영아' },
  '한희정': { pw: '8523', role: 'manager', name: '한희정 실장', manager: '한희정' },
  '한지은': { pw: '8523', role: 'manager', name: '한지은 실장', manager: '한지은' },

  '김상현': { pw: '8523', role: 'teacher', name: '김상현 강사', instructor: '김상현' },
  '김선식': { pw: '8523', role: 'teacher', name: '김선식 강사', instructor: '김선식' },
  '박재현': { pw: '8523', role: 'teacher', name: '박재현 강사', instructor: '박재현' },
  '서현우': { pw: '8523', role: 'teacher', name: '서현우 강사', instructor: '서현우' },
  '윤영찬': { pw: '8523', role: 'teacher', name: '윤영찬 강사', instructor: '윤영찬' },
  '이주영': { pw: '8523', role: 'teacher', name: '이주영 강사', instructor: '이주영' },
  '조예나': { pw: '8523', role: 'teacher', name: '조예나 강사', instructor: '조예나' },
};

// ══ Apps Script URL ══
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYvhYogtDVKnCF3DRVdNI51ssBwXQY8hOr5cUxcu4cJn5OKzJEeBNlXmlWc4kFA3Kh/exec';

// ══ 상태 ══
let currentUser = null;
let studentData = [];
let submittedData = {};       // 유효본 {sKey: {...}}

let statusData = {};
let pdfStatus = {};
let activeManagerFilter = 'all';
let activeInstructorFilter = 'all';
let execData = {};   // 시행담당 지정 {round_sKey: instructorName}
let allSubmits = {}; // 전체 제출 내역 {sKey: [...]}

// ══ 로그인 ══
function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  document.getElementById('login-error').style.display = 'none';
  currentUser = { id, ...acc };
  document.getElementById('user-badge').textContent = acc.name;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');

  // 강사 로그인 시 강사 전용 뷰로 전환
  if (acc.role === 'teacher') {
    document.getElementById('admin-tabs').style.display = 'none';
    document.getElementById('teacher-view').style.display = 'block';
    document.getElementById('admin-view').style.display = 'none';
  } else {
    document.getElementById('admin-tabs').style.display = 'flex';
    document.getElementById('teacher-view').style.display = 'none';
    document.getElementById('admin-view').style.display = 'block';
  }
  loadData();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen') && !document.getElementById('login-screen').classList.contains('hidden')) {
    doLogin();
  }
});

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
}

// ══ 탭 전환 ══
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`#tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'student') renderStudentTab();
  else renderInstructorTab();
}

// ══ 데이터 로드 ══
async function loadData() {
  try {
    // 학생 목록 (timetable 기반)
    const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
    const json = await res.json();
    if (json.result === 'success') {
      studentData  = json.students || [];
      submittedData = json.submitted || {};
      allSubmits   = json.allSubmitted || {};
      // 로컬에 저장된 유효본 선택 반영
      const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
      Object.entries(chosen).forEach(([sKey, idx]) => {
        const list = allSubmits[sKey];
        if (list && list[idx]) submittedData[sKey] = list[idx];
      });
    }
  } catch(e) {
    console.warn('데이터 로드 실패, 샘플 데이터 사용');
    studentData   = getSampleStudents();
    submittedData = getSampleSubmitted();
    allSubmits    = getSampleAllSubmits();
  }

  // 로컬 상태 복원
  try {
    statusData = JSON.parse(localStorage.getItem('iruri_status') || '{}');
    pdfStatus  = JSON.parse(localStorage.getItem('iruri_pdf') || '{}');
    execData   = JSON.parse(localStorage.getItem('iruri_exec') || '{}');
    allSubmits = JSON.parse(localStorage.getItem('iruri_all_submits') || '{}');
  } catch(e) {}

  renderStudentTab();
  renderInstructorTab();
  if (currentUser?.role === 'teacher') renderTeacherView();
}

// ══ 상태 저장 ══
function saveStatus() {
  try {
    localStorage.setItem('iruri_status', JSON.stringify(statusData));
    localStorage.setItem('iruri_pdf',    JSON.stringify(pdfStatus));
    localStorage.setItem('iruri_exec',   JSON.stringify(execData));
    localStorage.setItem('iruri_all_submits', JSON.stringify(allSubmits));
  } catch(e) {}
}

// ══ 학생별 탭 렌더 ══
function renderStudentTab() {
  const round = document.getElementById('round-select-student').value;
  const isHighSchool = round.startsWith('고3') || round.startsWith('고12');

  // 로그인 계정에 따라 학생 필터링
  let students = studentData;
  if (currentUser && currentUser.role === 'manager') {
    students = students.filter(s => s.manager === currentUser.manager);
  }

  // 담당실장 필터 버튼 렌더
  const managers = ['all', ...new Set(students.map(s => s.manager).filter(Boolean))];
  const mf = document.getElementById('manager-filter');
  mf.innerHTML = managers.map(m => `
    <button class="filter-btn ${activeManagerFilter === m ? 'active' : ''}"
      onclick="activeManagerFilter='${m}';renderStudentTab()">
      ${m === 'all' ? '전체' : m + ' 실장'}
    </button>`).join('');

  // 담당실장 필터 적용
  if (activeManagerFilter !== 'all') {
    students = students.filter(s => s.manager === activeManagerFilter);
  }

  // 통계
  const hsStudents = students.filter(s => s.grade === '고등');
  const submitted = hsStudents.filter(s => submittedData[s.name]);
  document.getElementById('round-stats-student').innerHTML = `
    <span class="stat-pill total">전체 ${hsStudents.length}명</span>
    <span class="stat-pill done">제출완료 ${submitted.length}명</span>
    <span class="stat-pill pending">미제출 ${hsStudents.length - submitted.length}명</span>`;

  document.getElementById('student-count').textContent = `총 ${students.length}명`;

  // 테이블 렌더
  const tbody = document.getElementById('student-tbody');
  tbody.innerHTML = '';

  // 고등 먼저, 그다음 중등·초등, 이름순
  const sorted = [...students].sort((a, b) => {
    const o = { '고등': 0, '중등': 1, '초등': 2 };
    return (o[a.grade] ?? 3) - (o[b.grade] ?? 3) || a.name.localeCompare(b.name, 'ko');
  });

  sorted.forEach(s => {
    if (isPracticeStudent(s)) return;
    const isHS = s.grade === '고등';
    const sKey = s.key || s.name;
    const statusKey = `${round}_${sKey}`;
    const isSubmitted = !!(submittedData[sKey] || submittedData[`key:${sKey}`]);
    const isPdf = !!pdfStatus[statusKey];
    const isReviewed = !!(statusData[statusKey]?.reviewed);
    const isSent = !!(statusData[statusKey]?.sent);
    const isSkipped = !!(statusData[statusKey]?.skipped);

    const sub = submittedData[sKey] || submittedData[`key:${sKey}`];
    const allSubs = allSubmits[sKey] || (sub ? [sub] : []);
    const hasDup  = allSubs.length > 1;

    // 점수 + 난이도
    const scoreHtml = isHS && !isSkipped
      ? (isSubmitted && sub?.correct_q != null
          ? `<span class="score-badge">${sub.correct_q}<span class="sub">/${sub.total_q||'?'}</span></span>
             <span style="background:var(--main);color:#fff;border-radius:5px;padding:1px 5px;font-size:7pt;font-weight:700;margin-left:1.5mm;">${sub.version||'-'}</span>`
          : `<span style="color:var(--muted);font-size:7.5pt">-</span>`)
      : `<span style="color:var(--muted);font-size:7.5pt">-</span>`;

    const instructorText = Array.isArray(s.instructors) && s.instructors.length
      ? s.instructors.join(', ') : (s.instructor || '-');

    const schedTags = (s.schedules || []).map(sc =>
      `<span class="sched-tag">${sc.day}요일 ${sc.period}구간</span>`).join('');

    // 시행담당 열
    const execHtml = isHS && !isSkipped ? execDropdownHtml(round, sKey, s) : '-';

    // 코멘트 전용 여부
    const modeTag = sub?.submit_mode === 'comment_only'
      ? `<span style="background:#F5F0E8;color:var(--muted);border-radius:5px;padding:1px 4px;font-size:7pt;margin-left:1.5mm;">코멘트만</span>` : '';

    // 시행완료 배지
    const completeBadge = isHS && !isSkipped
      ? `<div style="display:flex;align-items:center;gap:1mm;flex-wrap:wrap;">
           <span class="status-badge ${isSubmitted?'done':'pending'}">${isSubmitted?'✅ 완료':'⏳ 미제출'}</span>
           ${isSubmitted ? modeTag : ''}
           ${hasDup ? `<button class="dup-btn" onclick="showSubmitPopup('${sKey}','${s.name}')">📋 ${allSubs.length}건</button>` : ''}
         </div>`
      : `<span class="status-badge na">미시행</span>`;

    const row = document.createElement('tr');
    if (!isHS || isSkipped) row.classList.add('inactive-row');
    row.innerHTML = `
      <td class="name-cell">${s.name}</td>
      <td class="muted">${s.school||''} ${s.grade_num||''}학년</td>
      <td class="muted">${instructorText}</td>
      <td>${execHtml}</td>
      <td><div class="schedule-tags">${schedTags||'<span style="color:var(--muted);font-size:7pt">-</span>'}</div></td>
      <td class="muted">${s.manager||'-'}</td>
      <td>${scoreHtml}</td>
      <td>${completeBadge}</td>
      <td>${isHS && !isSkipped
        ? `<button class="gen-btn" onclick="generatePDF('${statusKey}','${s.name}')" ${!isSubmitted?'disabled title="강사 제출 후 생성 가능"':''}>
            ${isPdf?'✅ 재생성':'📄 생성'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${isHS && !isSkipped
        ? `<button class="toggle-btn ${isReviewed?'on':'off'}" onclick="toggleStatus('${statusKey}','reviewed')">
            ${isReviewed?'✅ 완료':'검수 전'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${isHS && !isSkipped
        ? `<button class="toggle-btn ${isSent?'on':'off'}" onclick="toggleStatus('${statusKey}','sent')">
            ${isSent?'✅ 발송':'미발송'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td><button class="skip-btn ${isSkipped?'on':'off'}" onclick="toggleStatus('${statusKey}','skipped')">
          ${isSkipped?'⛔ 미시행':'-'}</button></td>`;
    tbody.appendChild(row);
  });
}

// ══ 강사별 탭 렌더 ══
function renderInstructorTab() {
  const round = document.getElementById('round-select-instructor').value;

  let students = studentData.filter(s => s.grade === '고등');

    students = students.filter(s => s.manager === currentUser.manager);

  const instructors = ['all', ...new Set(students.map(s => s.instructor).filter(Boolean)).values()].sort();

    const isSent = !!(statusData[statusKey]?.sent);
    const isSkipped = !!(statusData[statusKey]?.skipped);
    const sub = submittedData[sKey] || submittedData[`key:${sKey}`];
    const allSubs = allSubmits[sKey] || (sub ? [sub] : []);
    const hasDup = allSubs.length > 1;

    const scoreHtml = !isSkipped

          ? `<span class="score-badge">${sub.correct_q}<span class="sub">/${sub.total_q||'?'}</span></span>

          : `<span style="color:var(--muted);font-size:7.5pt">-</span>`)
      : `<span style="color:var(--muted);font-size:7.5pt">-</span>`;

    const instructorText = Array.isArray(s.instructors) && s.instructors.length
      ? s.instructors.join(', ') : (s.instructor || '-');
    const schedTags = (s.schedules || []).map(sc =>
      `<span class="sched-tag">${sc.day}요일 ${sc.period}구간</span>`).join('');
    const execHtml = !isSkipped ? execDropdownHtml(round, sKey, s) : '-';
    const modeTag = sub?.submit_mode === 'comment_only'
      ? `<span style="background:#F5F0E8;color:var(--muted);border-radius:5px;padding:1px 4px;font-size:7pt;margin-left:1.5mm;">코멘트만</span>` : '';

    const row = document.createElement('tr');
    if (isSkipped) row.classList.add('inactive-row');
    row.innerHTML = `
      <td class="name-cell">${s.name}</td>
      <td class="muted">${s.school||''} ${s.grade_num||''}학년</td>

             ${isSubmitted?modeTag:''}
             ${hasDup?`<button class="dup-btn" onclick="showSubmitPopup('${sKey}','${s.name}')">📋 ${allSubs.length}건</button>`:''}
           </div>`
        : `<span class="status-badge na">미시행</span>`}</td>
      <td>${!isSkipped
        ? `<button class="gen-btn" onclick="generatePDF('${statusKey}','${s.name}')" ${!isSubmitted?'disabled':''}>${isPdf?'✅ 재생성':'📄 생성'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${!isSkipped
        ? `<button class="toggle-btn ${isReviewed?'on':'off'}" onclick="toggleStatus('${statusKey}','reviewed')">${isReviewed?'✅ 완료':'검수 전'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td>${!isSkipped
        ? `<button class="toggle-btn ${isSent?'on':'off'}" onclick="toggleStatus('${statusKey}','sent')">${isSent?'✅ 발송':'미발송'}</button>`
        : `<span class="status-badge na">-</span>`}</td>
      <td><button class="skip-btn ${isSkipped?'on':'off'}" onclick="toggleStatus('${statusKey}','skipped')">${isSkipped?'⛔ 미시행':'-'}</button></td>`;
    tbody.appendChild(row);
  });
}

// ══ 강사 전용 뷰 렌더 ══
const DAY_ORDER = ['월','화','수','목','금','토','일'];
const FORM_URL  = 'https://irurimath.github.io/IRURI-MATH'; // 강사입력폼 URL

function renderTeacherView() {
  if (!currentUser || currentUser.role !== 'teacher') return;
  const myName = currentUser.instructor;
  const round  = document.getElementById('round-select-teacher').value;

  // 내 담당 학생만 (연습 데이터 제외)
  const myStudents = studentData.filter(s =>
    s.grade === '고등' &&
    !isPracticeStudent(s) &&
    (s.instructor === myName || (s.instructors || []).includes(myName))
  );

  // 통계
  const submitted = myStudents.filter(s => submittedData[s.name]);
  const total = myStudents.length;
  document.getElementById('teacher-stats').innerHTML = `
    <span class="stat-pill total">담당 ${total}명</span>
    <span class="stat-pill done">제출완료 ${submitted.length}명</span>
    <span class="stat-pill pending">미제출 ${total - submitted.length}명</span>`;

  // 요일별 그룹핑
  const byDay = {};
  DAY_ORDER.forEach(d => byDay[d] = []);

  myStudents.forEach(s => {
    const sKey = s.key || s.name;
    const statusKey = `${round}_${sKey}`;
    const isSkipped   = !!(statusData[statusKey]?.skipped);
    const isSubmitted = !!(submittedData[sKey]);
    const sub = submittedData[sKey];

    // 이 강사의 역할 (시행담당 or 코멘트만)
    const myRole = getInstructorRole(round, sKey, s, myName);
    const isExec = myRole === 'exec';

    // 이 학생의 수강 요일 (여러 개 가능)
    const days = [...new Set((s.schedules || []).map(sc => sc.day))];
    if (days.length === 0) days.push('미정');

    days.forEach(day => {
      const periods = (s.schedules || []).filter(sc => sc.day === day).map(sc => sc.period + '구간');
      if (!byDay[day]) byDay[day] = [];
      byDay[day].push({ ...s, sKey, statusKey, isSkipped, isSubmitted, sub, periodsOfDay: periods, myRole, isExec });
    });
  });

  const body = document.getElementById('teacher-body');
  body.innerHTML = '';

  DAY_ORDER.forEach(day => {
    const list = byDay[day];
    if (!list || list.length === 0) return;

    const doneCount = list.filter(s => s.isSubmitted && !s.isSkipped).length;
    const activeCount = list.filter(s => !s.isSkipped).length;
    const pct = activeCount > 0 ? Math.round(doneCount / activeCount * 100) : 0;

    const sec = document.createElement('div');
    sec.className = 'day-section';
    sec.innerHTML = `
      <div class="day-header">
        <div class="day-badge">${day}요일</div>
        <div class="day-count">${list.length}명</div>
        <div class="day-progress">
          <span>${doneCount}/${activeCount} 제출</span>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span>${pct}%</span>
        </div>
      </div>
      <div class="checklist" id="checklist-${day}"></div>`;
    body.appendChild(sec);

    const cl = document.getElementById(`checklist-${day}`);
    list.sort((a,b) => a.name.localeCompare(b.name,'ko'));
    list.forEach(s => {
      const item = document.createElement('div');
      // 코멘트 전용이고 시행완료면 submitted 스타일, 미제출이면 comment-pending
      const isCommentDone = !s.isExec && s.isSubmitted;
      item.className = `check-item${s.isSubmitted ? ' submitted' : ''}${s.isSkipped ? ' skipped' : ''}`;

      const iconClass = s.isSkipped ? 'skip' : (s.isSubmitted ? 'done' : 'pending');
      const iconChar  = s.isSkipped ? '⛔' : (s.isSubmitted ? '✓' : '○');

      // 점수 — 시행담당이 제출한 경우 or 상대방 강사가 이미 제출한 경우
      const scoreHtml = s.sub?.correct_q != null
        ? `<span class="check-score">${s.sub.correct_q}/${s.sub.total_q||'?'}
           <span style="font-size:7pt;opacity:.8"> ${s.sub.version||''}</span></span>`
        : '';

      const periodTags = s.periodsOfDay.map(p => `<span class="check-period">${p}</span>`).join('');

      // 역할 배지
      const roleBadge = isMultiInstructor(s)
        ? (s.isExec
            ? `<span style="background:var(--mint-lt);color:#0F6E56;border-radius:6px;padding:1mm 2.5mm;font-size:7pt;font-weight:700;">🟢 시행담당</span>`
            : `<span style="background:var(--blue-lt);color:var(--blue);border-radius:6px;padding:1mm 2.5mm;font-size:7pt;font-weight:700;">💬 코멘트만</span>`)
        : '';

      // 버튼 — 역할에 따라 다르게
      let btnHtml;
      // 발송 완료 시 리포트 열람 버튼 (강사용)
      const isSentForStudent = !!(statusData[s.statusKey]?.sent);
      const isPdfForStudent  = !!(pdfStatus[s.statusKey]);

      if (s.isSkipped) {
        btnHtml = '<span style="font-size:7.5pt;color:#991B1B;">미시행 처리됨</span>';
      } else if (isSentForStudent && isPdfForStudent) {
        // 발송+PDF 완료 → 리포트 보기 가능
        const sData = s;
        const sub2  = s.sub;
        const rParams = sub2 ? new URLSearchParams({
          name: sData.name, school: sData.school||'', grade: sData.grade_num||'',
          round: sub2.round_label||'', version: sub2.version||'',
          correct: sub2.correct_q??'', total: sub2.total_q??'',
          wrong: sub2.wrong_q||'', instructor: sub2.instructor||sData.instructor||'',
          comment: sub2.comment||'', direction: sub2.direction||'',
        }).toString() : '';
        const viewerUrl = rParams
          ? `https://irurimath.github.io/IRURI-MATH/report-viewer.html?${rParams}`
          : '#';
        btnHtml = `
          <div style="display:flex;flex-direction:column;gap:1.5mm;align-items:flex-end;">
            <a class="form-link-btn done" href="${viewerUrl}" target="_blank">📄 리포트 보기</a>
            ${s.isSubmitted
              ? `<span style="font-size:7pt;color:var(--green);">✅ 제출완료</span>`
              : `<a class="form-link-btn" href="${FORM_URL}" target="_blank" style="font-size:7pt;padding:1mm 2.5mm;">✏️ 폼 수정</a>`}
          </div>`;
      } else if (s.isSubmitted) {
        btnHtml = `<a class="form-link-btn done" href="${FORM_URL}" target="_blank">✅ 제출완료</a>`;
      } else if (s.isExec) {
        btnHtml = `<a class="form-link-btn" href="${FORM_URL}" target="_blank">✏️ 폼 제출하기</a>`;
      } else {
        const partnerDone = !!s.sub?.correct_q;
        btnHtml = partnerDone
          ? `<a class="form-link-btn" href="${FORM_URL}" target="_blank" style="background:#5B82FA;">💬 코멘트 입력</a>`
          : `<span style="font-size:7.5pt;color:var(--muted);">⏳ 시행담당 제출 대기 중</span>`;
      }

      item.innerHTML = `
        <div class="check-icon ${iconClass}">${iconChar}</div>
        <div class="check-info">
          <div class="check-name">${s.name}
            <span style="font-size:7.5pt;font-weight:400;color:var(--muted);margin-left:1.5mm;">${s.school||''} ${s.grade_num||''}학년</span>
            ${roleBadge ? `<span style="margin-left:1.5mm;">${roleBadge}</span>` : ''}
          </div>
          <div class="check-meta" style="display:flex;gap:1.5mm;margin-top:1mm;flex-wrap:wrap;">
            ${periodTags}
            ${s.isSubmitted && s.sub?.round_label ? `<span style="color:var(--muted)">${s.sub.round_label}</span>` : ''}
          </div>
        </div>
        ${scoreHtml}
        ${btnHtml}`;
      cl.appendChild(item);
    });
  });

  // 담당 학생이 없으면 안내
  if (myStudents.length === 0) {
    body.innerHTML = '<div class="empty-state">담당 학생 데이터를 불러오는 중입니다...</div>';
  }
}
// ══ 제출 내역 팝업 (중복 제출 유효본 선택) ══
let selectedHistoryIdx = null;
let currentHistorySKey = null;

function showHistory(sKey, studentName) {
  const list = allSubmits[sKey] || [];
  const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
  const currentIdx = chosen[sKey] ?? (list.length - 1);
  selectedHistoryIdx = currentIdx;
  currentHistorySKey = sKey;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'history-modal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">📋 제출 내역 — ${studentName}</div>
      <div class="modal-sub">유효본으로 사용할 제출을 선택하세요. (현재: ${currentIdx + 1}번째)</div>
      <div id="history-list"></div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeHistory()">취소</button>
        <button class="modal-confirm" onclick="confirmHistory('${sKey}')">선택 완료</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const listEl = document.getElementById('history-list');
  [...list].reverse().forEach((sub, ri) => {
    const i = list.length - 1 - ri;
    const item = document.createElement('div');
    item.className = `history-item${i === currentIdx ? ' selected' : ''}`;
    item.onclick = () => {
      document.querySelectorAll('.history-item').forEach(el => el.classList.remove('selected'));
      item.classList.add('selected');
      selectedHistoryIdx = i;
    };
    item.innerHTML = `
      <div class="hi-row">
        <span style="font-size:8.5pt;font-weight:700;color:var(--main)">${i + 1}번째 제출</span>
        <span class="hi-time">${sub.timestamp || ''}</span>
        ${i === list.length - 1 ? '<span style="font-size:7pt;background:#D4EFDF;color:#1A7A5E;padding:1px 4px;border-radius:4px;">최신</span>' : ''}
      </div>
      <div class="hi-row" style="margin-top:1.5mm;">
        ${sub.instructor ? `<span class="hi-badge hi-inst">👨‍🏫 ${sub.instructor}</span>` : ''}
        ${sub.version    ? `<span class="hi-badge hi-ver">${sub.version}</span>` : ''}
        ${sub.correct_q != null && sub.correct_q !== '' ? `<span class="hi-badge hi-score">${sub.correct_q}/${sub.total_q}</span>` : ''}
        ${sub.submit_mode === 'comment_only' ? `<span class="hi-badge hi-mode">코멘트만</span>` : ''}
        ${sub.round_label ? `<span style="font-size:7.5pt;color:var(--muted)">${sub.round_label}</span>` : ''}
      </div>
      ${sub.comment ? `<div style="font-size:7.5pt;color:var(--muted);margin-top:1.5mm;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">"${sub.comment.substring(0,60)}${sub.comment.length>60?'…':''}"</div>` : ''}`;
    listEl.appendChild(item);
  });
}

function closeHistory() {
  const el = document.getElementById('history-modal');
  if (el) el.remove();
}

function confirmHistory(sKey) {
  if (selectedHistoryIdx === null) return;
  const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
  chosen[sKey] = selectedHistoryIdx;
  localStorage.setItem('iruri_chosen', JSON.stringify(chosen));
  const list = allSubmits[sKey];
  if (list) submittedData[sKey] = list[selectedHistoryIdx];
  closeHistory();
  renderStudentTab();
  renderInstructorTab();
}

function toggleStatus(key, field) {
  if (!statusData[key]) statusData[key] = {};
  statusData[key][field] = !statusData[key][field];
  saveStatus();
  renderStudentTab();
  renderInstructorTab();
}

// ══ PDF 생성 — 리포트 뷰어 새 탭으로 열기 ══
function generatePDF(statusKey, studentName) {
  // statusKey = "고3-1_고민서0607" 형태
  const parts  = statusKey.split('_');
  const round  = parts[0];
  const sKey   = parts.slice(1).join('_');
  const sub    = submittedData[sKey];
  const s      = studentData.find(st => (st.key || st.name) === sKey);

  if (!sub || !s) {
    alert('제출 데이터가 없습니다. 강사 폼 제출 후 다시 시도해주세요.');
    return;
  }

  // 리포트 뷰어 URL에 데이터를 쿼리스트링으로 전달
  const params = new URLSearchParams({
    name:     s.name,
    school:   s.school || '',
    grade:    s.grade_num || '',
    round:    sub.round_label || round,
    version:  sub.version || '',
    correct:  sub.correct_q ?? '',
    total:    sub.total_q ?? '',
    wrong:    sub.wrong_q || '',
    instructor: sub.instructor || s.instructor || '',
    comment:  sub.comment || '',
    direction: sub.direction || '',
  });

  // 리포트 뷰어 열기 (같은 저장소의 report-viewer.html)
  const viewerUrl = `https://irurimath.github.io/IRURI-MATH/report-viewer.html?${params.toString()}`;
  window.open(viewerUrl, '_blank');

  pdfStatus[statusKey] = true;
  saveStatus();
  renderStudentTab();
  renderInstructorTab();
}

// ══ 시행담당 헬퍼 ══

// 다강사 학생인지 여부
function isMultiInstructor(s) {
  return Array.isArray(s.instructors) && s.instructors.length > 1;
}

// 해당 회차에서 시행담당 강사 반환
function getExecInstructor(round, sKey, s) {
  if (!isMultiInstructor(s)) return s.instructor || s.instructors?.[0] || '';
  const stored = execData[`${round}_${sKey}`];
  return stored || s.instructors[0]; // 기본: 첫 번째 강사
}

// 시행담당 변경 (admin만)
function setExecInstructor(round, sKey, instructor) {
  execData[`${round}_${sKey}`] = instructor;
  saveStatus();
  renderStudentTab();
  renderInstructorTab();
}

// 시행담당 드롭다운 HTML (admin 전용)
function execDropdownHtml(round, sKey, s) {
  if (!isMultiInstructor(s)) return `<span class="exec-label-single">단독</span>`;
  const exec = getExecInstructor(round, sKey, s);
  const isAdmin = currentUser?.role === 'admin';
  if (isAdmin) {
    const opts = s.instructors.map(i =>
      `<option value="${i}" ${i === exec ? 'selected' : ''}>${i}</option>`
    ).join('');
    return `<select class="exec-select" onchange="setExecInstructor('${round}','${sKey}',this.value)">${opts}</select>`;
  }
  return `<span class="exec-label-exec">🟢 ${exec}</span>`;
}

// 특정 강사가 해당 회차에서 이 학생의 역할
function getInstructorRole(round, sKey, s, instructorName) {
  if (!isMultiInstructor(s)) return 'exec'; // 단독 = 시행
  const exec = getExecInstructor(round, sKey, s);
  return exec === instructorName ? 'exec' : 'comment';
}

// 역할 배지 HTML
function roleBadgeHtml(role) {
  if (role === 'exec')    return `<span class="exec-label-exec">🟢 시행담당</span>`;
  if (role === 'comment') return `<span class="exec-label-comment">💬 코멘트만</span>`;
  return '';
}

// ══ 제출 내역 팝업 ══
let popupCallback = null;

function showSubmitPopup(sKey, studentName) {
  const list = allSubmits[sKey] || (submittedData[sKey] ? [submittedData[sKey]] : []);
  if (!list.length) { alert('제출 내역이 없습니다.'); return; }

  const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
  const currentIdx = chosen[sKey] ?? list.length - 1;

  let html = `
    <div class="popup-overlay" id="submit-popup" onclick="if(event.target===this)closePopup()">
      <div class="popup-box">
        <div class="popup-title">📋 ${studentName} — 제출 내역 선택</div>`;

  list.forEach((sub, i) => {
    const sel = i === currentIdx ? 'selected' : '';
    const ts = sub.timestamp || '-';
    const score = sub.correct_q != null ? `${sub.correct_q}/${sub.total_q} · ${sub.version || ''}` : '-';
    html += `
      <div class="popup-item ${sel}" onclick="selectPopupItem(${i})" data-idx="${i}">
        <div class="popup-item-info">
          <div class="popup-item-ts">${ts}</div>
          <div class="popup-item-detail">점수 ${score} · ${sub.round_label || ''}</div>
        </div>
        <span class="popup-check">✓</span>
      </div>`;
  });

  html += `
        <div class="popup-btns">
          <button class="popup-btn-cancel" onclick="closePopup()">취소</button>
          <button class="popup-btn-ok" onclick="confirmPopup('${sKey}')">이 버전으로 설정</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

function selectPopupItem(idx) {
  document.querySelectorAll('.popup-item').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

function confirmPopup(sKey) {
  const selected = document.querySelector('.popup-item.selected');
  if (!selected) return;
  const idx = parseInt(selected.dataset.idx);
  const chosen = JSON.parse(localStorage.getItem('iruri_chosen') || '{}');
  chosen[sKey] = idx;
  localStorage.setItem('iruri_chosen', JSON.stringify(chosen));

  const list = allSubmits[sKey] || [];
  if (list[idx]) submittedData[sKey] = list[idx];

  closePopup();
  renderStudentTab();
  renderInstructorTab();
}

function closePopup() {
  const p = document.getElementById('submit-popup');
  if (p) p.remove();
}

// ══ 연습 데이터 필터 ══
function isPracticeStudent(s) {
  const school = s.school || '';
  const name = s.name || '';
  return school.includes('이루리') ||
         /연습$/i.test(name) ||
         /[0-9]$/.test(name);  // 강가나1, 윤동원7 등
}
