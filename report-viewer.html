<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRURI EDUCATION — 리포트 뷰어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>

.print-bar{background:var(--main);color:#fff;padding:3.5mm 8mm;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;}
.print-bar-title{font-size:9pt;font-weight:700;letter-spacing:1.5px;}
.print-bar-right{display:flex;gap:3mm;align-items:center;}
.print-btn{padding:2mm 5mm;background:var(--mint);color:#fff;border:none;
  border-radius:8px;font-size:9pt;font-weight:700;font-family:inherit;cursor:pointer;}
.print-hint{font-size:7.5pt;color:rgba(255,255,255,.45);}

:root{
  --main:#0D2B1F;--main2:#1A3D2B;--mint:#3DBFA0;--mint-lt:#E8F7F3;
  --ivory:#F7F4EE;--white:#FFFFFF;--ink:#1A1A1A;--muted:#717171;
  --line:#E2DDD6;--red:#8B2020;--red-lt:#FAE8E8;--coral:#E8604A;
  --warm:#F5F0E8;--purple:#534AB7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#DEDAD3;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;}
.page{width:210mm;min-height:297mm;margin:8mm auto;
  background:var(--white);box-shadow:0 8px 40px rgba(0,0,0,.15);
  border-radius:16px;overflow:hidden;display:flex;flex-direction:column;}

/* 표지 */
.cover{background:var(--main);display:flex;flex-direction:column;min-height:297mm;}
.cover-brand{padding:9mm 11mm 0;display:flex;justify-content:space-between;align-items:flex-start;}
.brand-en{font-size:9.5pt;font-weight:700;letter-spacing:2.5px;color:#fff;}
.brand-ko{font-size:7.5pt;color:rgba(255,255,255,.4);margin-top:1.5mm;letter-spacing:1px;}
.sp{flex:1;}
.cover-main{padding:0 11mm;}
.cover-eyebrow{font-size:7.5pt;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:5mm;}
.cover-title-en{font-family:'Playfair Display',serif;font-size:48pt;color:#fff;line-height:.88;}
.cover-title-en em{font-style:italic;color:rgba(255,255,255,.5);display:block;}
.cover-title-ko{font-size:11pt;font-weight:300;color:rgba(255,255,255,.3);letter-spacing:8px;margin-top:4mm;}
.cover-rule{width:18mm;height:2px;background:rgba(255,255,255,.2);border-radius:1px;margin:7mm 0;}
.cover-card{margin:0 11mm;background:rgba(255,255,255,.06);border-radius:14px;
  border:1px solid rgba(255,255,255,.1);padding:5mm 6mm;
  display:grid;grid-template-columns:1fr 1fr;gap:4mm 6mm;}
.ci label{font-size:6.5pt;color:rgba(255,255,255,.3);display:block;margin-bottom:1mm;letter-spacing:1px;text-transform:uppercase;}
.ci span{font-size:10.5pt;font-weight:700;color:#fff;}
.cover-badges{display:flex;gap:3mm;margin:4mm 11mm 0;}
.badge{flex:1;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(255,255,255,.09);padding:4mm 3mm;text-align:center;}
.bv{font-size:18pt;font-weight:700;color:#fff;line-height:1;display:block;}
.bv small{font-size:9pt;}
.bl{font-size:6pt;color:rgba(255,255,255,.3);margin-top:1.5mm;display:block;}
.cover-ov{margin:5mm 11mm 0;background:rgba(255,255,255,.05);border-radius:14px;
  border:1px solid rgba(255,255,255,.08);padding:5mm 6mm;}
.ov-lbl{font-size:6.5pt;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase;
  margin-bottom:3mm;display:flex;align-items:center;gap:2mm;}
.ov-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
.cover-ov p{font-size:8.5pt;line-height:1.92;color:rgba(255,255,255,.65);font-weight:300;}
.cover-ov p strong{color:rgba(255,255,255,.88);font-weight:500;}
.cover-ftr{padding:4mm 11mm;border-top:1px solid rgba(255,255,255,.06);
  display:flex;justify-content:space-between;align-items:center;}
.cfl{font-size:6.5pt;color:rgba(255,255,255,.15);}
.cfr{font-size:7.5pt;font-weight:500;color:rgba(255,255,255,.15);}

/* 내지 */
.page-inner{background:var(--ivory);}
.ih{background:var(--main);padding:4mm 10mm;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.ihl{font-size:7pt;letter-spacing:2px;color:rgba(255,255,255,.5);}
.ihr{font-size:7pt;color:rgba(255,255,255,.35);}
.pb{padding:6mm 10mm 5mm;flex:1;}
.if{padding:3.5mm 10mm;border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-shrink:0;}
.ifl{font-size:6.5pt;color:var(--muted);}
.ifr{font-size:7.5pt;font-weight:500;color:var(--muted);}

.sh{display:flex;align-items:center;gap:3mm;margin-bottom:4mm;}
.se{font-size:14px;line-height:1;}
.st{font-size:12pt;font-weight:700;color:var(--main);}
.sr{flex:1;height:1.5px;background:var(--line);border-radius:1px;}

/* 문항 2단 */
.qcols{display:grid;grid-template-columns:1fr 1fr;gap:4mm;align-items:start;}
.qcard{background:var(--white);border-radius:14px;border:1.5px solid var(--line);
  overflow:hidden;break-inside:avoid;page-break-inside:avoid;
  margin-bottom:0;}
.qcard.ok{border-color:#3DBFA0;}
.qcard.ng{border-color:var(--coral);}
.qh{padding:3mm 3.5mm;display:flex;align-items:center;gap:2.5mm;}
.qcard.ok .qh{background:#F0FAF7;}
.qcard.ng .qh{background:#FDF3F1;}
.qn{font-size:8.5pt;font-weight:700;padding:1.5mm 3mm;border-radius:6px;}
.qcard.ok .qn{background:#3DBFA0;color:#fff;}
.qcard.ng .qn{background:var(--coral);color:#fff;}
.qr{font-size:7pt;font-weight:700;letter-spacing:1px;}
.qcard.ok .qr{color:#1A7A5E;}
.qcard.ng .qr{color:var(--coral);}
.qt{margin-left:auto;text-align:right;font-size:7.5pt;font-weight:700;color:var(--main);line-height:1.3;}
.qb{padding:3.5mm;}
.ql{font-size:6.5pt;font-weight:700;color:var(--muted);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:1.5mm;display:flex;align-items:center;gap:2mm;}
.ql::after{content:'';flex:1;height:1px;background:var(--line);}
.qi{width:100%;background:var(--warm);border-radius:10px;
  border:1.5px dashed var(--line);overflow:hidden;margin-bottom:3mm;}
.qi img{width:100%;height:auto;display:block;}
.qi-ph{font-size:7.5pt;color:rgba(107,114,128,.4);text-align:center;padding:8mm;
  min-height:20mm;display:flex;align-items:center;justify-content:center;}
.qp{background:var(--mint-lt);border-left:3px solid var(--mint);
  border-radius:0 8px 8px 0;padding:2.5mm 3mm;font-size:7pt;line-height:1.75;color:var(--main2);}
.qpl{font-size:6.5pt;font-weight:700;color:#1A7A5E;letter-spacing:1px;text-transform:uppercase;margin-bottom:1mm;}
.qpn{background:var(--red-lt);border-left:3px solid var(--coral);
  border-radius:0 8px 8px 0;padding:2.5mm 3mm;font-size:7pt;line-height:1.75;color:#5A1010;}
.qpnl{font-size:6.5pt;font-weight:700;color:var(--coral);letter-spacing:1px;text-transform:uppercase;margin-bottom:1mm;}

/* 차트 */
.cw{background:var(--white);border-radius:14px;border:1px solid var(--line);padding:4mm 5mm 3mm;margin-bottom:5mm;}
.cleg{display:flex;gap:5mm;justify-content:flex-end;margin-bottom:3mm;font-size:7pt;color:var(--muted);}
.ld{width:8px;height:8px;border-radius:3px;display:inline-block;margin-right:2px;vertical-align:middle;}
.cbars{display:flex;align-items:flex-end;gap:2.5mm;height:36mm;position:relative;}
.cbl{display:none;}
.cbll{display:none;}
.cc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.cv{font-size:7.5pt;font-weight:700;margin-bottom:1mm;color:var(--ink);}
.cb{width:80%;max-width:13mm;border-radius:5px 5px 0 0;}
.cb.t{background:#3DBFA0;opacity:.75;}
.cb.e{background:var(--main);}
.cn{font-size:5.2pt;color:var(--muted);text-align:center;margin-top:1.5mm;padding-bottom:2mm;line-height:1.35;max-width:18mm;word-break:keep-all;}
.cn.en{color:var(--main);font-weight:700;}

/* 인사이트 */
.ir{display:grid;grid-template-columns:1fr 1fr;gap:3mm;margin-bottom:5mm;}
.ic{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:3.5mm;border-top:3px solid var(--line);}
.ic.hi{border-top-color:var(--mint);}
.ic.pos{border-top-color:var(--purple);}
.ic.w{border-top-color:var(--coral);}
.il{font-size:6.5pt;color:var(--muted);margin-bottom:2mm;}
.iv{font-size:15pt;font-weight:700;line-height:1;margin-bottom:1.5mm;}
.id{font-size:7pt;color:var(--muted);line-height:1.6;}

/* 진도 태그 */
.pt{display:flex;flex-wrap:wrap;gap:2mm;margin-bottom:4mm;}
.ptag{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:1.5mm 4mm;font-size:7.5pt;color:var(--ink);font-weight:500;}
.ptag.bk{background:var(--mint-lt);border-color:#3DBFA0;color:#0F6E56;}

/* 강사 코멘트 */
.instc{background:var(--main);border-radius:14px;padding:5mm 6mm;margin-bottom:5mm;position:relative;overflow:hidden;}
.instc::before{content:'\201C';font-family:'Playfair Display',serif;font-size:64pt;
  color:rgba(255,255,255,.07);position:absolute;top:-3mm;left:2mm;line-height:1;}
.instl{font-size:6.5pt;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:3mm;position:relative;}
.instt{font-size:8.5pt;line-height:1.95;color:rgba(255,255,255,.82);font-weight:300;position:relative;}

/* 다음달 방향 */
.nl{display:flex;flex-direction:column;gap:2.5mm;}
.ni{display:flex;align-items:flex-start;gap:3mm;background:var(--white);border-radius:12px;border:1px solid var(--line);padding:3.5mm 4mm;}
.nnw{width:24px;height:24px;border-radius:50%;background:var(--main);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nn{font-size:9pt;font-weight:700;color:#fff;}
.nt{font-size:8pt;line-height:1.82;color:var(--ink);padding-top:1mm;}
.nt strong{color:var(--main);font-weight:700;}

@media print{
  .print-bar{display:none;}
  body{background:none;}
  .page{margin:0;box-shadow:none;border-radius:0;page-break-after:always;break-after:page;width:210mm;min-height:297mm;}
  .page:last-child{page-break-after:avoid;break-after:avoid;}
  .qcard{break-inside:avoid;page-break-inside:avoid;}
  @page{size:A4;margin:0;}
}

</style>
</head>
<body>

<div class="print-bar">
  <div class="print-bar-title" id="bar-title">📄 IRURI EDUCATION — 리포트 뷰어</div>
  <div class="print-bar-right">
    <span class="print-hint">Cmd+P → 여백:없음 → 배경 그래픽 ✅ → PDF 저장</span>
    <button class="print-btn" onclick="window.print()">🖨 PDF 저장</button>
  </div>
</div>

<div id="report"></div>

<script>
const P = Object.fromEntries(new URLSearchParams(location.search));
const name       = P.name       || '학생명';
const school     = P.school     || '';
const gradeNum   = P.grade      || '';
const round      = P.round      || '진단평가';
const version    = P.version    || '';
const correct    = P.correct    !== undefined ? P.correct : '-';
const total      = P.total      || '8';
const wrong      = P.wrong      || '';
const instructor = P.instructor || '';
const comment    = P.comment    || '';
const direction  = P.direction  || '';
const examDate   = P.exam_date  || '';
const period     = P.period     || '';
const overview   = P.overview   || '';

let testScores = [];
try { testScores = JSON.parse(decodeURIComponent(P.tests || '[]')); } catch(e){}

const progressItems = P.progress ? P.progress.split('|').filter(Boolean) : [];
const wrongNums = wrong ? wrong.split(/[,，\s]+/).map(s=>s.trim()).filter(Boolean) : [];
const correctNums = P.correct_nums ? P.correct_nums.split(/[,，\s]+/).map(s=>s.trim()).filter(Boolean) : [];

function parseQData(raw) {
  if (!raw) return [];
  return raw.split(',,').map(item => {
    const pts = item.split('|');
    return {num:pts[0]||'', subject:pts[1]||'', imgId:pts[2]||'', point:pts[3]||''};
  });
}
const correctData = parseQData(P.correct_data);
const wrongData   = parseQData(P.wrong_data);
const dirItems = direction ? direction.split('|').map(s=>s.trim()).filter(Boolean) : [];

const hasCorrPage  = correctNums.length > 0 || correctData.length > 0;
const hasWrongPage = wrongNums.length > 0   || wrongData.length > 0;
const totalPages   = 1 + (hasCorrPage?1:0) + (hasWrongPage?1:0) + 1;
let pg = 1;

const defaultOv = `이번 회차 진단평가는 <strong>수학I·수학II 공통 범위</strong>를 대상으로 출제되었습니다. 주관식 ${total}문항으로 구성되며, 개념 적용 및 서술 과정의 완성도를 중점적으로 확인합니다.${version==='상'?' 상 버전은 복합 조건 해석과 심화 개념 적용 능력을 중심으로 점검합니다.':version==='하'?' 하 버전은 핵심 개념 적용력과 풀이 흐름 완성도를 중심으로 점검합니다.':''}`;
const ovText = overview || defaultOv;

function iH() {
  return `<div class="ih"><div class="ihl">IRURI EDUCATION · 이루리학원 수학관</div><div class="ihr">${name} · ${round}${version?' ('+version+')':''}</div></div>`;
}
function iF(p) {
  return `<div class="if"><div class="ifl">IRURI EDUCATION · 이루리학원 수학관 · 월간 진단평가 리포트</div><div class="ifr">${p} / ${totalPages}</div></div>`;
}

function qCard(num, isOk, subject, imgId, point) {
  const cls=isOk?'ok':'ng', mark=isOk?'✓ 정답':'✗ 오답';
  const pCls=isOk?'qp':'qpn', pLCls=isOk?'qpl':'qpnl';
  const pIcon=isOk?'💡 핵심 포인트':'🔧 보완 포인트';
  const sub = subject ? subject.replace('·','<br>') : '';
  const imgSrc = imgId ? `https://lh3.googleusercontent.com/d/${imgId}` : '';
  return `<div class="qcard ${cls}">
    <div class="qh"><div class="qn">Q ${num}</div><div class="qr">${mark}</div>${sub?'<div class="qt">'+sub+'</div>':''}</div>
    <div class="qb">
      <div class="ql">손글씨 해설</div>
      <div class="qi">${imgSrc?`<img src="${imgSrc}" alt="Q${num}" style="max-height:180mm;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
        <div class="qi-ph" style="${imgSrc?'display:none':''}">✏️ 손글씨 해설</div></div>
      ${point?`<div class="${pCls}"><div class="${pLCls}">${pIcon}</div>${point}</div>`:''}
    </div>
  </div>`;
}

const now = new Date();
const ym = `${now.getFullYear()}. ${String(now.getMonth()+1).padStart(2,'0')}`;
let html = '';

// PAGE 1: 표지
html += `<div class="page cover">
  <div class="cover-brand">
    <div><div class="brand-en">IRURI EDUCATION</div><div class="brand-ko">이루리학원 수학관</div></div>
    <div style="text-align:right"><div style="font-size:11pt;font-weight:700;color:#fff;letter-spacing:1px">${ym}</div>
    <div style="font-size:7pt;color:rgba(255,255,255,.35);margin-top:1mm">${round}</div></div>
  </div>
  <div class="sp"></div>
  <div class="cover-main">
    <div class="cover-eyebrow">Monthly Diagnosis Report</div>
    <div class="cover-title-en">Monthly<em>Report</em></div>
    <div class="cover-title-ko">월 간 진 단 평 가 리 포 트</div>
    <div class="cover-rule"></div>
  </div>
  <div class="sp" style="flex:1.5"></div>
  <div class="cover-card">
    <div class="ci"><label>👤 학생</label><span>${name}</span></div>
    <div class="ci"><label>🏫 학교·학년</label><span>${school} ${gradeNum}학년</span></div>
    <div class="ci"><label>👨‍🏫 담당 강사</label><span>${instructor} 강사</span></div>
    <div class="ci"><label>📋 시행 회차</label><span>${round}</span></div>
  </div>
  <div class="cover-badges">
    <div class="badge"><span class="bv">${correct}<small>/${total}</small></span><span class="bl">📝 진단평가 정답</span></div>
    ${examDate?`<div class="badge"><span class="bv" style="font-size:11pt;padding-top:2mm">${examDate}</span><span class="bl">🗓 진단평가 시행일</span></div>`:''}
    ${period?`<div class="badge"><span class="bv" style="font-size:9.5pt;padding-top:2mm">${period}</span><span class="bl">📂 리포트 기준 기간</span></div>`:''}
    <div class="badge"><span class="bv" style="font-size:15pt">${version||'-'}</span><span class="bl">📊 시험 버전</span></div>
  </div>
  <div class="cover-ov"><div class="ov-lbl">📌 이번 회차 진단평가 안내</div><p>${ovText}</p></div>
  <div class="sp"></div>
  <div class="cover-ftr"><div class="cfl">본 리포트는 학생 및 보호자에게만 제공됩니다</div><div class="cfr">1 / ${totalPages}</div></div>
</div>`;
pg++;

// PAGE 2: 정답 문항
if (hasCorrPage) {
  const cList = correctData.length>0 ? correctData : correctNums.map(n=>({num:n,subject:'',imgId:'',point:''}));
  html += `<div class="page page-inner">${iH()}<div class="pb">
    <div class="sh"><span class="se">✨</span><span class="st">잘 해낸 문항</span><div class="sr"></div></div>
    <div class="qcols">${cList.map(d=>qCard(d.num,true,d.subject,d.imgId,d.point)).join('')}</div>
  </div>${iF(pg)}</div>`;
  pg++;
}

// PAGE 3: 오답 문항
if (hasWrongPage) {
  const wList = wrongData.length>0 ? wrongData : wrongNums.map(n=>({num:n,subject:'',imgId:'',point:''}));
  html += `<div class="page page-inner">${iH()}<div class="pb">
    <div class="sh"><span class="se">🎯</span><span class="st">한 번 더 다듬을 문항</span><div class="sr"></div></div>
    <div class="qcols">${wList.map(d=>qCard(d.num,false,d.subject,d.imgId,d.point)).join('')}</div>
  </div>${iF(pg)}</div>`;
  pg++;
}

// 마지막 PAGE
const corrN = parseInt(correct)||0, totN = parseInt(total)||8;
const evalH = totN>0 ? Math.round(corrN/totN*100) : 0;

const chartHtml = testScores.length>0 ? `
  <div class="sh"><span class="se">📊</span><span class="st">이달 테스트 점수 추이</span><div class="sr"></div></div>
  <div class="cw">
    <div class="cleg">
      <span><span class="ld" style="background:#3DBFA0;opacity:.75"></span>수업 중 테스트</span>
      <span><span class="ld" style="background:var(--main)"></span>월간 진단평가</span>
    </div>
    <div class="cbars">
      <div class="cbl"></div><div class="cbll"></div>
      ${testScores.map(t=>`<div class="cc">
        <div class="cv">${t.score}</div>
        <div class="cb t" style="height:calc(36mm*${Math.min(t.score,110)}/110)"></div>
        <div class="cn">${t.label}${t.date?'<br>'+t.date:''}</div>
      </div>`).join('')}
      <div class="cc">
        <div class="cv" style="color:var(--main)">${correct}/${total}</div>
        <div class="cb e" style="height:calc(36mm*${Math.min(evalH,100)}/110)"></div>
        <div class="cn en">월간<br>진단평가</div>
      </div>
    </div>
  </div>` : '';

const insightHtml = (examDate||period) ? `<div class="ir">
  ${examDate?`<div class="ic hi"><div class="il">🗓 진단평가 시행일</div><div class="iv" style="color:var(--main);font-size:13pt">${examDate}</div><div class="id">${round}</div></div>`:''}
  ${period?`<div class="ic pos"><div class="il">📂 리포트 기준 기간</div><div class="iv" style="color:var(--purple);font-size:12pt">${period}</div><div class="id">수업 진도 반영</div></div>`:''}
</div>` : '';

const progHtml = progressItems.length>0 ? `
  <div class="sh"><span class="se">📚</span><span class="st">이달 학습 진도</span><div class="sr"></div></div>
  <div class="pt">${progressItems.map(item=>`<div class="ptag${item.startsWith('📖')?' bk':''}">${item}</div>`).join('')}</div>` : '';

const dirHtml = dirItems.length>0 ? `
  <div class="sh"><span class="se">🚀</span><span class="st">다음달 학습 방향</span><div class="sr"></div></div>
  <div class="nl">${dirItems.map((item,i)=>{
    const dash=item.indexOf(' — ');
    const t=dash>=0?item.substring(0,dash):item;
    const d=dash>=0?item.substring(dash):'';
    return `<div class="ni"><div class="nnw"><span class="nn">${i+1}</span></div><div class="nt"><strong>${t}</strong>${d}</div></div>`;
  }).join('')}</div>` : '';

html += `<div class="page page-inner">${iH()}<div class="pb">
  ${chartHtml}
  ${insightHtml}
  ${progHtml}
  <div class="sh" style="margin-top:3mm"><span class="se">💬</span><span class="st">강사 코멘트</span><div class="sr"></div></div>
  <div class="instc">
    <div class="instl">Instructor Comment · ${instructor} 강사</div>
    <div class="instt">${comment || '(강사 코멘트가 입력되지 않았습니다.)'}</div>
  </div>
  ${dirHtml}
</div>${iF(pg)}</div>`;

document.getElementById('report').innerHTML = html;
document.getElementById('bar-title').textContent = `📄 ${name} — ${round} 리포트`;
document.title = `${name} ${round} 리포트 — IRURI EDUCATION`;
</script>
</body>
</html>
