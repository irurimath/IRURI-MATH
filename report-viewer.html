<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRURI EDUCATION — 리포트 뷰어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
.print-bar{background:#0D2B1F;color:#fff;padding:4mm 8mm;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;}
.print-bar-title{font-size:9pt;font-weight:700;letter-spacing:1.5px;}
.print-bar-right{display:flex;gap:3mm;align-items:center;}
.print-btn{padding:2mm 5mm;background:#3DBFA0;color:#fff;border:none;border-radius:8px;
  font-size:9pt;font-weight:700;font-family:inherit;cursor:pointer;}
.print-hint{font-size:7.5pt;color:rgba(255,255,255,.45);}
@media print{.print-bar{display:none;}}

:root{
  --main:#0D2B1F;--main2:#1A3D2B;--mint:#3DBFA0;--mint-lt:#E8F7F3;
  --ivory:#F7F4EE;--white:#FFFFFF;--ink:#1A1A1A;--muted:#717171;
  --line:#E2DDD6;--red:#8B2020;--red-lt:#FAE8E8;--coral:#E8604A;
  --warm:#F5F0E8;--purple:#534AB7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#DEDAD3;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;}
.page{width:210mm;min-height:297mm;margin:10mm auto;
  background:var(--white);box-shadow:0 8px 40px rgba(0,0,0,.15);
  border-radius:16px;overflow:hidden;display:flex;flex-direction:column;}

/* 표지 */
.cover{background:var(--main);display:flex;flex-direction:column;min-height:297mm;}
.cover-brand{padding:9mm 11mm 0;display:flex;justify-content:space-between;align-items:flex-start;}
.brand-en{font-size:9.5pt;font-weight:700;letter-spacing:2.5px;color:#fff;}
.brand-ko{font-size:7.5pt;color:rgba(255,255,255,1);margin-top:1.5mm;letter-spacing:1px;}
.sp{flex:1;}
.cover-main{padding:0 11mm;}
.cover-eyebrow{font-size:7.5pt;letter-spacing:3px;color:rgba(255,255,255,.85);text-transform:uppercase;margin-bottom:5mm;}
.cover-title-en{font-family:'Playfair Display',serif;font-size:48pt;color:#fff;line-height:.88;}
.cover-title-en em{font-style:italic;color:rgba(255,255,255,.85);display:block;}
.cover-title-ko{font-size:11pt;font-weight:300;color:rgba(255,255,255,.85);letter-spacing:8px;margin-top:4mm;}
.cover-rule{width:18mm;height:2px;background:rgba(255,255,255,.2);border-radius:1px;margin:7mm 0;}
.cover-card{margin:0 11mm;background:rgba(255,255,255,.06);border-radius:14px;
  border:1px solid rgba(255,255,255,.1);padding:5mm 6mm;
  display:grid;grid-template-columns:1fr 1fr;gap:4mm 6mm;}
.ci label{font-size:6.5pt;color:rgba(255,255,255,.7);display:block;margin-bottom:1mm;letter-spacing:1px;text-transform:uppercase;}
.ci span{font-size:10.5pt;font-weight:700;color:#fff;}
.cover-badges{display:flex;gap:3mm;margin:4mm 11mm 0;}
.badge{flex:1;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(255,255,255,.09);padding:4mm 3mm;text-align:center;}
.bv{font-size:18pt;font-weight:700;color:#fff;line-height:1;display:block;}
.bv small{font-size:9pt;}
.badge.vc{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3);}
.bl{font-size:6pt;color:rgba(255,255,255,.7);margin-top:1.5mm;display:block;}
.cover-ov{margin:5mm 11mm 0;background:rgba(255,255,255,.05);border-radius:14px;
  border:1px solid rgba(255,255,255,.08);padding:5mm 6mm;}
.ov-lbl{font-size:6.5pt;letter-spacing:2px;color:rgba(255,255,255,.7);text-transform:uppercase;
  margin-bottom:3mm;display:flex;align-items:center;gap:2mm;}
.ov-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
.cover-ov p{font-size:10pt;line-height:1.9;color:#fff;font-weight:300;white-space:pre-line;}
.cover-ov p strong{color:#fff;font-weight:600;}
.cover-ftr{padding:4mm 11mm;border-top:1px solid rgba(255,255,255,.06);
  display:flex;justify-content:space-between;align-items:center;}
.cfl{font-size:6.5pt;color:rgba(255,255,255,.6);}
.cfr{font-size:7.5pt;font-weight:500;color:rgba(255,255,255,.6);}

/* 내지 */
.page-inner{background:var(--ivory);}
.ih{background:var(--main);padding:4mm 10mm;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.ihl{font-size:7pt;letter-spacing:2px;color:rgba(255,255,255,.5);}
.ihr{font-size:7pt;color:rgba(255,255,255,.35);}
.pb{padding:6mm 10mm 5mm;flex:1;}
.if{padding:3.5mm 10mm;border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-shrink:0;}
.ifl{font-size:6.5pt;color:var(--muted);}
.ifr{font-size:7.5pt;font-weight:500;color:var(--muted);}

.sh{display:flex;align-items:center;gap:3mm;margin-bottom:4mm;}
.se{font-size:14px;line-height:1;}
.st{font-size:12pt;font-weight:700;color:var(--main);}
.sr{flex:1;height:1.5px;background:var(--line);border-radius:1px;}

/* 문항 2단 */
.qcols{display:grid;grid-template-columns:1fr 1fr;gap:4mm;align-items:start;}
.qcard{background:var(--white);border-radius:14px;border:1.5px solid var(--line);
  overflow:hidden;break-inside:avoid;page-break-inside:avoid;
  margin-bottom:0;}
.qcard.ok{border-color:#3DBFA0;}
.qcard.ng{border-color:var(--coral);}
.qh{padding:3mm 3.5mm;display:flex;align-items:center;gap:2.5mm;}
.qcard.ok .qh{background:#F0FAF7;}
.qcard.ng .qh{background:#FDF3F1;}
.qn{font-size:8.5pt;font-weight:700;padding:1.5mm 3mm;border-radius:6px;}
.qcard.ok .qn{background:#3DBFA0;color:#fff;}
.qcard.ng .qn{background:var(--coral);color:#fff;}
.qr{font-size:7pt;font-weight:700;letter-spacing:1px;}
.qcard.ok .qr{color:#1A7A5E;}
.qcard.ng .qr{color:var(--coral);}
.qt{margin-left:auto;text-align:right;font-size:7.5pt;font-weight:700;color:var(--main);line-height:1.3;}
.qb{padding:3.5mm;}
.ql{font-size:6.5pt;font-weight:700;color:var(--muted);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:1.5mm;display:flex;align-items:center;gap:2mm;}
.ql::after{content:'';flex:1;height:1px;background:var(--line);}
.qi{width:100%;background:var(--warm);border-radius:10px;
  border:1.5px dashed var(--line);overflow:hidden;margin-bottom:3mm;}
.qi img{width:100%;height:auto;display:block;}
.qi-ph{font-size:7.5pt;color:rgba(107,114,128,.4);text-align:center;padding:8mm;
  min-height:20mm;display:flex;align-items:center;justify-content:center;}
.qp{background:var(--mint-lt);border-left:3px solid var(--mint);
  border-radius:0 8px 8px 0;padding:2.5mm 3mm;font-size:7pt;line-height:1.75;color:var(--main2);}
.qpl{font-size:6.5pt;font-weight:700;color:#1A7A5E;letter-spacing:1px;text-transform:uppercase;margin-bottom:1mm;}
.qpn{background:var(--red-lt);border-left:3px solid var(--coral);
  border-radius:0 8px 8px 0;padding:2.5mm 3mm;font-size:7pt;line-height:1.75;color:#5A1010;}
.qpnl{font-size:6.5pt;font-weight:700;color:var(--coral);letter-spacing:1px;text-transform:uppercase;margin-bottom:1mm;}

/* 차트 */
.cw{background:var(--white);border-radius:14px;border:1px solid var(--line);padding:4mm 5mm 3mm;margin-bottom:5mm;}
.cleg{display:flex;gap:5mm;justify-content:flex-end;margin-bottom:3mm;font-size:7pt;color:var(--muted);}
.ld{width:8px;height:8px;border-radius:3px;display:inline-block;margin-right:2px;vertical-align:middle;}
.cbars{display:flex;align-items:flex-end;gap:2.5mm;height:36mm;position:relative;}

.cc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.cv{font-size:7.5pt;font-weight:700;margin-bottom:1mm;color:var(--ink);}
.cb{width:80%;max-width:13mm;border-radius:5px 5px 0 0;}
.cb.t{background:#3DBFA0;opacity:.75;}
.cb.e{background:var(--main);}
.cn{font-size:5.2pt;color:var(--muted);text-align:center;margin-top:1.5mm;padding-bottom:2mm;line-height:1.35;max-width:18mm;word-break:keep-all;}
.cn.en{color:var(--main);font-weight:700;}

/* 인사이트 */
.ir{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3mm;margin-bottom:5mm;}
.ic{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:3.5mm;border-top:3px solid var(--line);}
.ic.hi{border-top-color:var(--mint);}
.ic.pos{border-top-color:var(--purple);}
.ic.w{border-top-color:var(--coral);}
.il{font-size:6.5pt;color:var(--muted);margin-bottom:2mm;}
.iv{font-size:15pt;font-weight:700;line-height:1;margin-bottom:1.5mm;}
.id{font-size:8pt;color:var(--muted);line-height:1.6;}

/* 진도 태그 */
.pt{display:flex;flex-wrap:wrap;gap:2mm;margin-bottom:4mm;}
.ptag{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:1.5mm 4mm;font-size:7.5pt;color:var(--ink);font-weight:500;}
.ptag.bk{background:var(--mint-lt);border-color:#3DBFA0;color:#0F6E56;}
.psum{background:#FAF8F4;border-left:3px solid var(--main);border-radius:4px;padding:3mm 4mm;margin-bottom:3mm;font-size:8.5pt;line-height:1.7;color:var(--ink);}

/* 강사 코멘트 */
.instc{background:var(--main);border-radius:14px;padding:5mm 6mm;margin-bottom:5mm;position:relative;overflow:hidden;}
.instc::before{content:'\201C';font-family:'Playfair Display',serif;font-size:64pt;
  color:rgba(255,255,255,.07);position:absolute;top:-3mm;left:2mm;line-height:1;}
.instl{font-size:6.5pt;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:3mm;position:relative;}
.instt{font-size:10pt;line-height:2.0;color:rgba(255,255,255,.88);font-weight:300;position:relative;}

/* 다음달 방향 */
.nl{display:flex;flex-direction:column;gap:2.5mm;}
.dir-block{background:var(--white);border-radius:10px;border:1px solid var(--line);padding:4mm 5mm;font-size:9.5pt;line-height:1.9;color:var(--ink);white-space:pre-line;}
.ni{display:flex;align-items:flex-start;gap:3mm;background:var(--white);border-radius:12px;border:1px solid var(--line);padding:3.5mm 4mm;}
.nnw{width:24px;height:24px;border-radius:50%;background:var(--main);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nn{font-size:9pt;font-weight:700;color:#fff;}
.nt{font-size:8pt;line-height:1.82;color:var(--ink);padding-top:1mm;}
.nt strong{color:var(--main);font-weight:700;}

@media print{
  body{background:none;}
  .page{margin:0;box-shadow:none;border-radius:0;page-break-after:always;break-after:page;width:210mm;min-height:297mm;}
  .page:last-child{page-break-after:avoid;break-after:avoid;}
  .qcard{break-inside:avoid;page-break-inside:avoid;}
  @page{size:A4;margin:0;}
}

</style>
</head>
<body>

<div class="print-bar">
  <div class="print-bar-title">📄 IRURI EDUCATION — 월간 진단평가 리포트</div>
  <div class="print-bar-right">
    <span class="print-hint">Cmd+P → 여백:없음 → 배경 그래픽 체크 → PDF 저장</span>
    <button class="print-btn" onclick="window.print()">🖨 PDF 저장</button>
  </div>
</div>

<div id="report-wrap"></div>

<script>
// ── 데이터 로드: localStorage 키 방식 (URL Too Long 방지) ──
const urlParams = new URLSearchParams(location.search);
const reportKey = urlParams.get('rk');

let p = {};
if (reportKey) {
  // 새 방식: localStorage에서 전체 데이터 로드
  try {
    const stored = localStorage.getItem(reportKey);
    if (stored) {
      const payload = JSON.parse(stored);
      p = {
        name:        payload.name        || '',
        school:      payload.school      || '',
        grade:       payload.grade       || '',
        round:       payload.round       || '',
        round_dates: payload.round_dates || '',
        version:     payload.version     || '',
        correct:     payload.correct     || '',
        total:       payload.total       || '',
        wrong:       payload.wrong       || '',
        instructor:  payload.instructor  || '',
        comment:     payload.comment     || '',
        direction:   payload.direction   || '',
        year_month:  payload.year_month  || '',
        period:      payload.period      || '',
        exam_date:   payload.exam_date   || '',
        overview:    payload.overview    || '',
        report_type: payload.report_type || 'normal',
        instructor2: payload.instructor2 || '',
        comment2:    payload.comment2    || '',
        direction2:  payload.direction2  || '',
        _okCards:    payload.ok_cards    || [],
        _ngCards:    payload.ng_cards    || [],
        _progress:   payload.progress    || [],
        _progress2:  payload.progress2   || [],
        _chart:      payload.chart       || [],
        _chart2:     payload.chart2      || [],
        _progressSummary:  payload.progress_summary  || '',
        _progressSummary2: payload.progress_summary2 || '',
      };
    }
  } catch(e) { console.warn('리포트 데이터 로드 실패:', e); }
} else {
  // 구버전 호환: URL 파라미터 방식
  p = Object.fromEntries(urlParams);
}

// ── 기본 정보 ──
const name        = p.name        || '학생명';
const school      = p.school      || '';
const gradeNum    = p.grade       || '';
const round       = p.round       || '';
const roundDates  = p.round_dates || '';
const version     = p.version     || '';
const correct     = p.correct     || '-';
const total       = p.total       || '-';
const wrong       = p.wrong       || '';
const instructor  = p.instructor  || '';
const comment     = p.comment     || '';
const direction   = p.direction   || '';
const yearMonth   = p.year_month  || (() => {
  const d = new Date();
  return d.getFullYear() + '. ' + String(d.getMonth()+1).padStart(2,'0');
})();
const period      = p.period      || '';
const examDate    = p.exam_date   || '';
const overview    = p.overview    || '';

// ── 리포트 타입 ──
const reportType     = p.report_type || 'normal';
const isProgressOnly = reportType === 'progress_only';
const isDual         = reportType === 'dual';

// ── 2강사용 추가 파라미터 (dual only) ──
const instructor2 = p.instructor2 || '';
const comment2    = p.comment2    || '';
const direction2  = p.direction2  || '';

// ── 문항 카드 / 진도 / 차트 ──
// localStorage 방식이면 _okCards 등 사용, URL 방식이면 기존 파싱
let okCards = p._okCards || [];
let ngCards = p._ngCards || [];
let progress  = p._progress  || [];
let progress2 = p._progress2 || [];
let chartData  = p._chart     || [];
let chartData2 = p._chart2    || [];
let progressSummary  = p._progressSummary  || '';
let progressSummary2 = p._progressSummary2 || '';

if (!reportKey) {
  // URL 파라미터 방식 fallback
  try { okCards   = JSON.parse(decodeURIComponent(p.ok_cards  || '[]')); } catch(e){}
  try { ngCards   = JSON.parse(decodeURIComponent(p.ng_cards  || '[]')); } catch(e){}
  try { progress  = JSON.parse(decodeURIComponent(p.progress  || '[]')); } catch(e){}
  try { progress2 = JSON.parse(decodeURIComponent(p.progress2 || '[]')); } catch(e){}
  try { chartData  = JSON.parse(decodeURIComponent(p.chart     || '[]')); } catch(e){}
  try { chartData2 = JSON.parse(decodeURIComponent(p.chart2    || '[]')); } catch(e){}
  progressSummary  = p.progress_summary  || '';
  progressSummary2 = p.progress_summary2 || '';
}

// ── 다음달 방향 항목 ──
const dirItems  = direction.split(/[\n,，]/).map(s => s.trim()).filter(Boolean);
const dirItems2 = direction2.split(/[\n,，]/).map(s => s.trim()).filter(Boolean);

// ── 오답 번호 ──
const wrongNums = wrong ? wrong.split(/[,，\s]+/).map(s => s.trim()).filter(Boolean) : [];

// ── 페이지 수 계산 ──
// progress_only: 표지 1 + 종합분석 1 = 2페이지
// normal:        표지 + 정답(있으면) + 오답(있으면) + 종합분석
// dual:          표지 + 정답(있으면) + 오답(있으면) + 강사1 종합 + 강사2 종합
const hasOk = !isProgressOnly && okCards.length > 0;
const hasNg = !isProgressOnly && ngCards.length > 0;
let totalPages = isProgressOnly ? 2 : (isDual ? (2 + (hasOk?1:0) + (hasNg?1:0) + 1) : (2 + (hasOk?1:0) + (hasNg?1:0)));
// dual: 마지막 페이지가 2개 (강사1, 강사2)
if (isDual) totalPages++;
let pageNum = 1;

// ── 문항 카드 HTML ──
// AI 문항 분석 캐시
const aiAnalysisCache = {};

// AI 분석: CORS 제한으로 브라우저 직접 호출 불가 → Apps Script 경유 방식으로 추후 구현
// 현재는 test_questions의 포인트만 표시
async function fetchAiAnalysis(card, isOk) {
  return ''; // placeholder
}

function qCardHtml(card, isOk) {
  const q      = String(card.qNum || '').replace(/^Q\s*/i,'');
  const imgUrl = card.imgUrl  || '';
  const topic  = card.topic   || '';
  const subj   = card.subject || '';
  const point  = card.point   || '';
  const cardId = 'qcard_' + card.qNum + '_' + (isOk ? 'ok' : 'ng');

  const topicHtml = (subj || topic)
    ? `<div class="qt">${subj}${topic ? '<br>' + topic : ''}</div>` : '';
  const imgHtml = imgUrl
    ? `<img src="${imgUrl}" alt="Q${q}" style="max-height:180mm;object-fit:contain;"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="qi-ph" style="display:none">✏️ 손글씨 해설</div>`
    : `<div class="qi-ph">✏️ 손글씨 해설</div>`;

  // 기존 포인트 + AI 분석 통합
  const pointLabel = isOk ? '💡 핵심 포인트' : '🔧 보완 포인트';
  const pointClass = isOk ? 'qp' : 'qpn';
  const pointLblClass = isOk ? 'qpl' : 'qpnl';
  const pointHtml = `<div class="${pointClass}" id="${cardId}_point">
    <div class="${pointLblClass}">${pointLabel}</div>
    ${point ? `<div>${point}</div>` : ''}

  </div>`;

  const cls   = isOk ? 'ok' : 'ng';
  const badge = isOk ? '✓ 정답' : '✗ 오답';
  return `<div class="qcard ${cls}" id="${cardId}">
    <div class="qh">
      <div class="qn">Q ${q}</div>
      <div class="qr">${badge}</div>
      ${topicHtml}
    </div>
    <div class="qb">
      <div class="ql">손글씨 해설</div>
      <div class="qi">${imgHtml}</div>
      ${pointHtml}
    </div>
  </div>`;
}

// 렌더 완료 후 AI 분석 비동기 삽입
async function injectAiAnalysis(cards, isOk) {
  for (const card of cards) {
    const cardId = 'qcard_' + card.qNum + '_' + (isOk ? 'ok' : 'ng');
    const aiEl   = document.getElementById(cardId + '_ai');
    if (!aiEl) continue;
    const aiText = await fetchAiAnalysis(card, isOk);
    if (aiText) {
      aiEl.style.fontStyle = 'normal';
      aiEl.style.color     = 'var(--ink)';
      aiEl.textContent     = aiText;
    } else {
      aiEl.remove();
    }
  }
}


function barHtml(item) {
  const isEval = item.type === 'eval';
  const h      = `calc(36mm*${Math.min(item.score,100)}/100)`;
  const cvText = isEval ? (item.rawScore || item.score) : item.score;
  const dateLine = item.dateLabel || '';

  let labelHtml;
  if (isEval) {
    labelHtml = `<div class="cn en">월간<br>진단평가</div>`;
  } else {
    // 시험명: 괄호 앞까지 메인, 괄호부분은 서브
    const rawName = item.label || dateLine;
    const parenIdx = rawName.indexOf('(');
    const mainName = parenIdx > 0 ? rawName.slice(0, parenIdx).trim() : rawName;
    const subName  = parenIdx > 0 ? rawName.slice(parenIdx).trim() : '';
    labelHtml = `<div class="cn">
      <span style="font-size:5.5pt;font-weight:600;display:block;line-height:1.3;">${mainName}</span>
      ${subName  ? `<span style="font-size:4.5pt;opacity:.7;display:block;">${subName}</span>`  : ''}
      <span style="font-size:5pt;opacity:.6;display:block;">${dateLine}</span>
    </div>`;
  }

  return `<div class="cc">
    <div class="cv"${isEval ? ' style="color:var(--main);font-size:9pt;"' : ''}>${cvText}</div>
    <div class="cb ${isEval ? 'e' : 't'}" style="height:${h}"></div>
    ${labelHtml}
  </div>`;
}

// ── 개괄 텍스트 ──
// '.'/'!'/'?' 기준 줄바꿈 (모든 텍스트 파트 공통 사용)
function formatSentences(text) {
  if (!text) return '';
  return text
    .replace(/([.!?])\s+/g, '$1\n')
    .split('\n')
    .map(function(s){ return s.trim(); })
    .filter(Boolean)
    .join('\n');
}

const _defaultOverview = `이번 회차 월간 진단평가는 수학I·수학II 공통 범위를 대상으로 출제되었습니다. 주관식 ${total}문항으로 구성되며, 개념 적용 및 서술 과정의 완성도를 중점적으로 확인합니다. ${version === 'A' ? 'A 버전은 복합 조건 해석과 심화 개념 적용 능력을 중심으로 점검합니다.' : version === 'B' ? 'B 버전은 핵심 개념의 기본 적용력을 중심으로 점검합니다.' : version === '확통' ? '확률과통계 버전은 확률과통계 과목의 핵심 개념 및 적용력을 중심으로 점검합니다.' : ''}`;

// 개괄코멘트: 원문 그대로 (줄바꿈 유지) + 수학 키워드 bold 처리
function boldKeywords(text) {
  if (!text) return '';
  // 수학 과목명, 수능 관련 키워드 bold
  const keywords = [
    '수학I','수학II','수1','수2','확률과 통계','확통','미적분','기하','수능',
    '3모','모의고사','내신','심화','기출','공통과목','킬러','준킬러','고난도',
    'A 버전','B 버전','상 버전','하 버전'
  ];
  let result = text;
  keywords.forEach(function(kw) {
    result = result.split(kw).join('<strong>' + kw + '</strong>');
  });
  return result;
}
const overviewHtml = boldKeywords(overview || _defaultOverview);

// ── 진도 태그 HTML 빌더 ──
// summary: 진도 요약 텍스트 (있으면 태그 위에 한 단락으로 표시)
function progressHtml(tags, periodStr, label, summary) {
  // homework 제외 (hw:true), 중복 제거
  const seen = new Set();
  const filtered = (tags || []).filter(t => {
    if (t.hw) return false;
    const key = (t.label || '').trim();
    if (seen.has(key)) return false;
    seen.add(key);
    return key.length > 0;
  });

  // 태그도 없고 요약도 없으면 섹션 자체 미표시
  if (filtered.length === 0 && !summary) return '';

  // 요약 단락 (있을 때만)
  // 학부모 노출이므로 'AI' 표식 없이 자연스러운 톤
  const summaryHtml = summary
    ? `<div class="psum">${escapeHtml(summary).replace(/\n/g, '<br>')}</div>`
    : '';

  // 태그 칩 영역 (있을 때만)
  const tagsHtml = filtered.length > 0
    ? `<div class="pt">${filtered.map(t => `<div class="ptag${t.book ? ' bk' : ''}">${t.book ? '📖 ' : ''}${t.label}</div>`).join('')}</div>`
    : '';

  return `<div class="sh"><span class="se">📚</span><span class="st">${label || '이달 학습 진도'}${periodStr ? ' (' + periodStr + ')' : ''}</span><div class="sr"></div></div>
     ${summaryHtml}${tagsHtml}`;
}

// 간단한 HTML 이스케이프 (요약 텍스트 안전 출력용)
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── 강사 코멘트 + 방향 HTML 빌더 ──
function formatComment(text) {
  if (!text) return '(강사 코멘트 없음)';
  return formatSentences(text);
}
function instructorBlockHtml(instrName, commentText, dirArr, roleLabel) {
  const formatted = formatComment(commentText);
  const roleBadge = roleLabel
    ? `<span style="font-size:6.5pt;background:rgba(255,255,255,.15);border-radius:4px;padding:1px 5px;margin-left:3mm;">${roleLabel}</span>`
    : '';
  const cHtml = `
  <div class="sh" style="margin-top:3mm"><span class="se">💬</span><span class="st">강사 코멘트</span><div class="sr"></div></div>
  <div class="instc">
    <div class="instl">Instructor Comment · ${instrName} 강사${roleBadge}</div>
    <div class="instt" style="white-space:pre-line;">${formatted}</div>
  </div>`;
  const dHtml = dirArr.length > 0
    ? `<div class="sh"><span class="se">🚀</span><span class="st">다음달 학습 방향</span><div class="sr"></div></div>
       <div class="dir-block">${formatSentences(dirArr.join(' '))}</div>`
    : '';
  return cHtml + dHtml;
}

// ── 종합 분석 페이지 HTML 빌더 ──
// instrName, commentText, dirArr, progressTags, showChart, showInsight
function summaryPageHtml(opts) {
  const { instrName, roleLabel, commentText, dirArr, progressTags, showChart, showInsight, showProgressInsight, pgNum, pgTotal, showProgress } = opts;

  const _chartSrc = opts.chartOverride !== undefined ? opts.chartOverride : chartData;
  const chartSection = showChart && _chartSrc.length > 0
    ? `<div class="sh"><span class="se">📊</span><span class="st">이달 테스트 점수 추이</span><div class="sr"></div></div>
       <div class="cw">

         </div>
         <div class="cbars">${_chartSrc.map(item => barHtml(item)).join('')}</div>
       </div>`
    : '';

  const insightSection = showInsight
    ? `<div class="ir">
        <div class="ic hi">
          <div class="il">🗓 진단평가 시행일</div>
          <div class="iv" style="color:var(--main);font-size:13pt">${examDate || '-'}</div>

        </div>
        <div class="ic pos">
          <div class="il">📂 리포트 기준 기간</div>

          <div class="id">최근 약 4주<br>수업 진도 반영</div>
        </div>
        <div class="ic w">
          <div class="il">📝 정답 / 총문항</div>
          <div class="iv" style="color:var(--main)">${isProgressOnly ? '미시행' : correct+'/'+total}</div>
          <div class="id">${isProgressOnly ? '진단평가 미시행' : '오답 ' + (wrongNums.map(n => 'Q'+n.replace(/^Q+/i,'')).join('·') || '-')}</div>
        </div>
      </div>`
    : (showProgressInsight
      ? `<div class="ir">
          <div class="ic pos">
            <div class="il">📂 리포트 기준 기간</div>
            <div class="iv" style="color:var(--purple);font-size:12pt">${period || '-'}</div>
            <div class="id">최근 약 4주<br>수업 진도 반영</div>
          </div>
          <div class="ic w" style="opacity:.6">
            <div class="il">📝 진단평가</div>
            <div class="iv" style="font-size:11pt;color:var(--muted)">미시행</div>
            <div class="id">이번 회차 미응시</div>
          </div>
        </div>`
      : '')

  // progSection: 강사별로 다른 요약을 받기 위해 opts.progressSummary 우선
  const _summaryForThis = opts.progressSummary !== undefined ? opts.progressSummary : '';
  const progSection = showProgress !== false
    ? progressHtml(progressTags, period, '이달 학습 진도', _summaryForThis)
    : '';

  return `
<div class="page page-inner">
  <div class="ih">
    <div class="ihl">IRURI EDUCATION · 이루리학원 수학관</div>
    <div class="ihr">${name} · ${round}${version ? ' (' + version + ')' : ''}</div>
  </div>
  <div class="pb">
    ${chartSection}
    ${insightSection}
    ${progSection}
    ${instructorBlockHtml(instrName, commentText, dirArr, roleLabel)}
  </div>
  <div class="if">
    <div class="ifl">IRURI EDUCATION · 이루리학원 수학관 · 월간 진단평가 리포트</div>
    <div class="ifr">${pgNum} / ${pgTotal}</div>
  </div>
</div>`;
}

let html = '';

// ══ PAGE 1: 표지 ══
// progress_only일 때: 점수/시험일/버전 배지 숨김, 안내문구 변경

     </div>`
  : `<div class="cover-badges">

const coverOverviewHtml = isProgressOnly

       <p>${overviewHtml}</p>

const instrDisplay = isDual ? `${instructor} · ${instructor2}` : instructor;

html += `
<div class="page cover">
