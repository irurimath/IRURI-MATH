<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRURI EDUCATION — 리포트 뷰어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --main:#0D2B1F;--mint:#3DBFA0;--mint-lt:#E8F7F3;
  --ivory:#F7F4EE;--white:#fff;--ink:#1A1A1A;--muted:#717171;
  --line:#E2DDD6;--coral:#E8604A;--red-lt:#FAE8E8;--warm:#F5F0E8;--purple:#534AB7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#DEDAD3;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

/* 인쇄 버튼 바 (화면에만 표시) */
.print-bar{
  background:var(--main);color:#fff;padding:4mm 8mm;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.print-bar-title{font-size:9pt;font-weight:700;letter-spacing:1.5px;}
.print-bar-right{display:flex;gap:3mm;align-items:center;}
.print-btn{
  padding:2mm 5mm;background:var(--mint);color:#fff;border:none;
  border-radius:8px;font-size:9pt;font-weight:700;font-family:inherit;
  cursor:pointer;transition:opacity .2s;
}
.print-btn:hover{opacity:.85;}
.print-hint{font-size:7.5pt;color:rgba(255,255,255,.45);}

/* A4 페이지 */
.page{
  width:210mm;min-height:297mm;margin:8mm auto;
  background:var(--white);box-shadow:0 8px 40px rgba(0,0,0,.15);
  border-radius:16px;overflow:hidden;display:flex;flex-direction:column;
}

/* 표지 */
.cover{background:var(--main);display:flex;flex-direction:column;min-height:297mm;}
.cover-brand{padding:9mm 11mm 0;display:flex;justify-content:space-between;}
.brand-en{font-size:9.5pt;font-weight:700;letter-spacing:2.5px;color:#fff;}
.brand-ko{font-size:7.5pt;color:rgba(255,255,255,.4);margin-top:1.5mm;}
.sp{flex:1;}
.cover-main{padding:0 11mm;}
.cover-eyebrow{font-size:7.5pt;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:5mm;}
.cover-title-en{font-family:'Playfair Display',serif;font-size:48pt;color:#fff;line-height:.88;}
.cover-title-en em{font-style:italic;color:rgba(255,255,255,.5);display:block;}
.cover-title-ko{font-size:11pt;font-weight:300;color:rgba(255,255,255,.3);letter-spacing:8px;margin-top:4mm;}
.cover-rule{width:18mm;height:2px;background:rgba(255,255,255,.2);border-radius:1px;margin:7mm 0;}
.cover-card{margin:0 11mm;background:rgba(255,255,255,.06);border-radius:14px;
  border:1px solid rgba(255,255,255,.1);padding:5mm 6mm;
  display:grid;grid-template-columns:1fr 1fr;gap:4mm 6mm;}
.ci label{font-size:6.5pt;color:rgba(255,255,255,.3);display:block;margin-bottom:1mm;letter-spacing:1px;text-transform:uppercase;}
.ci span{font-size:10.5pt;font-weight:700;color:#fff;}
.cover-badges{display:flex;gap:3mm;margin:4mm 11mm 0;}
.badge{flex:1;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(255,255,255,.09);padding:4mm 3mm;text-align:center;}
.bv{font-size:18pt;font-weight:700;color:#fff;line-height:1;display:block;}
.bv small{font-size:9pt;}
.bl{font-size:6pt;color:rgba(255,255,255,.3);margin-top:1.5mm;display:block;}
.cover-ov{margin:5mm 11mm 0;background:rgba(255,255,255,.05);border-radius:14px;
  border:1px solid rgba(255,255,255,.08);padding:5mm 6mm;}
.ov-lbl{font-size:6.5pt;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase;
  margin-bottom:3mm;display:flex;align-items:center;gap:2mm;}
.ov-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
.cover-ov p{font-size:8.5pt;line-height:1.92;color:rgba(255,255,255,.65);font-weight:300;}
.cover-ov p strong{color:rgba(255,255,255,.88);font-weight:500;}
.cover-ftr{padding:4mm 11mm;border-top:1px solid rgba(255,255,255,.06);
  display:flex;justify-content:space-between;align-items:center;}
.cfl{font-size:6.5pt;color:rgba(255,255,255,.15);}
.cfr{font-size:7.5pt;font-weight:500;color:rgba(255,255,255,.15);}

/* 내지 */
.page-inner{background:var(--ivory);}
.ih{background:var(--main);padding:4mm 10mm;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.ihl{font-size:7pt;letter-spacing:2px;color:rgba(255,255,255,.5);}
.ihr{font-size:7pt;color:rgba(255,255,255,.35);}
.pb{padding:6mm 10mm 5mm;flex:1;}
.if{padding:3.5mm 10mm;border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-shrink:0;}
.ifl{font-size:6.5pt;color:var(--muted);}
.ifr{font-size:7.5pt;font-weight:500;color:var(--muted);}

.sh{display:flex;align-items:center;gap:3mm;margin-bottom:4mm;}
.se{font-size:14px;}
.st{font-size:12pt;font-weight:700;color:var(--main);}
.sr{flex:1;height:1.5px;background:var(--line);border-radius:1px;}

/* 강사 코멘트 */
.inst-card{background:var(--main);border-radius:14px;padding:5mm 6mm;margin-bottom:5mm;position:relative;overflow:hidden;}
.inst-card::before{content:'\201C';font-family:'Playfair Display',serif;font-size:64pt;
  color:rgba(255,255,255,.07);position:absolute;top:-3mm;left:2mm;line-height:1;}
.inst-lbl{font-size:6.5pt;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:3mm;position:relative;}
.inst-text{font-size:8.5pt;line-height:1.95;color:rgba(255,255,255,.82);font-weight:300;position:relative;}

/* 다음달 방향 */
.next-list{display:flex;flex-direction:column;gap:2.5mm;}
.next-item{display:flex;align-items:flex-start;gap:3mm;background:var(--white);border-radius:12px;border:1px solid var(--line);padding:3.5mm 4mm;}
.nnw{width:24px;height:24px;border-radius:50%;background:var(--main);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nn{font-size:9pt;font-weight:700;color:#fff;}
.nt{font-size:8pt;line-height:1.82;color:var(--ink);padding-top:1mm;}
.nt strong{color:var(--main);font-weight:700;}

/* 인사이트 */
.insight-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3mm;margin-bottom:5mm;}
.ic{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:3.5mm;border-top:3px solid var(--line);}
.ic.hi{border-top-color:var(--mint);}
.ic.pos{border-top-color:var(--purple);}
.ic.warn{border-top-color:var(--coral);}
.il{font-size:6.5pt;color:var(--muted);margin-bottom:2mm;}
.iv{font-size:15pt;font-weight:700;line-height:1;margin-bottom:1.5mm;}
.id{font-size:7pt;color:var(--muted);line-height:1.6;}

/* 오답 없음 안내 */
.no-data{background:var(--white);border-radius:14px;border:1px solid var(--line);
  padding:6mm;text-align:center;color:var(--muted);font-size:8.5pt;}

@media print{
  .print-bar{display:none;}
  body{background:none;}
  .page{margin:0;box-shadow:none;border-radius:0;page-break-after:always;break-after:page;width:210mm;min-height:297mm;}
  .page:last-child{page-break-after:avoid;break-after:avoid;}
  @page{size:A4;margin:0;}
}
</style>
</head>
<body>

<div class="print-bar">
  <div class="print-bar-title">📄 IRURI EDUCATION — 리포트 뷰어</div>
  <div class="print-bar-right">
    <span class="print-hint">Cmd+P → 여백:없음 → 배경그래픽 체크 → PDF 저장</span>
    <button class="print-btn" onclick="window.print()">🖨 PDF 저장</button>
  </div>
</div>

<div id="report-container"></div>

<script>
// URL 파라미터 파싱
const p = Object.fromEntries(new URLSearchParams(location.search));

// 오늘 날짜 기준 리포트 기준 기간 계산 (간단히 이번달 1일~오늘)
const now = new Date();
const monthStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}`;
const prevMonth = new Date(now.getFullYear(), now.getMonth()-1, 1);
const prevEnd   = new Date(now.getFullYear(), now.getMonth(), 0);
const periodStr = `${prevMonth.getFullYear()}/${prevMonth.getMonth()+1}/1–${prevEnd.getMonth()+1}/${prevEnd.getDate()}`;

const name       = p.name       || '학생명';
const school     = p.school     || '';
const gradeNum   = p.grade      || '';
const round      = p.round      || '진단평가';
const version    = p.version    || '';
const correct    = p.correct    || '-';
const total      = p.total      || '-';
const wrong      = p.wrong      || '';
const instructor = p.instructor || '';
const comment    = p.comment    || '';
const direction  = p.direction  || '';

// 다음달 방향 — 줄바꿈 기준으로 항목 분리
const dirLines = direction.split(/[,，\n]/).map(s => s.trim()).filter(Boolean);

const wrongList = wrong ? wrong.split(/[,，\s]+/).map(s=>s.trim()).filter(Boolean) : [];
const totalNum  = parseInt(total) || 8;
const correctNum = parseInt(correct) || 0;
const wrongCount = wrongList.length;

// 리포트 HTML 생성
document.getElementById('report-container').innerHTML = `

<!-- PAGE 1 표지 -->
<div class="page cover">
  <div class="cover-brand">
    <div><div class="brand-en">IRURI EDUCATION</div><div class="brand-ko">이루리학원 수학관</div></div>
    <div style="text-align:right">
      <div style="font-size:11pt;font-weight:700;color:#fff;letter-spacing:1px">${monthStr}</div>
      <div style="font-size:7pt;color:rgba(255,255,255,.35);margin-top:1mm">${round}</div>
    </div>
  </div>
  <div class="sp"></div>
  <div class="cover-main">
    <div class="cover-eyebrow">Monthly Diagnosis Report</div>
    <div class="cover-title-en">Monthly<em>Report</em></div>
    <div class="cover-title-ko">월 간 진 단 평 가 리 포 트</div>
    <div class="cover-rule"></div>
  </div>
  <div class="sp" style="flex:1.5"></div>
  <div class="cover-card">
    <div class="ci"><label>👤 학생</label><span>${name}</span></div>
    <div class="ci"><label>🏫 학교·학년</label><span>${school} ${gradeNum}학년</span></div>
    <div class="ci"><label>👨‍🏫 담당 강사</label><span>${instructor} 강사</span></div>
    <div class="ci"><label>📋 시행 회차</label><span>${round}</span></div>
  </div>
  <div class="cover-badges">
    <div class="badge"><span class="bv">${correct}<small>/${total}</small></span><span class="bl">📝 진단평가 정답</span></div>
    <div class="badge"><span class="bv" style="font-size:9.5pt;padding-top:2mm">${periodStr}</span><span class="bl">📂 리포트 기준 기간</span></div>
    <div class="badge"><span class="bv" style="font-size:15pt">${version||'-'}</span><span class="bl">📊 시험 버전</span></div>
  </div>
  <div class="cover-ov">
    <div class="ov-lbl">📌 이번 회차 진단평가 안내</div>
    <p>이번 회차 진단평가는 수학I·수학II 공통 범위를 대상으로 출제되었습니다.
    주관식 ${totalNum}문항으로 구성되며, 개념 적용 및 서술 과정의 완성도를 중점적으로 확인합니다.
    ${version==='상' ? '상 버전은 복합 조건 해석과 심화 개념 적용 능력을 중심으로 점검합니다.' :
      version==='하' ? '하 버전은 핵심 개념의 기본 적용력과 풀이 흐름 완성도를 중심으로 점검합니다.' : ''}</p>
  </div>
  <div class="sp"></div>
  <div class="cover-ftr">
    <div class="cfl">본 리포트는 학생 및 보호자에게만 제공됩니다</div>
    <div class="cfr">1 / 3</div>
  </div>
</div>

<!-- PAGE 2 오답 분석 -->
<div class="page page-inner">
  <div class="ih"><div class="ihl">IRURI EDUCATION · 이루리학원 수학관</div><div class="ihr">${name} · ${round} (${version})</div></div>
  <div class="pb">
    <div class="sh"><span class="se">🎯</span><span class="st">오답 문항</span><div class="sr"></div></div>
    ${wrongCount > 0
      ? `<div style="background:var(--white);border-radius:14px;border:1px solid var(--line);padding:4mm 5mm;margin-bottom:5mm;">
           <div style="font-size:8pt;color:var(--muted);margin-bottom:3mm;">오답 문항 번호</div>
           <div style="display:flex;gap:2mm;flex-wrap:wrap;">
             ${wrongList.map(q => `<span style="background:#FDF3F1;border:1.5px solid var(--coral);color:var(--coral);border-radius:8px;padding:2mm 4mm;font-size:9pt;font-weight:700;">Q${q.replace(/\D/g,'')}</span>`).join('')}
           </div>
           <div style="margin-top:4mm;padding-top:3mm;border-top:1px solid var(--line);font-size:7.5pt;color:var(--muted);">
             손글씨 해설은 별도 제공되거나 강사가 직접 첨부합니다.
           </div>
         </div>`
      : `<div class="no-data">이번 회차 모든 문항 정답 🎉</div>`}

    <div class="sh" style="margin-top:3mm"><span class="se">📊</span><span class="st">결과 요약</span><div class="sr"></div></div>
    <div class="insight-row">
      <div class="ic hi"><div class="il">📝 정답 / 총문항</div>
        <div class="iv" style="color:var(--main)">${correct}/${total}</div>
        <div class="id">정답률 ${totalNum>0?Math.round(correctNum/totalNum*100):0}%</div></div>
      <div class="ic pos"><div class="il">📂 리포트 기준 기간</div>
        <div class="iv" style="color:var(--purple);font-size:12pt">${periodStr}</div>
        <div class="id">최근 진도 반영</div></div>
      <div class="ic warn"><div class="il">📋 시험 버전</div>
        <div class="iv" style="color:var(--main)">${version||'-'}</div>
        <div class="id">${round}</div></div>
    </div>
  </div>
  <div class="if"><div class="ifl">IRURI EDUCATION · 이루리학원 수학관 · 월간 진단평가 리포트</div><div class="ifr">2 / 3</div></div>
</div>

<!-- PAGE 3 강사 코멘트 + 다음달 방향 -->
<div class="page page-inner">
  <div class="ih"><div class="ihl">IRURI EDUCATION · 이루리학원 수학관</div><div class="ihr">${name} · ${round} (${version})</div></div>
  <div class="pb">
    <div class="sh"><span class="se">💬</span><span class="st">강사 코멘트</span><div class="sr"></div></div>
    <div class="inst-card">
      <div class="inst-lbl">Instructor Comment · ${instructor} 강사</div>
      <div class="inst-text">${comment || '(강사 코멘트가 입력되지 않았습니다.)'}</div>
    </div>

    ${dirLines.length > 0 ? `
    <div class="sh"><span class="se">🚀</span><span class="st">다음달 학습 방향</span><div class="sr"></div></div>
    <div class="next-list">
      ${dirLines.map((line, i) => `
        <div class="next-item">
          <div class="nnw"><span class="nn">${i+1}</span></div>
          <div class="nt">${line}</div>
        </div>`).join('')}
    </div>` : ''}
  </div>
  <div class="if"><div class="ifl">IRURI EDUCATION · 이루리학원 수학관 · 월간 진단평가 리포트</div><div class="ifr">3 / 3</div></div>
</div>
`;

// 페이지 타이틀 업데이트
document.title = `${name} ${round} 리포트 — IRURI EDUCATION`;
</script>
</body>
</html>
